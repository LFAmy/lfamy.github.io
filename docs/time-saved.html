<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · 時間節省追蹤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK','PingFang SC','Microsoft YaHei','SimHei',sans-serif;background:#F3F4F6;color:#1A1A1A;font-size:14px;padding:20px}
.container{max-width:600px;margin:0 auto}
.header{background:linear-gradient(135deg,#16A34A,#15803D);color:white;border-radius:16px;padding:28px;text-align:center;margin-bottom:20px}
.big-num{font-size:72px;font-weight:900;margin:16px 0}
.card{background:white;border-radius:14px;padding:22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card h2{font-size:16px;color:#1A3C6D;margin-bottom:12px}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F4F6;font-size:13px}
.stat-row .val{font-weight:900;color:#1A3C6D}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>⏱️ 本月你已節省</h1><div class="big-num" id="totalHours">24</div><div style="font-size:18px">小時</div></div>

<div class="card"><h2>時間節省明細</h2>
<div class="stat-row"><span>🤖 AI 自動出卷</span><span class="val">12 小時</span></div>
<div class="stat-row"><span>📊 自動追蹤進度</span><span class="val">6 小時</span></div>
<div class="stat-row"><span>💬 AI 回覆家長查詢</span><span class="val">4 小時</span></div>
<div class="stat-row"><span>📋 自動生成報告</span><span class="val">2 小時</span></div>
</div>

<div class="card"><h2>換算價值</h2>
<div class="stat-row"><span>若時薪 $200</span><span class="val" style="color:#16A34A">節省 $4,800/月</span></div>
<div class="stat-row"><span>可多收學生</span><span class="val" style="color:#1A3C6D">+5 位</span></div>
<div class="stat-row"><span>平台月費</span><span class="val" style="color:#DC2626">-$1,288</span></div>
<div class="stat-row"><span style="font-weight:900">淨收益</span><span class="val" style="color:#16A34A;font-size:16px">+$3,512/月</span></div>
</div>
</div>
</body></html>
