<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · FB/IG 廣告海報</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}

/* FB Feed: 1080x1080 | IG Story: 1080x1920 */
.poster{width:1080px;height:1080px;background:linear-gradient(160deg,#0A1A35 0%,#1A3C6D 40%,#1E4D8C 70%,#0F2440 100%);color:white;font-family:"Noto Sans HK","PingFang SC","Microsoft YaHei",sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* Golden accent ring */
.poster::before{content:"";position:absolute;top:-200px;right:-200px;width:600px;height:600px;border:3px solid rgba(201,168,76,0.15);border-radius:50%}
.poster::after{content:"";position:absolute;bottom:-150px;left:-150px;width:400px;height:400px;border:2px solid rgba(201,168,76,0.1);border-radius:50%}

/* Top bar */
.top-bar{display:flex;align-items:center;padding:36px 48px 0;gap:20px;z-index:1}
.logo-box{width:64px;height:64px;background:linear-gradient(135deg,#C9A84C,#E5C76B);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif HK",serif;font-size:24px;font-weight:900;color:#1A3C6D;flex-shrink:0}
.brand-text{font-size:22px;font-weight:700;letter-spacing:4px;color:#C9A84C}
.brand-sub{font-size:13px;opacity:0.5;letter-spacing:2px;margin-top:2px}

/* Hero */
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px 56px;z-index:1}
.pain-point{font-size:20px;color:#F59E0B;font-weight:700;margin-bottom:8px;letter-spacing:1px}
.pain-point span{background:rgba(245,158,11,0.15);padding:4px 14px;border-radius:20px}
.main-headline{font-size:52px;font-weight:900;line-height:1.2;margin-bottom:10px}
.main-headline .highlight{color:#C9A84C}
.sub-headline{font-size:22px;opacity:0.8;margin-bottom:28px;line-height:1.5}

/* Stats row */
.stats{display:flex;gap:28px;margin-bottom:28px}
.stat-item{background:rgba(255,255,255,0.08);border-radius:14px;padding:16px 24px;text-align:center;backdrop-filter:blur(10px)}
.stat-num{font-size:32px;font-weight:900;color:#C9A84C}
.stat-label{font-size:13px;opacity:0.7;margin-top:2px}

/* Trap pills */
.traps{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.trap-pill{background:rgba(220,38,38,0.2);border:1px solid rgba(220,38,38,0.3);padding:6px 16px;border-radius:20px;font-size:14px;font-weight:700}

/* CTA */
.cta-row{display:flex;gap:14px}
.cta-primary{background:linear-gradient(135deg,#DC2626,#B91C1C);color:white;border:none;padding:16px 36px;border-radius:14px;font-size:20px;font-weight:900;font-family:inherit;cursor:pointer;box-shadow:0 8px 24px rgba(220,38,38,0.3)}
.cta-secondary{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:white;padding:16px 28px;border-radius:14px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;backdrop-filter:blur(10px)}

/* Bottom */
.bottom-bar{padding:28px 56px 36px;display:flex;justify-content:space-between;align-items:center;z-index:1;font-size:13px;opacity:0.5}

/* Mobile hint */
@media(max-width:1100px){
.poster{width:100vw;height:100vw;font-size:80%}
.main-headline{font-size:6vw}
.sub-headline{font-size:3vw}
}
</style>
</head>
<body>

<div class="poster" id="poster">
<div class="top-bar">
<div class="logo-box">霖</div>
<div><div class="brand-text">霖楓學苑</div><div class="brand-sub">LF ACADEMY</div></div>
</div>

<div class="hero">
<div class="pain-point"><span>⚠️ 你小朋友數學成日錯同一樣嘢？</span></div>
<div class="main-headline">唔係佢蠢，係佢踩咗<span class="highlight">陷阱</span>！</div>
<div class="sub-headline">香港首創「陷阱教學法」· 1對3線上補習<br>P3-P6 呈分試專家 · 65分鐘睇到改變</div>

<div class="stats">
<div class="stat-item"><div class="stat-num">10</div><div class="stat-label">大陷阱類型</div></div>
<div class="stat-item"><div class="stat-num">14,000+</div><div class="stat-label">精選題目</div></div>
<div class="stat-item"><div class="stat-num">1:3</div><div class="stat-label">師生比例</div></div>
<div class="stat-item"><div class="stat-num">65min</div><div class="stat-label">課堂診斷</div></div>
</div>

<div class="traps">
<span class="trap-pill">🔴 進退位陷阱</span>
<span class="trap-pill">🔴 小數點陷阱</span>
<span class="trap-pill">🔴 運算順序陷阱</span>
<span class="trap-pill">🔴 面積公式陷阱</span>
<span class="trap-pill">🔴 單位換算陷阱</span>
</div>

<div class="cta-row">
<button class="cta-primary" onclick="alert('📱 WhatsApp: +852 請填你的電話 → 霖楓學苑')">🎯 免費試堂 · 即出診斷報告</button>
<button class="cta-secondary">📱 WhatsApp 查詢</button>
</div>
</div>

<div class="bottom-bar">
<span>霖楓學苑 · LF Academy</span>
<span>lfamy.github.io</span>
</div>
</div>

</body>
</html>
