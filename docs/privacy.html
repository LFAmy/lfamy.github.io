<div class="container">
<div class="header"><h1>🔒 隱私與數據管理</h1><p>你的數據 · 你的權利</p></div>

<div class="card"><h2>隱私政策摘要</h2>
<p><strong>我們收集的資料：</strong>學生姓名、年級、練習記錄、陷阱指紋、進度數據</p>
<p><strong>收集目的：</strong>提供個人化學習建議、追蹤學習進度、改善平台服務</p>
<p><strong>數據存儲：</strong>你的瀏覽器本地儲存（localStorage）+ Google Sheets 雲端備份</p>
<p><strong>數據分享：</strong>我們不會向第三方出售或分享你的數據</p>
<p><strong>數據保留：</strong>數據保留至帳戶刪除。你可隨時下載或要求刪除。</p>
<p><strong>兒童數據：</strong>16歲以下用戶的數據需家長明確同意。註冊即表示家長同意。</p></div>

<div class="card"><h2>📥 下載我的數據</h2><p style="font-size:12px;color:#6B7280;margin-bottom:12px">根據香港《個人資料（私隱）條例》，你有權查閱及下載你的個人數據。</p>
<button class="btn" onclick="downloadMyData()">📥 下載全部數據 (JSON)</button>
<button class="btn" onclick="deleteMyData()" style="background:#DC2626">🗑️ 刪除我的數據</button></div>
</div>

<script>
function downloadMyData(){var data={};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith("lf_")){try{data[k]=JSON.parse(localStorage.getItem(k))}catch(e){data[k]=localStorage.getItem(k)}}}var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="lamfung_my_data_"+new Date().toISOString().split("T")[0]+".json";a.click();alert("數據已下載 ✅ 請妥善保存")}
function deleteMyData(){if(confirm("確定要刪除所有數據嗎？此操作無法還原。")){for(var i=localStorage.length-1;i>=0;i--){var k=localStorage.key(i);if(k.startsWith("lf_"))localStorage.removeItem(k)}alert("數據已刪除")}}
</script>
