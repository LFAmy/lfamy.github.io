<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · 系統健康</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK','PingFang SC','Microsoft YaHei','SimHei',sans-serif;background:#0F172A;color:#E2E8F0;font-size:14px;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:24px;color:#C9A84C;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#64748B;font-size:12px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.card{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:18px}
.card h3{font-size:14px;color:#C9A84C;margin-bottom:10px}
.status-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid #334155}
.status-ok{color:#16A34A}.status-warn{color:#F59E0B}.status-err{color:#DC2626}
</style>
</head>
<body>
<div class="container">
<h1>🖥️ 系統健康監控</h1>
<div class="sub">即時狀態檢查 · 62 個系統</div>

<div class="grid">
<div class="card"><h3>📱 社交媒體</h3>
<div class="status-row"><span>內容庫 v3</span><span class="status-ok">✅ 27篇</span></div>
<div class="status-row"><span>影片庫</span><span class="status-ok">✅ 8條</span></div>
<div class="status-row"><span>每日發佈器</span><span class="status-ok">✅ 就緒</span></div>
<div class="status-row"><span>合規檢查</span><span class="status-ok">✅ 0 violations</span></div>
</div>

<div class="card"><h3>🤖 AI 系統</h3>
<div class="status-row"><span>雙語題庫</span><span class="status-ok">✅ 736題</span></div>
<div class="status-row"><span>出題引擎</span><span class="status-ok">✅ 8陷阱×4難度</span></div>
<div class="status-row"><span>WhatsApp AI</span><span class="status-ok">✅ 6意圖識別</span></div>
<div class="status-row"><span>OCR掃描</span><span class="status-ok">✅ 就緒</span></div>
</div>

<div class="card"><h3>📊 數據追蹤</h3>
<div class="status-row"><span>FB Pixel</span><span class="status-err">❌ placeholder</span></div>
<div class="status-row"><span>GA4</span><span class="status-err">❌ placeholder</span></div>
<div class="status-row"><span>CRM後端</span><span class="status-warn">⚠️ 待Apps Script</span></div>
<div class="status-row"><span>CI管線</span><span class="status-ok">✅ 運作中</span></div>
</div>

<div class="card"><h3>🎓 教學系統</h3>
<div class="status-row"><span>講義庫</span><span class="status-ok">✅ 578份·100%完整</span></div>
<div class="status-row"><span>學生平台</span><span class="status-ok">✅ PWA就緒</span></div>
<div class="status-row"><span>老師後台</span><span class="status-ok">✅ 運作中</span></div>
<div class="status-row"><span>線上測驗</span><span class="status-ok">✅ 自動批改</span></div>
</div>
</div>
</div>
</body></html>
