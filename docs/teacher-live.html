<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans HK',sans-serif;background:#0D1117;color:#E6EDF3;font-size:14px;padding:0;overflow:hidden}
.layout{display:grid;grid-template-columns:1fr 320px;height:100vh}
.main{padding:20px;overflow-y:auto;display:flex;flex-direction:column}
.sidebar{background:#161B22;border-left:1px solid #30363D;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.class-title{font-size:14px;color:#8B949E}.class-title strong{color:#E6EDF3}
.timer{font-size:28px;font-weight:900;color:#58A6FF;font-family:monospace}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #30363D;background:#21262D;color:#E6EDF3;cursor:pointer;font-size:12px;font-weight:700;transition:all 0.15s}
.btn:hover{background:#30363D}.btn-red{background:#DA3633;color:white;border-color:#DA3633}
.btn-gold{background:#C9A84C;color:#1A3C6D;border-color:#C9A84C}
.btn-green{background:#238636;color:white;border-color:#238636}
.btn-blue{background:#1F6FEB;color:white;border-color:#1F6FEB}
.proj-area{flex:1;background:#0D1117;border:1px solid #30363D;border-radius:12px;display:flex;align-items:center;justify-content:center;min-height:300px;position:relative}
.proj-content{text-align:center;padding:40px;max-width:800px;width:100%}
.proj-content h1{font-size:clamp(28px,4vw,48px);margin-bottom:20px;line-height:1.4}
.proj-content .opts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.proj-content .opt{background:#161B22;border:2px solid #30363D;border-radius:12px;padding:20px;font-size:20px;font-weight:700;color:#E6EDF3}
.proj-content .opt.correct{border-color:#238636;background:rgba(35,134,54,0.1)}
.proj-content .sub{color:#8B949E;margin:12px 0;font-size:14px}
.student-card{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0D1117;border:1px solid #30363D;border-radius:8px;font-size:11px}
.student-card .name{font-weight:700;font-size:12px}
.student-card .status{font-size:10px}.done{color:#238636}.stuck{color:#DA3633}.normal{color:#8B949E}
.mode-tabs{display:flex;gap:4px;margin-bottom:12px}
.mtab{padding:8px 16px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;background:transparent;color:#8B949E}
.mtab.on{background:#1F6FEB;color:white;border-color:#1F6FEB}
.quick-bar{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
h3{font-size:12px;color:#8B949E;margin-bottom:8px}
.countdown{font-size:11px;color:#8B949E;text-align:center;margin-top:8px}
@media(max-width:768px){.layout{grid-template-columns:1fr}}
</style>
  <link rel="stylesheet" href="/docs/data/mobile-rwd.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>

<div class="layout">

<!-- MAIN PROJECTOR -->
<div class="main">

<div class="topbar">
<div>
<div class="class-title">P5 жҳҹжңҹе…ӯж•ёеӯёзҸӯ В· <strong id="className">йҷіSirж•ҷе®Ө</strong></div>
<div class="class-title" style="font-size:11px;margin-top:2px"><span id="studentCount">8</span> дҪҚеӯёз”ҹ В· <span id="completedCount">0</span> е®ҢжҲҗ</div>
</div>
<div style="display:flex;gap:10px;align-items:center">
<div class="timer" id="timer">00:00</div>
<button class="btn btn-green" onclick="startClass()">й–Ӣе§ӢдёҠе Ӯ</button>
<button class="btn btn-red" onclick="endClass()">иҗҪе Ӯ</button>
</div>
</div>

<div class="mode-tabs">
<button class="mtab on" onclick="switchMode('project')">жҠ•еҪұжЁЎејҸ</button>
<button class="mtab" onclick="switchMode('practice')">з·ҙзҝ’жЁЎејҸ</button>
<button class="mtab" onclick="switchMode('discuss')">иЁҺи«–жЁЎејҸ</button>
</div>

<div class="proj-area" id="projector">
<div class="proj-content" id="projContent">
<h1>жә–еӮҷдёҠе Ӯ</h1>
<div class="sub">жҢүгҖҢй–Ӣе§ӢдёҠе ӮгҖҚвҖ” еӯёз”ҹжңғиҮӘеӢ•ж”¶еҲ°д»Ҡж—Ҙеҳ…з·ҙзҝ’</div>
</div>
</div>

<div class="quick-bar">
<button class="btn btn-blue" onclick="loadQuestions()">ијүе…ҘйЎҢзӣ®</button>
<button class="btn" onclick="pauseAll()">жҡ«еҒңе…ЁзҸӯ</button>
<button class="btn btn-gold" onclick="showAnswer()">йЎҜзӨәзӯ”жЎҲ</button>
<button class="btn" onclick="sendHint()">зҷјйҖҒжҸҗзӨә</button>
<button class="btn btn-red" onclick="nextQuestion()">дёӢдёҖйЎҢ вҶ’</button>
</div>

</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>еӯёз”ҹйҖІеәҰ</h3>
<div id="studentList"></div>

<div style="margin-top:8px">
<h3>иӘІе Ӯж“ҚдҪң</h3>
<button class="btn" style="width:100%;margin:4px 0" onclick="openQR()">рҹ“ұ QR з°ҪеҲ°</button>
<button class="btn" style="width:100%;margin:4px 0" onclick="openSummary()">рҹ“Ӣ з”ҹжҲҗж‘ҳиҰҒ</button>
<button class="btn" style="width:100%;margin:4px 0" onclick="openMonitor()">рҹ“Ҡ и©ізҙ°зӣЈжҺ§</button>
</div>

<div style="margin-top:8px">
<h3>ж•ҷеё«е·Ҙе…·з®ұ</h3>
<a href="teacher-substitute.html" style="text-decoration:none"><button class="btn" style="width:100%;margin:2px 0">рҹ”„ д»ЈиӘІжЁЎејҸ</button></a>
<a href="class-weakness.html" style="text-decoration:none"><button class="btn" style="width:100%;margin:2px 0">рҹҺҜ ејұй»һеҲҶжһҗ</button></a>
<a href="homework-tracker.html" style="text-decoration:none"><button class="btn" style="width:100%;margin:2px 0">рҹ“қ еҠҹиӘІиҝҪи№Ө</button></a>
<a href="teacher-bank-browser.html" style="text-decoration:none"><button class="btn" style="width:100%;margin:2px 0">рҹ“ҡ йЎҢеә«зҖҸиҰҪ</button></a>
</div>

<div id="classTimer" class="countdown"></div>
</div>

</div>

<script>
var classActive=false;var timerSec=0;var timerInt=null;var currentQuestions=[];
var currentQIndex=0;var mode='project';var students=[];
var demoNames=['йҷіе°ҸжҳҺ','жқҺе°ҸзҫҺ','ејөеҝ—еҒү','зҺӢе®¶иұӘ','жһ—е°Ҹе©·','й»ғдҝҠеӮ‘','е‘Ёи© и©©','еҗіеҳүж¬Ј'];
var demoTraps=['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10'];

// Init students
students=demoNames.map(function(n,i){return{name:n,trap:demoTraps[i%10],done:false,q:0,online:true,stuck:false}});
renderStudents();

function startClass(){
classActive=true;document.getElementById('className').textContent='дёҠе ӮдёӯвҖҰ';
timerInt=setInterval(function(){timerSec++;updateTimer()},1000);
loadQuestions();
}

function endClass(){
if(!classActive)return;
classActive=false;clearInterval(timerInt);
alert('иҗҪе ӮпјҒ\n\nиӘІе ӮжҷӮй•·: '+Math.floor(timerSec/60)+' еҲҶйҗҳ\n\nж‘ҳиҰҒе·ІиҮӘеӢ•дҝқеӯҳгҖӮ');
openSummary();
}

function updateTimer(){
var m=Math.floor(timerSec/60),s=timerSec%60;
document.getElementById('timer').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}

function renderStudents(){
var html=students.map(function(s){
var cls=s.done?'done':s.stuck?'stuck':'normal';
var icon=s.done?'вң…':s.stuck?'вҡ пёҸ':'в—»пёҸ';
return '<div class=student-card><span class=name>'+icon+' '+s.name+'</span><span class=status '+cls+'>Q'+s.q+'/'+totalQ+'</span></div>';
}).join('');
document.getElementById('studentList').innerHTML=html;

var done=students.filter(function(s){return s.done}).length;
document.getElementById('completedCount').textContent=done;
document.getElementById('studentCount').textContent=students.length;
}

var totalQ=12;

function loadQuestions(){
if(!classActive)return;
document.getElementById('projContent').innerHTML='<h1>ијүе…ҘйЎҢзӣ®дёӯ...</h1><div class=sub>жӯЈеңЁеҫһйЎҢеә«жә–еӮҷд»Ҡж—Ҙз·ҙзҝ’</div>';
currentQIndex=0;

fetch('/docs/data/question_bank_P5.json')
.then(function(r){return r.json()})
.then(function(data){
var pool=data.slice();
for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t}
currentQuestions=pool.slice(0,totalQ);
showCurrentQuestion();
simulateStudents();
})
.catch(function(){
// Fallback questions
currentQuestions=[{q:'356 + 278 = ?',opts:['534','634','624','524'],ans:1,trap:'T1'}];
showCurrentQuestion();
});
}

function showCurrentQuestion(){
if(currentQIndex>=currentQuestions.length){currentQIndex=0}
var q=currentQuestions[currentQIndex];
if(!q)return;
var content='<h1>з¬¬ '+(currentQIndex+1)+'/'+currentQuestions.length+' йЎҢ</h1>';
content+=showProblem(q);
document.getElementById('projContent').innerHTML=content;
renderStudents();
}

function showProblem(q){
var html='';
if(mode==='discuss'){
html+=q.q;
html+='<div class=sub>йҷ·йҳұпјҡ'+q.trap+' | еј•е°Һеӯёз”ҹиЁҺи«–дёӯвҖҰ</div>';
}else{
html+=q.q;
html+='<div class=opts>';
q.opts.forEach(function(o,i){
html+='<div class=opt>'+(['A','B','C','D'][i])+'. '+o+'</div>';
});
html+='</div>';
}
return html;
}

function nextQuestion(){
currentQIndex++;
showCurrentQuestion();
}
function showAnswer(){
var q=currentQuestions[currentQIndex];
if(!q)return;
document.getElementById('projContent').innerHTML='<h1>зӯ”жЎҲпјҡ'+['A','B','C','D'][q.ans]+'</h1><div class=sub>'+q.q+'</div><div class=opts></div><button class=\"btn btn-blue\" onclick=\"showCurrentQuestion()\">з№јзәҢи¬ӣи§Ј</button>';
}
function pauseAll(){alert('е…ЁзҸӯжҡ«еҒңпјҒи«Ӣеӯёз”ҹеҒңдҪҺжңӣдҪҸиҖҒеё«гҖӮ');}
function sendHint(){alert('жҸҗзӨәе·ІзҷјйҖҒпјҡз•ҷж„ҸйҖІйҖҖдҪҚжңүеҶҮйҢҜпјҹ');}
function openQR(){window.open('qr-checkin.html','_blank');}
function openSummary(){window.open('class-summary.html','_blank');}
function openMonitor(){window.open('teacher-class-monitor.html','_blank');}

function switchMode(m){
mode=m;
document.querySelectorAll('.mtab').forEach(function(t){t.classList.remove('on')});
event.target.classList.add('on');
showCurrentQuestion();
}

function simulateStudents(){
if(!classActive)return;
students.forEach(function(s){
if(Math.random()<0.3&&!s.done){
s.q++;
if(s.q>=totalQ){s.done=true;s.stuck=false}
else{s.stuck=Math.random()<0.2}
}
});
renderStudents();
setTimeout(simulateStudents,3000);
}
</script>
  <script src="/docs/data/lf-core.js"></script>
  <script src="/docs/data/lf-whatsapp.js"></script>

</body>
</html>
