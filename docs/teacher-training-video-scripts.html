<style>
:root{--b:#1A3C6D;--g:#C9A84C;--r:#DC2626;--gr:#16A34A;--p:#EC4899;--w:#FFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#6B7280;--g900:#1A1A1A}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans HK","PingFang SC","Microsoft YaHei",sans-serif;background:#1A1A2E;color:#E5E5E5;font-size:14px;line-height:1.8}

.script-card{background:#16213E;border-radius:14px;padding:24px;margin-bottom:16px;border:1px solid #2A3A5C}

.script-card h3{font-size:14px;color:#93C5FD;margin:20px 0 10px;padding-top:10px;border-top:1px solid #2A3A5C}
.script-card h3:first-of-type{margin-top:0;padding-top:0;border-top:none}
.scene-block{background:#0F1A30;border-radius:10px;padding:18px;margin:12px 0;border-left:4px solid var(--g)}

.shot-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:10px 0}
.shot-item{background:#0F1A30;border-radius:10px;padding:14px;text-align:center}
.shot-item .shot-icon{font-size:28px;display:block;margin-bottom:4px}
.shot-item .shot-name{font-weight:700;font-size:12px;color:var(--g)}
.shot-item .shot-dur{font-size:10px;color:var(--g400)}
@media(max-width:600px){.shot-list{grid-template-columns:1fr}}

<div class="topbar"><h1>Teacher Training Video Scripts</h1><div class="sub">3-Day Program | Scene-by-Scene | Production-Ready | HK Localized</div></div>
<div class="container">
<div class="day-tabs">
<button class="day-tab active" onclick="showDay(1,this)">Day 1<br>HK Foundation</button>
<button class="day-tab" onclick="showDay(2,this)">Day 2<br>Solving + Interaction</button>
<button class="day-tab" onclick="showDay(3,this)">Day 3<br>Mock + Assessment</button>
<button class="day-tab" onclick="showDay(4,this)">Bonus<br>Quick Tips</button>
</div>

<script>
var scripts={
day1:{title:"Day 1: HK Foundation + Trap System (1.5hr Video)",totalDuration:"90min",scenes:[
{title:"Opening: Welcome to LF Academy",duration:"0:00-3:00",shots:[
"CAM: Wide shot, trainer at whiteboard, LF Academy logo visible","SAY: Welcome to LF Academy teacher training. In 3 days, you will go from zero to HK-ready math teacher. Our goal: every student leaves your class knowing exactly which traps they avoided today.","SAY: Quick roadmap: Day 1 - Foundation + 10 traps. Day 2 - HK teaching methods + student rapport. Day 3 - Mock lesson + deployment.","DO: Show 3-day roadmap graphic on screen","NOTE: Energy must be HIGH from second 1. First impression sets tone for entire program."]},
{title:"HK Education System Overview",duration:"3:00-15:00",shots:[
"CAM: Switch to slides - HK education pyramid graphic","SAY: Hong Kong primary math is unique. P1-P3 is foundation. P4 is the inflection point - difficulty jumps 40%. P5-P6 is SSPA preparation - this is where our value is highest.","SAY: Key exams: Internal school exams every term. TSA in P3 and P6. And the big one - SSPA P5 second term + P6 first and second terms determine secondary school placement.","DO: Show SSPA scoring breakdown: P5=30%, P6 Term 1=30%, P6 Term 2=40%","NOTE: Emphasize SSPA importance - parents care about secondary school allocation more than anything.","TIP: HK parents obsess over banding. Use terms like \"Band 1 target\" to connect."]},
{title:"The 10-Trap System Deep Dive",duration:"15:00-60:00",shots:[
"CAM: Close-up on trap cards, one by one","SAY: Our core methodology: we do not teach math. We teach trap avoidance. Every lesson focuses on 2-3 specific traps that students must learn to detect and avoid.","SAY: T1: Carry/Borrow errors. 35% of P3 students make this mistake. Fix: draw carry markers above each column.","SAY: T2: Unit conversion. This is the NUMBER ONE SSPA trap. 1m2 is NOT 100cm2 - it is 10,000cm2.","SAY: T3: Order of operations. 60% error rate on mixed operations in SSPA.","DO: Demonstrate each trap with visual example on whiteboard","DO: For each trap: Show WRONG answer first -> student gasps -> then reveal correct method","NOTE: The emotional pattern is critical: shock -> insight -> memory. This is our secret weapon.","TIP: Use the trap chips from our training system. Interactive clicking builds muscle memory."]},
{title:"Brand Voice + HK Language Rules",duration:"60:00-75:00",shots:[
"CAM: Split screen - WRONG examples (red) vs RIGHT examples (green)","SAY: Language matters. We use Hong Kong Cantonese integrated with written Chinese. Never use mainland terms. Screen is \"螢幕\" not \"屏幕\". Video is \"影片\" not \"視頻\".","SAY: Our brand voice: short sentences. Numbers first. Trap warnings. Never say \"maybe\" or \"perhaps\" - say \"definitely\" and \"guaranteed\".","DO: Show side-by-side comparison: bad parent message vs good parent message","NOTE: This is cultural. HK parents are direct. They want data, not fluff.","TIP: Practice switching between \"teacher voice\" and \"brand voice\". Record yourself and compare."]},
{title:"Platform Walkthrough + Day 1 Wrap",duration:"75:00-90:00",shots:[
"CAM: Screen recording of LF platform","SAY: This is your command center. Teacher dashboard, lesson planner, test generator, Q bank with 11,600+ questions. Everything you need at your fingertips.","DO: Walk through: login -> dashboard -> create class -> generate test -> view student progress","SAY: Day 1 pass tasks: Recite all 10 trap names and SSPA rates. Generate a practice paper. Recite 5 HK mnemonics. See you tomorrow for Day 2: how to make students love your class.","NOTE: End with forward-looking energy. Create curiosity for Day 2."]}]},
day2:{title:"Day 2: HK Problem-Solving + Interaction + Affinity",totalDuration:"90min",scenes:[
{title:"Opening: The Case of Miss Chan",duration:"0:00-5:00",shots:[
"CAM: Trainer sitting casually, storytelling mode","SAY: Last year we had Miss Chan. DSE Math 5**. Strongest math teacher we ever hired. But first month - 2 out of 3 students quit. Why? She was too serious. She spoke like a textbook. Students were afraid to make mistakes.","SAY: Today you will learn: HK problem-solving that actually works in real classrooms. How to make 3 different students all engaged at the same time. And most importantly - how to make students trust you enough to try, fail, and try again.","NOTE: The Miss Chan story is TRUE. Use it. It makes the training personal and urgent.","TIP: Every teacher should leave Day 2 with their own \"Miss Chan moment\" - a specific behavior they will change."]},
{title:"HK 4-Step Problem Solving: CDLC",duration:"5:00-30:00",shots:[
"CAM: Whiteboard with sample SSPA question","SAY: Step 1: CIRCLE keywords. HK exam questions hide traps in the wording. Train students to circle numbers, units, and question words FIRST.","DO: Demo with real SSPA question: circle \"how many LEFT\" not \"total\"","SAY: Step 2: DRAW a diagram. Convert text to picture. Number line for fractions. Bar model for percentages. This is the HK method.","DO: Draw bar model on whiteboard for percentage question","SAY: Step 3: LIST your calculation. Step by step, vertical format. HK markers reward clear working.","DO: Write step-by-step solution, each step labeled","SAY: Step 4: CHECK by reverse calculation. Plug answer back. Does it make sense?","NOTE: CDLC should become automatic. Every question, every time. No shortcuts.","TIP: Create a CDLC poster for every classroom. Visual reminder for students."]},
{title:"10 Classroom Interaction Techniques",duration:"30:00-50:00",shots:[
"CAM: Dynamic cuts between teacher demonstrating each technique","SAY: Technique 1: Score Battle. +1 per correct answer. Winner gets to be \"Trap Master\" for the day.","DO: Show scoreboard on screen, add points dramatically","SAY: Technique 2: Trap Detective. Teacher deliberately makes a mistake. Students compete to spot which trap.","DO: Write 408/2=24 on board. Wait for students to shout \"T4! Missing zero!\"","SAY: Technique 3: Little Teacher. Fast finisher teaches slower peer. Teaching = deepest learning.","SAY: Technique 4: Speed Quiz. 30-second rapid fire. 5 questions. Trains exam speed.","SAY: Technique 5: Lucky Wheel. Spin wheel to decide who answers. Adds suspense.","SAY: Technique 6: Sniper Mode. Pick ONE trap. Attack it 10 times from 10 angles.","SAY: Technique 7: Story Immersion. Frame problems as stories. \"You are the boss calculating profit...\"","SAY: Technique 8: Flipped Class. Student tests the teacher. Teacher \"loses\" points.","SAY: Technique 9: Emoji Check. Students use emojis to show understanding. Instant feedback.","SAY: Technique 10: Exit Ticket. Before leaving, each student names one trap they will never fall for again.","NOTE: Rotate techniques. Do not use the same 2-3 every lesson. Variety = sustained engagement.","TIP: Prepare a \"technique menu\" card. Before each lesson, pick 3-4 techniques."]},
{title:"Affinity Training: Making Students Love You",duration:"50:00-70:00",shots:[
"CAM: Warm, intimate framing. Trainer speaking directly to camera.","SAY: Here is the truth: students do not care how much you know until they know how much you care. Affinity is not optional - it is the foundation everything else builds on.","SAY: Technique 1: 30-Second Pre-Class Icebreaker. First 30 seconds of every lesson: non-math question. What did you eat for lunch? Did you watch TV yesterday?","SAY: Technique 2: Name + Praise. Every single student, every single lesson. \"Xiao Ming, give it a try! I KNOW you can do this.\"","SAY: Technique 3: Share Your Own Failures. Once per lesson: \"I used to fall for T4 trap too! 408 divided by 2, I answered 24!\" Teacher vulnerability = safe space for mistakes.","SAY: Technique 4: Use Student Language. Not numerator/denominator. Say top number, bottom number. Enter their world.","SAY: Technique 5: One Humor Moment Every 10 Minutes. Exaggerated expressions. Funny analogies. Deliberate silly mistakes. Laughter = relaxation = willingness to try.","DO: Demonstrate each technique with role-play","NOTE: This section is the HEART of the training. Do not rush it.","TIP: Have trainees practice affinity techniques on each other. Give feedback on warmth and authenticity."]},
{title:"1-on-3 Dynamics + Day 2 Wrap",duration:"70:00-90:00",shots:[
"CAM: Whiteboard with 3-student seating diagram","SAY: 1-on-3 is different from 1-on-1. The weakest student sits in the middle. 60% of your attention goes to them. 20% to the middle student. 20% to the strongest.","SAY: Rotate who answers every 2 minutes. Never call on the same student twice in a row.","SAY: Three HK student archetypes: the no-confidence student - start super easy, heavy praise. The overconfident student - give challenges, make them Little Teacher. The low-motivation student - gamification, instant rewards, connect to their interests.","SAY: Day 2 pass tasks: Complete a full 65-min lesson plan using the planner. Practice all 10 interaction techniques. Record yourself doing a 2-minute affinity icebreaker.","NOTE: End Day 2 with excitement for Day 3 mock lesson. \"Tomorrow you teach your first class.\"","TIP: Give homework: watch one real LF Academy lesson recording before Day 3."]}]},
day3:{title:"Day 3: Full Mock Lesson + Assessment + Deployment",totalDuration:"90min",scenes:[
{title:"Opening: Pre-Mock Briefing",duration:"0:00-5:00",shots:[
"CAM: Trainer with assessment rubric visible","SAY: Today is game day. You will teach a full 65-minute mock lesson. I will play 3 different students simultaneously. You will be assessed on 25 criteria across 4 phases.","SAY: Pass mark is 80/100. Below 60 requires retake. You have prepared for this. Trust your training.","DO: Show assessment rubric on screen, walk through each phase quickly","NOTE: Reduce anxiety. Remind them: \"You know more than you think. The trap system is your safety net.\"","TIP: Encourage deep breath. First 2 minutes set the tone."]},
{title:"Mock Lesson: 65-Minute Role Play",duration:"5:00-45:00",shots:[
"CAM: Over-the-shoulder view of teacher at whiteboard, trainer playing students","SAY: (Trainer as Student 1 - no-confidence): I cannot do this... it is too hard...","SAY: (Trainer as Student 2 - overconfident): This is easy! I already know this!","SAY: (Trainer as Student 3 - low-motivation): (looking away, distracted) When is break time?","DO: Teacher navigates all 3 student types while delivering Probe -> Present -> Practice -> Post","DO: Trainer takes assessment notes on rubric, marks each of 25 items","NOTE: This section is the longest continuous segment. Trainer must maintain all 3 student personas consistently.","TIP: Trainer should deliberately trigger trap moments: make common student errors so teacher can demonstrate trap diagnosis."]},
{title:"Assessment Feedback + Score Review",duration:"45:00-60:00",shots:[
"CAM: Trainer and teacher reviewing rubric together","SAY: Let us go through your scores. Phase 1 PROBE: 10/12. Great icebreaker, but you forgot to have each student recall last lesson trap.","SAY: Phase 2 PRESENT: 20/24. Strong Cantonese delivery. Your mnemonic was perfect. Missing one life example - add a second next time.","SAY: Phase 3 PRACTICE: 26/32. Good attention distribution. But your micro-competition felt forced. Make it more natural.","SAY: Phase 4 POST: 24/32. Each student summarized well. But you finished 5 minutes early - use that time for extra trap drill.","SAY: Total: 80/100. You PASSED. Congratulations.","DO: Hand over printed assessment report with scores and specific improvement points","NOTE: Even if pass, always give 2-3 specific improvements. Growth mindset is key.","TIP: Record the feedback session. Teacher can review later for self-improvement."]},
{title:"Parent Communication Practice",duration:"60:00-78:00",shots:[
"CAM: Screen recording of WhatsApp, trainer role-playing as parent","SAY: Parent communication makes or breaks retention. Here are your 4 templates.","DO: Show Pre-Lesson template on screen","SAY: Before every lesson: date, time, topic, trap focus, link. Short and clear.","DO: Show Post-Lesson template","SAY: After every lesson: what was covered, student performance highlight, specific trap to watch, homework, next lesson date.","DO: Simulate parent complaint scenario","SAY: If a parent complains: record the issue, report to supervisor, reply within 24 hours. Never be defensive. Always data-first.","DO: Show Monthly Report template","SAY: Monthly: statistics, progress highlights, next month focus, renewal reminder. This is your retention weapon.","NOTE: Practice each template. Have trainees write and send practice messages.","TIP: Create a saved replies folder in WhatsApp with all 4 templates for quick access."]},
{title:"Deployment + First Lesson Preparation",duration:"78:00-90:00",shots:[
"CAM: Trainer and teacher at laptop, setting up first class","SAY: You are now a certified LF Academy teacher. Here is what happens next.","DO: Walk through: accept agreement -> get assigned students -> set first lesson in system -> generate first lesson materials","SAY: Before your first lesson: review all 10 traps. Prepare 3 HK life examples. Generate practice papers. Test your Zoom/ClassIn link. Send pre-lesson messages to all 3 parents.","SAY: Remember: your goal every lesson is simple. Every student leaves knowing which trap they avoided today. Do that, and everything else follows.","SAY: Welcome to the team. Now go teach.","NOTE: End with celebration. This is a milestone. Take a photo for the achievement wall.","TIP: Pair new teacher with a mentor teacher for first 2 weeks. Weekly check-in for first month."]}]},
day4:{title:"Bonus: Quick Teaching Tips",totalDuration:"Reference",scenes:[
{title:"Top 10 Quick Teaching Tips",duration:"Reference",shots:[
"TIP: 1. Never talk for more than 3 minutes without student interaction.","TIP: 2. If a student is stuck 3 times, mark for follow-up and move on.","TIP: 3. Always have 2 backup questions ready for fast finishers.","TIP: 4. Use student names at least 5 times per lesson.","TIP: 5. Praise the effort, not the answer. \"Great try!\" is better than \"Correct!\"","TIP: 6. End every lesson 2 minutes early for the exit ticket.","TIP: 7. Keep a \"trap journal\" - note which traps each student hits most.","TIP: 8. Rotate seating every 4 lessons so students interact with different peers.","TIP: 9. Send parent update within 30 minutes of lesson end. Consistency = trust.","TIP: 10. Record yourself once a month. Watch without sound first - body language tells more than words."]}]}
};
function showDay(day,btn){document.querySelectorAll(".day-tab").forEach(function(b){b.classList.remove("active")});btn.classList.add("active");var d=scripts["day"+day];if(!d)return;var h="";h+="<div class=\"script-card\"><h2>"+d.title+"</h2><div class=\"sub\" style=\"font-size:11px;color:var(--g400);margin-bottom:16px\">Total Duration: "+d.totalDuration+"</div>";d.scenes.forEach(function(s){h+="<div class=\"scene-block\"><div class=\"scene-title\">SCENE: "+s.title+"</div><div class=\"scene-time\">DURATION: "+s.duration+"</div>";s.shots.forEach(function(line){var cls="script-line";if(line.indexOf("CAM:")===0)cls+=" line-cam";else if(line.indexOf("SAY:")===0)cls+=" line-say";else if(line.indexOf("DO:")===0)cls+=" line-do";else if(line.indexOf("NOTE:")===0)cls+=" line-note";else if(line.indexOf("TIP:")===0)cls+=" line-tip";h+="<div class=\""+cls+"\">"+line+"</div>"});h+="</div>"});h+="</div>";document.getElementById("scriptContent").innerHTML=h;}
showDay(1,document.querySelector(".day-tab"));
</script>
