<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · 圖片風格庫 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK','PingFang SC','Microsoft YaHei','SimHei',sans-serif;background:#F3F4F6;color:#1A1A1A;font-size:14px;padding:20px}
.container{max-width:1000px;margin:0 auto}
.header{background:linear-gradient(135deg,#1A3C6D,#1E4D8C);color:white;border-radius:16px;padding:24px;text-align:center;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.style-card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.style-card .preview{height:180px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.style-card .info{padding:14px}
.style-card h3{font-size:15px;color:#1A3C6D;margin-bottom:4px}
.style-card p{font-size:11px;color:#6B7280}
.style-card .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;margin-top:4px}
/* 5 Style Previews */
.preview-brand{background:linear-gradient(135deg,#1A3C6D,#1E4D8C);color:white}
.preview-chalk{background:#2d3a2d;color:#FFD700}
.preview-warm{background:linear-gradient(135deg,#FFF5E6,#FFF9F0);color:#C9A84C}
.preview-cartoon{background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:white}
.preview-minimal{background:white;color:#1A3C6D;border:2px solid #E5E7EB}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🎨 圖片風格庫 v3</h1><p>5 種視覺風格 · 涵蓋所有社交場景</p></div>

<div class="grid">
<div class="style-card"><div class="preview preview-brand" style="font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:18px">品牌專業風</div><div class="info"><h3>品牌專業風</h3><p>Navy+Gold 品牌色系，適合 FB/IG 專業內容</p><span class="badge" style="background:#DBEAFE;color:#1E40AF">已使用</span></div></div>

<div class="style-card"><div class="preview preview-chalk" style="font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:18px">黑板教學風</div><div class="info"><h3>黑板教學風</h3><p>彩色粉筆+黑板，適合教育解說內容</p><span class="badge" style="background:#DBEAFE;color:#1E40AF">已使用</span></div></div>

<div class="style-card"><div class="preview preview-warm" style="font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:18px">溫暖手繪風</div><div class="info"><h3>溫暖手繪風 🆕</h3><p>柔和色調+手寫字體，適合小紅書感性內容、家長故事</p><span class="badge" style="background:#D1FAE5;color:#065F46">適合 小紅書</span></div></div>

<div class="style-card"><div class="preview preview-cartoon" style="font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:18px">活潑卡通風</div><div class="info"><h3>活潑卡通風 🆕</h3><p>明亮色彩+可愛角色，適合兒童模式、IG Reels</p><span class="badge" style="background:#D1FAE5;color:#065F46">適合 IG</span></div></div>

<div class="style-card"><div class="preview preview-minimal" style="font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:18px">簡約學術風</div><div class="info"><h3>簡約學術風 🆕</h3><p>極簡設計+大量留白，適合專業報告、家長PDF</p><span class="badge" style="background:#D1FAE5;color:#065F46">適合 報告</span></div></div>
</div>
</div>
</body></html>
