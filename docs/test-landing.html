<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>霖楓學苑 · 測試著陸頁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans HK',sans-serif;background:linear-gradient(170deg,#0A1A35,#1A3C6D);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,0.08);border-radius:20px;padding:32px 24px;border:1px solid rgba(255,255,255,0.12);text-align:center;max-width:500px;width:100%}
h1{font-size:22px;margin-bottom:4px}
.sub{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:20px}
.grade-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.grade-btn{padding:12px 20px;border-radius:25px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:white;cursor:pointer;font-size:15px;font-weight:700;transition:all 0.2s}
.grade-btn:hover,.grade-btn.on{border-color:#C9A84C;background:rgba(201,168,76,0.2)}
.start-btn{display:block;width:100%;padding:16px;border-radius:30px;font-size:18px;font-weight:900;border:none;cursor:pointer;background:#C9A84C;color:#1A3C6D;margin-top:16px}
.progress-wrap{background:rgba(255,255,255,0.1);height:4px;border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-inner{background:#C9A84C;height:100%;width:0;transition:width 0.3s}
.q-num{font-size:12px;color:#C9A84C;font-weight:700;margin-bottom:8px}
.q-text{font-size:20px;font-weight:700;margin-bottom:20px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px 16px;text-align:left;font-size:15px;color:white;cursor:pointer;transition:all 0.15s}
.opt-btn:hover{border-color:#C9A84C;background:rgba(201,168,76,0.1)}
.opt-btn.pick{border-color:#C9A84C;background:rgba(201,168,76,0.2)}
.opt-btn.right{border-color:#16A34A;background:rgba(22,163,74,0.2)}
.opt-btn.wrong{border-color:#DC2626;background:rgba(220,38,38,0.2)}
.btn-next{display:inline-block;background:#C9A84C;color:#1A3C6D;padding:12px 36px;border-radius:25px;font-size:15px;font-weight:900;border:none;cursor:pointer;margin-top:16px}
.btn-next:disabled{opacity:0.3;cursor:not-allowed}
.fp-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.fp-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.fp-dot.risk{background:#DC2626}.fp-dot.mid{background:#F59E0B;color:#1A1A1A}.fp-dot.safe{background:rgba(255,255,255,0.1)}
.cta-box{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:16px;margin-top:16px}
.cta-box h3{color:#C9A84C;margin-bottom:6px;font-size:14px}
.cta-btn{display:inline-block;padding:10px 24px;border-radius:25px;text-decoration:none;font-weight:900;font-size:13px;margin:4px}
.cta-green{background:#16A34A;color:white}.cta-red{background:#DC2626;color:white}
</style>
</head>
<body>
<div class="card" id="app">
<div id="start">
<h1>霖楓學苑</h1>
<div class="sub">不教數學，教避開陷阱</div>
<div style="color:rgba(255,255,255,0.6);font-size:14px;margin:10px 0">你小朋友數學成日錯同一樣嘢？<br>2分鐘免費診斷 · 搵出陷阱指紋</div>
<a href="trap-quiz.html" class="start-btn" style="text-decoration:none;display:block">免費診斷 →</a>
<div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:12px">唔使信用卡 · 唔使登記 · 即時有結果</div>
</div>
</div>
</body>
</html>
