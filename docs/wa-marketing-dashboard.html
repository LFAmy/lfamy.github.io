<style>
:root{--b:#1A3C6D;--g:#C9A84C;--r:#DC2626;--gr:#16A34A;--w:#FFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g600:#6B7280;--g800:#374151}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans HK","Segoe UI",sans-serif;background:var(--g100);color:var(--g800)}
.container{max-width:800px;margin:0 auto;padding:20px}
.hero{background:linear-gradient(135deg,#075E54,#128C7E);color:white;border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:20px}
.hero h1{font-size:20px}.hero .sub{font-size:11px;opacity:0.7;margin-top:4px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:white;border-radius:14px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.stat-card .num{font-size:28px;font-weight:900;color:var(--b)}
.stat-card .label{font-size:10px;color:var(--g600);margin-top:2px}
.stat-card.green .num{color:var(--gr)}.stat-card.red .num{color:var(--r)}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card h2{font-size:16px;color:var(--b);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.seq-item{display:flex;align-items:flex-start;gap:12px;padding:14px;margin-bottom:8px;border-radius:12px;background:var(--g50);border-left:4px solid var(--g200);transition:all 0.2s}
.seq-item:hover{background:#FFFDF5;border-left-color:var(--g)}
.seq-item .day-badge{min-width:60px;text-align:center}
.seq-item .day-badge .day{font-size:22px;font-weight:900;color:var(--b)}
.seq-item .day-badge .label{font-size:9px;color:var(--g600);text-transform:uppercase}
.seq-item .content{flex:1}
.seq-item .content .title{font-weight:700;color:var(--b);font-size:14px;margin-bottom:4px}
.seq-item .content .preview{font-size:11px;color:var(--g600);line-height:1.5;max-height:40px;overflow:hidden}
.seq-item .status{min-width:70px;text-align:right}
.seq-item .status .badge{padding:4px 10px;border-radius:10px;font-size:9px;font-weight:700}
.badge-active{background:#F0FDF4;color:var(--gr)}.badge-pending{background:var(--g100);color:var(--g600)}.badge-sent{background:#EDF4FF;color:#2563EB}
.test-area{background:linear-gradient(135deg,#F0F5FF,var(--g50));border-radius:14px;padding:20px}
.test-area textarea{width:100%;min-height:80px;padding:12px;border:1px solid var(--g200);border-radius:10px;font-family:inherit;font-size:13px;margin-bottom:12px;resize:vertical}
.test-area .output{background:#1E1E1E;color:#E5E5E5;padding:16px;border-radius:10px;font-size:12px;line-height:1.8;min-height:60px;white-space:pre-wrap}
.btn{display:inline-block;padding:10px 20px;border-radius:20px;font-weight:700;font-size:13px;text-align:center;text-decoration:none;font-family:inherit;border:none;cursor:pointer}
.btn-green{background:var(--gr);color:white}.btn-blue{background:var(--b);color:white}
.btn-outline{background:white;border:2px solid var(--b);color:var(--b)}
.btn-sm{padding:6px 16px;font-size:11px}
.form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:120px;padding:10px 14px;border:1px solid var(--g200);border-radius:10px;font-family:inherit;font-size:13px}
.conversion-funnel{display:flex;align-items:center;gap:4px;margin:16px 0;flex-wrap:wrap;justify-content:center}
.funnel-step{background:var(--b);color:white;padding:12px 16px;border-radius:10px;text-align:center;min-width:80px}
.funnel-step .num{font-size:20px;font-weight:900}.funnel-step .label{font-size:9px;opacity:0.7}
.funnel-arrow{color:var(--g600);font-size:20px;font-weight:900}
.back-link{display:block;text-align:center;color:var(--g600);font-size:12px;margin-top:20px}
</style>
</head>

<script>
var sequence = [
{day:0,trigger:"trial_signup",title:"🎉 歡迎加入霖楓學苑！",body:"你好呀！多謝你報名免費試堂～\n\n📅 試堂日期：{trial_date}\n⏰ 時間：{trial_time}\n👨‍🏫 老師：{teacher_name}\n\n💡 提提你：試堂前可以先做AI診斷，等我哋了解小朋友嘅程度：\nhttps://lfamy.github.io/docs/ai-diagnostic.html\n\n有咩問題隨時問我！😊"},
{day:-1,trigger:"before_trial",title:"⏰ 聽日就係試堂啦！",body:"提提你：聽日 {trial_time} 係 {student_name} 嘅數學試堂～\n\n✅ 請確保：\n• 網絡穩定\n• 準備紙筆\n• 小朋友精神飽滿\n\n🔗 課堂連結將會WhatsApp發送\n\n聽日見！🎯"},
{day:0,trigger:"after_trial",title:"🎯 試堂完成！{student_name}嘅診斷報告",body:"今日試堂好順利呀！{student_name}嘅表現總結：\n\n✅ 強項：計算基礎\n⚠️ 需要改善：{weakness}\n📊 診斷分數：{score}分\n\n📋 完整報告：https://lfamy.github.io/docs/ai-smart-hub.html\n\n想了解我哋嘅課程？{grade} 係 {price}/堂，一對三小班教學～"},
{day:1,trigger:"day1_followup",title:"💡 {student_name}嘅個人化學習建議",body:"試堂之後，AI分析咗{student_name}嘅學習數據：\n\n🎯 最需要加強：{weakness}\n📖 推薦練習：對應陷阱專項練習\n⚔️ 挑戰Boss：https://lfamy.github.io/docs/kids-boss-battle.html\n\n全部免費㗎！"},
{day:3,trigger:"day3_social_proof",title:"🌟 其他家長嘅真實分享",body:"好多家長問我哋嘅成效～\n\n真實案例：\n📈 {grade} 學生：3個月由68分 → 89分\n📈 {grade} 學生：呈分試數學攞A，入咗Band 1\n📈 {grade} 學生：由驚數學變成最鍾意數學堂\n\n🎯 佢哋都係由一堂免費試堂開始㗎！"},
{day:5,trigger:"day5_limited_offer",title:"🎁 限時優惠：首月體驗價",body:"為咗多謝你試堂，我哋準備咗特別優惠：\n\n✨ 首月4堂：只需 {price}/堂\n✨ 附送：AI診斷完整報告\n✨ 附送：個人化練習包（30題）\n\n⚠️ 優惠只限試堂後7日內有效！\n\n有興趣即刻回覆我呢個訊息～"},
{day:7,trigger:"day7_last_chance",title:"最後機會：{student_name}嘅學習唔好等",body:"眨下眼就過咗一個星期～\n\n{student_name}嘅數學弱項（{weakness}）如果唔盡快處理，可能會影響：\n• 校內考試成績\n• 升中呈分試準備\n• 數學自信心\n\n🪤 霖楓嘅陷阱教學法，專門針對呢啲問題。\n\n最後機會享用首月優惠，回覆我就得！"}
];

function fillTemplate(template, data) {
    var result = template;
    for (var k in data) {
        result = result.replace(new RegExp("\\{"+k+"\\}","g"), data[k]||"");
    }
    return result;
}

function renderSequence() {
    var container = document.getElementById("sequenceContainer");
    var html = "";
    sequence.forEach(function(seq, i) {
        var dayLabel = seq.day === -1 ? "前1日" : "第"+seq.day+"日";
        var badgeClass = i <= 2 ? "badge-active" : "badge-pending";
        var badgeText = i <= 2 ? "已啟用" : "待觸發";
        html += '<div class="seq-item">';
        html += '<div class="day-badge"><div class="day">'+(seq.day===-1?"-1":seq.day)+'</div><div class="label">'+dayLabel+'</div></div>';
        html += '<div class="content"><div class="title">'+seq.title.replace(/\{[^}]+\}/g,"...")+'</div>';
        html += '<div class="preview">'+seq.body.substring(0,80)+'...</div></div>';
        html += '<div class="status"><span class="badge '+badgeClass+'">'+badgeText+'</span></div>';
        html += '</div>';
    });
    container.innerHTML = html;
}

function updateTest() {
    var trigger = document.getElementById("testTrigger").value;
    var data = {
        student_name: document.getElementById("testName").value,
        grade: document.getElementById("testGrade").value,
        weakness: document.getElementById("testWeakness").value,
        score: document.getElementById("testScore").value,
        trial_date: document.getElementById("testDate").value,
        trial_time: document.getElementById("testTime").value,
        teacher_name: document.getElementById("testTeacher").value,
        price: document.getElementById("testPrice").value
    };
    var seq = sequence.find(function(s){return s.trigger===trigger;});
    if (seq) {
        var title = fillTemplate(seq.title, data);
        var body = fillTemplate(seq.body, data);
        document.getElementById("testOutput").textContent = "📤 " + title + "\n\n" + body;
    }
}

// Simulated stats
document.getElementById("totalLeads").textContent = "127";
document.getElementById("trialsBooked").textContent = "84";
document.getElementById("trialsDone").textContent = "56";
document.getElementById("converted").textContent = "22";
document.getElementById("f1").textContent = "127";
document.getElementById("f2").textContent = "98";
document.getElementById("f3").textContent = "84";
document.getElementById("f4").textContent = "56";
document.getElementById("f5").textContent = "22";

renderSequence();
updateTest();
</script>
