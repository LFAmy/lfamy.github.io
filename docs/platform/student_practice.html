<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學生練習 | 霖楓學苑 · LF Academy</title>
<style>
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans HK",sans-serif}
:root {
  --primary: #1B3A5C; --primary-light: #2A5A8C;
  --gold: #C8922A; --gold-light: #E8B84B;
  --accent: #2D7D46; --accent-light: #3DA85E;
  --red: #E74C3C; --red-light: #FDEDEC;
  --bg: #F7F4ED; --card: #FFFFFF;
  --text: #2C3E50; --text-light: #5D6D7E;
  --border: #E2DCCE; --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 16px; --radius-sm: 10px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; scroll-behavior:smooth; }
body {
  font-family: 'Noto Sans HK', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text); background: var(--bg);
  line-height: 1.6; min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, #0F2A45 100%);
  color: #fff; padding: 24px 0; text-align: center; position: relative;
}
.header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px; background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.header h1 { font-size: 1.5rem; font-weight: 900; }
.header .tagline { font-size: 0.88rem; color: var(--gold-light); margin-top: 4px; }
.container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

/* Screen transitions */
.screen { display: none; animation: fadeSlide 0.4s ease; }
.screen.active { display: block; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* Setup Screen */
.setup-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 32px; margin: 28px auto;
}
.setup-card h2 { font-size: 1.25rem; font-weight: 700; color: var(--primary); margin-bottom: 20px; text-align: center; }
.setup-group { margin-bottom: 20px; }
.setup-group label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 8px; }
.setup-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 16px; border: 2px solid var(--border); border-radius: 25px;
  font-size: 0.82rem; font-weight: 500; cursor: pointer; user-select: none;
  transition: all 0.2s; background: var(--bg); color: var(--text);
}
.chip:hover { border-color: var(--primary-light); }
.chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.chip.trap-T1.active { background: #E74C3C; border-color: #E74C3C; }
.chip.trap-T2.active { background: #E67E22; border-color: #E67E22; }
.chip.trap-T3.active { background: #2980B9; border-color: #2980B9; }
.chip.trap-T4.active { background: #27AE60; border-color: #27AE60; }
.chip.trap-T5.active { background: #8E44AD; border-color: #8E44AD; }
.chip.trap-T6.active { background: #16A085; border-color: #16A085; }
.chip.trap-T7.active { background: #D35400; border-color: #D35400; }
.chip.trap-T8.active { background: #2C3E50; border-color: #2C3E50; }
.chip.trap-T9.active { background: #C0392B; border-color: #C0392B; }
.chip.trap-T10.active { background: #7F8C8D; border-color: #7F8C8D; }

.btn-start {
  display: block; width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
  color: #fff; border: none; border-radius: var(--radius-sm);
  font-size: 1.1rem; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.25s; margin-top: 8px;
  letter-spacing: 0.02em;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45,125,70,0.3); }
.btn-start:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

/* Quiz Screen */
.quiz-header {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 16px 24px; margin: 20px auto;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
}
.quiz-progress { font-weight: 700; color: var(--primary); font-size: 0.95rem; }
.quiz-score { font-weight: 700; font-size: 0.95rem; }
.quiz-score .correct { color: var(--accent); }
.quiz-score .incorrect { color: var(--red); }
.quiz-timer { font-weight: 600; color: var(--text-light); font-size: 0.9rem; }
.quiz-timer.urgent { color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

.question-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 28px 32px; margin-bottom: 16px;
  transition: all 0.3s;
}
.question-card.correct-flash { border: 3px solid var(--accent); background: #F0FAF4; }
.question-card.incorrect-flash { border: 3px solid var(--red); background: #FEF5F5; }
.q-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.q-badge {
  padding: 3px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;
  background: #EDF2F8; color: var(--primary);
}
.q-badge.trap-T1 { background: #FDEDEC; color: #E74C3C; }
.q-badge.trap-T2 { background: #FEF5E7; color: #E67E22; }
.q-badge.trap-T3 { background: #EBF5FB; color: #2980B9; }
.q-badge.trap-T4 { background: #E8F8F5; color: #27AE60; }
.q-badge.trap-T5 { background: #F4ECF7; color: #8E44AD; }
.q-badge.trap-T6 { background: #E8F8F5; color: #16A085; }
.q-badge.trap-T7 { background: #FEF5E7; color: #D35400; }
.q-badge.trap-T8 { background: #EAECEE; color: #2C3E50; }
.q-badge.trap-T9 { background: #FDEDEC; color: #C0392B; }
.q-badge.trap-T10 { background: #F2F3F4; color: #7F8C8D; }
.q-body { font-size: 1.05rem; font-weight: 500; margin-bottom: 20px; line-height: 1.7; }

/* MC Options */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }
.opt-btn {
  padding: 14px 18px; border: 2px solid var(--border); border-radius: var(--radius-sm);
  font-size: 0.95rem; font-weight: 500; cursor: pointer; text-align: left;
  background: var(--bg); color: var(--text); transition: all 0.2s;
  font-family: inherit;
}
.opt-btn:hover:not(.locked) { border-color: var(--primary); background: #EDF2F8; }
.opt-btn.selected { border-color: var(--primary); background: #E8F0FA; font-weight: 700; }
.opt-btn.correct { border-color: var(--accent); background: #D5F5E3; color: var(--accent); font-weight: 700; }
.opt-btn.incorrect { border-color: var(--red); background: #FADBD8; color: var(--red); font-weight: 700; }
.opt-btn.locked { cursor: default; }

/* Short answer input */
.short-input {
  width: 100%; padding: 12px 16px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); font-size: 1rem; font-family: inherit;
  outline: none; transition: border-color 0.2s; background: #fff;
}
.short-input:focus { border-color: var(--primary); }
.short-input.locked { background: #f5f5f5; }

/* Feedback */
.feedback-bar {
  padding: 12px 16px; border-radius: var(--radius-sm); margin-top: 16px;
  font-weight: 600; font-size: 0.9rem; display: none;
}
.feedback-bar.show { display: block; }
.feedback-bar.correct { background: #D5F5E3; color: #1E8449; }
.feedback-bar.incorrect { background: #FADBD8; color: #C0392B; }

.btn-next {
  display: block; width: 100%; padding: 14px; margin-top: 12px;
  background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius-sm); font-size: 1rem; font-weight: 700;
  font-family: inherit; cursor: pointer; transition: all 0.2s;
}
.btn-next:hover { background: var(--primary-light); }

/* Results Screen */
.results-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 32px; margin: 28px auto;
}
.results-card h2 { text-align: center; font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 4px; }
.results-card .score-big {
  text-align: center; font-size: 3.5rem; font-weight: 900; margin: 16px 0;
}
.results-card .score-big.great { color: var(--accent); }
.results-card .score-big.good { color: var(--gold); }
.results-card .score-big.ok { color: #E67E22; }
.results-card .score-big.low { color: var(--red); }
.results-card .time-info { text-align: center; color: var(--text-light); font-size: 0.88rem; margin-bottom: 24px; }

.trap-analysis { margin: 20px 0; }
.trap-analysis h3 { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
.trap-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.trap-row .trap-label { min-width: 36px; font-weight: 600; font-size: 0.82rem; }
.trap-row .trap-bar-bg {
  flex: 1; height: 24px; background: #eee; border-radius: 12px; overflow: hidden;
  position: relative;
}
.trap-row .trap-bar-fill {
  height: 100%; border-radius: 12px; transition: width 0.6s ease;
  display: flex; align-items: center; padding-left: 12px;
  font-size: 0.75rem; font-weight: 700; color: #fff; min-width: fit-content;
}
.trap-bar-fill.strong { background: var(--accent); }
.trap-bar-fill.medium { background: var(--gold); }
.trap-bar-fill.weak { background: var(--red); }

.recommendation {
  background: #FEF9E7; border: 2px solid var(--gold-light);
  border-radius: var(--radius-sm); padding: 16px 20px; margin: 20px 0;
}
.recommendation h3 { font-size: 0.95rem; font-weight: 700; color: #7D6608; }
.recommendation p { font-size: 0.88rem; color: #5D4E0A; margin-top: 4px; }

.cta-box {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff; border-radius: var(--radius); padding: 24px 28px;
  text-align: center; margin: 20px 0;
}
.cta-box h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
.cta-box p { font-size: 0.9rem; opacity: 0.9; margin-bottom: 14px; }
.btn-cta {
  display: inline-block; padding: 12px 32px;
  background: var(--gold); color: #fff; border: none;
  border-radius: 30px; font-size: 1rem; font-weight: 700;
  font-family: inherit; cursor: pointer; text-decoration: none;
  transition: all 0.2s;
}
.btn-cta:hover { background: #B07D1E; transform: translateY(-1px); }
.btn-cta.whatsapp { background: #25D366; }
.btn-cta.whatsapp:hover { background: #1EA84F; }

.btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
.btn-retry {
  padding: 10px 24px; border: 2px solid var(--border); border-radius: 30px;
  background: #fff; color: var(--text); font-size: 0.9rem; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: all 0.2s;
}
.btn-retry:hover { border-color: var(--primary); color: var(--primary); }

/* Footer */
.footer {
  text-align: center; padding: 24px; color: var(--text-light);
  font-size: 0.82rem; margin-top: 40px; border-top: 1px solid var(--border);
}
.footer strong { color: var(--primary); }

/* Confetti */
.confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
.confetti-piece {
  position: absolute; width: 10px; height: 10px; border-radius: 2px;
  animation: confettiFall 2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<header class="header">
  <h1>學生練習平台</h1>
  <p class="tagline">不教數學，教避開陷阱。 — 霖楓學苑 LF Academy</p>
</header>

<div class="container">

  <!-- SCREEN 1: Setup -->
  <div class="screen active" id="setupScreen">
    <div class="setup-card">
      <h2>選擇練習範圍</h2>

      <div class="setup-group">
        <label>🪤 練習陷阱類型（可選多項，不選 = 全部）</label>
        <div class="setup-chips" id="setupTraps"></div>
      </div>

      <div class="setup-group">
        <label>📊 難度</label>
        <div class="setup-chips" id="setupDiff">
          <span class="chip" data-val="all">🎲 混合</span>
          <span class="chip" data-val="🌱">🌱 基礎</span>
          <span class="chip active" data-val="🌿">🌿 標準</span>
          <span class="chip" data-val="🌳">🌳 挑戰</span>
        </div>
      </div>

      <div class="setup-group">
        <label>📝 題數</label>
        <div class="setup-chips" id="setupCount">
          <span class="chip" data-val="5">5 題 (快測)</span>
          <span class="chip active" data-val="10">10 題 (標準)</span>
          <span class="chip" data-val="15">15 題 (深入)</span>
          <span class="chip" data-val="20">20 題 (全測)</span>
        </div>
      </div>

      <button class="btn-start" id="btnStart" onclick="startQuiz()">🚀 開始練習</button>
    </div>
  </div>

  <!-- SCREEN 2: Quiz -->
  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <span class="quiz-progress" id="quizProgress">第 1/10 題</span>
      <span class="quiz-score"><span class="correct" id="correctCount">0</span> ✅ / <span class="incorrect" id="incorrectCount">0</span> ❌</span>
      <span class="quiz-timer" id="quizTimer">⏱ 00:00</span>
    </div>
    <div id="questionCard"></div>
  </div>

  <!-- SCREEN 3: Results -->
  <div class="screen" id="resultsScreen">
    <div class="results-card" id="resultsContent"></div>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<footer class="footer">
  <p>Powered by <strong>霖楓學苑 · LF Academy</strong> — 教研平台</p>
  <p style="margin-top:4px;">📞 WhatsApp 查詢免費試堂</p>
</footer>

<script>
// ============================================================
// QUESTION BANK
// ============================================================
const Q = [
  {id:'Q1', type:'mc', trap:'T3', diff:'🌿', topic:'分數混合運算',
   q:'計算 5/6 − 2/3 + 1/2 的值。',
   opts:['41/60','2/3','39/60','5/6'], ans:1},
  {id:'Q2', type:'mc', trap:'T3', diff:'🌿', topic:'分數乘除',
   q:'計算 2/3 × 3/4 ÷ 1/2 的值。',
   opts:['1','1/2','1/4','3/4'], ans:0},
  {id:'Q3', type:'mc', trap:'T8', diff:'🌿', topic:'平均數',
   q:'計算八個數的平均數：25.5, 26, 27.5, 27, 27.5, 27.5, 27.5, 24.5。',
   opts:['25.625','26.125','26.5','26.625'], ans:3},
  {id:'Q4', type:'mc', trap:'T2', diff:'🌿', topic:'小數化分數',
   q:'把 1.88 化為最簡分數。',
   opts:['88/100','1 88/100','1 44/50','1 22/25'], ans:3},
  {id:'Q5', type:'mc', trap:'T1', diff:'🌿', topic:'近似值',
   q:'把 942,578,369 取近似值至百萬位。',
   opts:['942,000,000','942,600,000','943,000,000','940,000,000'], ans:2},
  {id:'Q6', type:'mc', trap:'T7', diff:'🌿', topic:'公倍數',
   q:'36 和 45 的第 3 個公倍數是多少？',
   opts:['90','180','360','540'], ans:3},
  {id:'Q7', type:'mc', trap:'T6', diff:'🌿', topic:'公因數',
   q:'48 和 72 有多少個公因數？',
   opts:['6','8','10','12'], ans:1},
  {id:'Q8', type:'mc', trap:'T4', diff:'🌳', topic:'平行四邊形面積',
   q:'平行四邊形高是 9 厘米，底是 20 厘米，面積是多少平方厘米？',
   opts:['120','150','168','180'], ans:3},
  {id:'Q9', type:'mc', trap:'T6', diff:'🌿', topic:'L.C.M.',

  {id:'Q10', type:'mc', trap:'T3', diff:'🌳', topic:'分數混合運算',

  {id:'Q11', type:'mc', trap:'T5', diff:'🌱', topic:'方向',

  {id:'Q12', type:'mc', trap:'T5', diff:'🌿', topic:'對稱軸',

  {id:'Q13', type:'mc', trap:'T6', diff:'🌳', topic:'倍數範圍',
   q:'20 至 250 之間有多少個 4 的倍數？',

  {id:'Q14', type:'mc', trap:'T6', diff:'🌿', topic:'H.C.F.',

   opts:['3','6','12','15'], ans:3},
  {id:'Q15', type:'mc', trap:'T3', diff:'🌿', topic:'分數混合運算',
   q:'計算 6/4 − 3/4 + 2/9 的值。',
   opts:['35/36','7/9','18/9','17/9'], ans:0},
  {id:'Q16', type:'mc', trap:'T9', diff:'🌱', topic:'除法餘數',

   opts:['16','17','18','19'], ans:2},
  {id:'Q17', type:'mc', trap:'T1', diff:'🌱', topic:'位值',
   q:'975,136 最少加上多少才是一個七位數？',
   opts:['24,864','875,136','2,484','12,354'], ans:0},
  {id:'Q18', type:'mc', trap:'T1', diff:'🌳', topic:'組合數字',

   opts:['103,357','103,557','105,753','107,553'], ans:1},
  {id:'Q19', type:'mc', trap:'T4', diff:'🌳', topic:'梯形面積',
   q:'梯形上底 15 cm，下底比上底多 4 倍，高 8 cm，面積是多少？',

  {id:'Q20', type:'mc', trap:'T3', diff:'🌳', topic:'分數比較',
   q:'以下哪一道算式的結果最大？<br>A. 3/4 × 2/3  B. 5/6 × 3/4  C. 7/8 × 4/5  D. 2/3 × 5/6',
   opts:['3/4 × 2/3','5/6 × 3/4','7/8 × 4/5','2/3 × 5/6'], ans:2},
  {id:'Q31', type:'mc', trap:'T4', diff:'🌿', topic:'三角形面積',
   q:'三角形底 12 cm，高 8 cm，面積是多少平方厘米？',
   opts:['48','96','40','24'], ans:0},
  {id:'Q32', type:'mc', trap:'T10', diff:'🌱', topic:'代數入門',

   opts:['5','6','7','17'], ans:2},
  {id:'Q33', type:'mc', trap:'T8', diff:'🌿', topic:'平均數',

   opts:['26','28','30','32'], ans:1},
  {id:'Q34', type:'mc', trap:'T9', diff:'🌿', topic:'除法應用',
   q:'有 125 本書，每 8 本放一盒，最少需要多少個盒？',

  {id:'Q35', type:'mc', trap:'T1', diff:'🌿', topic:'近似值',
   q:'把 3,456,789 取近似值至十萬位。',

  {id:'Q36', type:'mc', trap:'T10', diff:'🌿', topic:'代數',

   opts:['7','8','9','10'], ans:2},
  {id:'Q37', type:'mc', trap:'T5', diff:'🌿', topic:'體積',

  {id:'Q38', type:'mc', trap:'T7', diff:'🌳', topic:'公倍數',

   opts:['72','96','120','144'], ans:2},
  {id:'Q21', type:'short', trap:'T6', diff:'🌿', topic:'分數應用',

  {id:'Q22', type:'short', trap:'T6', diff:'🌳', topic:'分數比較',

  {id:'Q25', type:'short', trap:'T2', diff:'🌿', topic:'小數應用',

   q:'24 和 36 的 H.C.F. 是 ___。', opts:null, ans:'12'},

  {id:'Q47', type:'short', trap:'T5', diff:'🌱', topic:'正方體體積',

   q:'2x + 8 = 30，x = ___。', opts:null, ans:'11'},

   q:'12.05 × 100 = ___。', opts:null, ans:'1205'},

  {id:'Q51', type:'short', trap:'T3', diff:'🌿', topic:'分數加減',
   q:'計算 5/8 + 3/4 − 1/2，答案是 ___。', opts:null, ans:'7/8'},
  {id:'Q52', type:'short', trap:'T7', diff:'🌿', topic:'公倍數',
   q:'4 和 6 最小的公倍數是 ___。', opts:null, ans:'12'},
];

// ---- State ----
let quizQuestions = [];
let currentIndex = 0;
let score = { correct: 0, incorrect: 0 };
let responses = []; // { q, userAnswer, correct }
let timerInterval = null;
let quizStartTime = null;
let quizEndTime = null;

// ---- Setup Screen ----
(function initSetup() {
  const trapContainer = document.getElementById('setupTraps');
  const trapLabels = {
    T1:'T1 近似值·位值', T2:'T2 小數轉換', T3:'T3 分數運算', T4:'T4 面積計算',
    T5:'T5 方向·對稱·體積', T6:'T6 公因數·公倍數', T7:'T7 倍數應用',
    T8:'T8 平均數·應用', T9:'T9 餘數·除法', T10:'T10 代數·數據'
  };
  trapContainer.innerHTML = Object.entries(trapLabels).map(([k,v]) =>
    `<span class="chip trap-${k}" data-val="${k}" onclick="this.classList.toggle('active')">${v}</span>`
  ).join('');

  // Make chips clickable for diff and count
  document.querySelectorAll('#setupDiff .chip').forEach(c => {
    c.addEventListener('click', function() {
      this.parentElement.querySelectorAll('.chip').forEach(s => s.classList.remove('active'));
      this.classList.add('active');
    });
  });
  document.querySelectorAll('#setupCount .chip').forEach(c => {
    c.addEventListener('click', function() {
      this.parentElement.querySelectorAll('.chip').forEach(s => s.classList.remove('active'));
      this.classList.add('active');
    });
  });
})();

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  if (screenId === 'quizScreen') document.getElementById('quizScreen').scrollIntoView({ behavior: 'smooth' });
  if (screenId === 'resultsScreen') document.getElementById('resultsScreen').scrollIntoView({ behavior: 'smooth' });
}

function startQuiz() {
  // Get selected traps
  const trapChips = document.querySelectorAll('#setupTraps .chip.active');
  let selectedTraps = Array.from(trapChips).map(c => c.dataset.val);
  if (selectedTraps.length === 0) selectedTraps = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10'];

  // Get selected difficulty
  const diffChip = document.querySelector('#setupDiff .chip.active');
  const selectedDiff = diffChip ? diffChip.dataset.val : 'all';

  // Get question count
  const countChip = document.querySelector('#setupCount .chip.active');
  const questionCount = countChip ? parseInt(countChip.dataset.val) : 10;

  // Filter pool
  let pool = Q.filter(q => selectedTraps.includes(q.trap));
  if (pool.length < questionCount) {
    // Relax trap filter
    pool = [...Q];
  }
  if (selectedDiff !== 'all') {
    const diffFiltered = pool.filter(q => q.diff === selectedDiff);
    if (diffFiltered.length >= 5) pool = diffFiltered;
  }

  // Shuffle and select
  pool = shuffle([...pool]);
  quizQuestions = pool.slice(0, Math.min(questionCount, pool.length));

  // Reset state
  currentIndex = 0;
  score = { correct: 0, incorrect: 0 };
  responses = [];
  quizStartTime = Date.now();
  quizEndTime = null;

  // Show quiz screen
  showScreen('quizScreen');
  updateQuizHeader();
  renderQuestion();

  // Start timer
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - quizStartTime) / 1000);
  const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const sec = (elapsed % 60).toString().padStart(2, '0');
  const timerEl = document.getElementById('quizTimer');
  timerEl.textContent = `⏱ ${min}:${sec}`;
  if (elapsed > 300) timerEl.classList.add('urgent');
}

function updateQuizHeader() {
  document.getElementById('quizProgress').textContent = `第 ${currentIndex + 1}/${quizQuestions.length} 題`;
  document.getElementById('correctCount').textContent = score.correct;
  document.getElementById('incorrectCount').textContent = score.incorrect;
}

function renderQuestion() {
  const q = quizQuestions[currentIndex];
  const card = document.getElementById('questionCard');

  let html = `<div class="question-card" id="currentCard">`;
  html += `<div class="q-meta">`;
  html += `<span class="q-badge trap-${q.trap}">${q.trap}</span>`;
  html += `<span class="q-badge">${q.diff}</span>`;
  html += `<span class="q-badge">${q.topic}</span>`;
  html += `</div>`;
  html += `<div class="q-body">${q.q}</div>`;

  if (q.type === 'mc') {
    html += '<div class="options-grid">';
    q.opts.forEach((opt, i) => {
      html += `<button class="opt-btn" onclick="selectOption(${i}, this)" data-idx="${i}">${String.fromCharCode(65 + i)}. ${opt}</button>`;
    });
    html += '</div>';
  } else {
    html += '<input type="text" class="short-input" id="shortAnswer" placeholder="請輸入答案..." autocomplete="off">';
    html += '<button class="btn-next" style="margin-top:12px;" onclick="submitShort()">✅ 提交答案</button>';
  }

  html += '<div class="feedback-bar" id="feedback"></div>';
  html += '</div>';

  card.innerHTML = html;
  updateQuizHeader();

  // Focus short input
  if (q.type !== 'mc') {
    setTimeout(() => {
      const inp = document.getElementById('shortAnswer');
      if (inp) inp.focus();
    }, 100);
  }
}

function selectOption(idx, btn) {
  const card = document.getElementById('currentCard');
  if (!card || card.classList.contains('locked')) return;

  const q = quizQuestions[currentIndex];

  // Mark all buttons locked
  card.classList.add('locked');
  card.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.add('locked');
    const i = parseInt(b.dataset.idx);
    if (i === q.ans) b.classList.add('correct');
    if (i === idx && i !== q.ans) b.classList.add('incorrect');
  });

  // Show feedback
  const fb = document.getElementById('feedback');
  const isCorrect = (idx === q.ans);

  if (isCorrect) {
    score.correct++;
    fb.className = 'feedback-bar correct show';
    fb.textContent = '✅ 正確！做得好！';
    card.classList.add('correct-flash');
  } else {
    score.incorrect++;
    fb.className = 'feedback-bar incorrect show';
    const correctAns = q.type === 'mc'
      ? `${String.fromCharCode(65 + q.ans)}. ${q.opts[q.ans]}`
      : q.ans;
    fb.textContent = `❌ 不對啊！正確答案是：${correctAns}`;
    card.classList.add('incorrect-flash');
  }

  responses.push({ q, userAnswer: idx, isCorrect });

  // Show next button
  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn-next';
  nextBtn.textContent = currentIndex < quizQuestions.length - 1 ? '下一題 ▶' : '查看結果 📊';
  nextBtn.onclick = nextQuestion;
  card.appendChild(nextBtn);

  updateQuizHeader();
}

function submitShort() {
  const input = document.getElementById('shortAnswer');
  if (!input || input.classList.contains('locked')) return;

  const card = document.getElementById('currentCard');
  const q = quizQuestions[currentIndex];
  const userAnswer = input.value.trim();

  // Lock
  input.classList.add('locked');
  input.disabled = true;
  card.classList.add('locked');

  // Normalize for comparison
  const normalize = s => s.replace(/\s+/g, '').replace(/[,，]/g, ',').toLowerCase();
  const userNorm = normalize(userAnswer);
  const ansNormVals = q.ans.split(',').map(n => normalize(n));
  const isCorrect = ansNormVals.some(a => userNorm.includes(a)) || ansNormVals.includes(userNorm);

  if (isCorrect) {
    score.correct++;
    const fb = document.getElementById('feedback');
    fb.className = 'feedback-bar correct show';
    fb.textContent = '✅ 正確！做得好！';
    card.classList.add('correct-flash');
  } else {
    score.incorrect++;
    const fb = document.getElementById('feedback');
    fb.className = 'feedback-bar incorrect show';
    fb.textContent = `❌ 不對啊！正確答案是：${q.ans}`;
    card.classList.add('incorrect-flash');
  }

  responses.push({ q, userAnswer, isCorrect });

  // Show next button
  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn-next';
  nextBtn.textContent = currentIndex < quizQuestions.length - 1 ? '下一題 ▶' : '查看結果 📊';
  nextBtn.onclick = nextQuestion;
  card.appendChild(nextBtn);

  updateQuizHeader();
}

function nextQuestion() {
  if (currentIndex < quizQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  quizEndTime = Date.now();
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  const totalTime = Math.floor((quizEndTime - quizStartTime) / 1000);
  const min = Math.floor(totalTime / 60);
  const sec = totalTime % 60;
  const total = quizQuestions.length;
  const correct = score.correct;
  const pct = Math.round((correct / total) * 100);

  // Trap analysis
  const trapPerf = {};
  ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10'].forEach(t => { trapPerf[t] = { total: 0, correct: 0 }; });
  responses.forEach(r => {
    trapPerf[r.q.trap].total++;
    if (r.isCorrect) trapPerf[r.q.trap].correct++;
  });

  // Score class
  let scoreClass = 'low';
  if (pct >= 90) scoreClass = 'great';
  else if (pct >= 70) scoreClass = 'good';
  else if (pct >= 50) scoreClass = 'ok';

  // Build results
  let html = '';
  html += `<h2>練習完成！</h2>`;
  html += `<div class="score-big ${scoreClass}">${correct}/${total}</div>`;
  html += `<p class="time-info">用時：${min} 分 ${sec} 秒 · 正確率 ${pct}%</p>`;

  // Trap analysis
  html += '<div class="trap-analysis"><h3>🪤 陷阱弱點分析</h3>';
  const trapLabels = {
    T1:'近似值', T2:'小數', T3:'分數', T4:'面積', T5:'體積/方向',
    T6:'因數倍數', T7:'公倍數', T8:'平均/應用', T9:'餘數', T10:'代數/數據'
  };
  const trapsWithData = Object.entries(trapPerf).filter(([t, d]) => d.total > 0);
  const weakTraps = [];

  trapsWithData.forEach(([t, d]) => {
    const tpct = Math.round((d.correct / d.total) * 100);
    let barClass = 'strong';
    if (tpct < 50) { barClass = 'weak'; weakTraps.push(t); }
    else if (tpct < 75) { barClass = 'medium'; weakTraps.push(t); }

    html += `<div class="trap-row">`;
    html += `<span class="trap-label">${t}</span>`;
    html += `<div class="trap-bar-bg">`;
    html += `<div class="trap-bar-fill ${barClass}" style="width:${Math.max(tpct, 8)}%">${d.correct}/${d.total} (${tpct}%)</div>`;
    html += `</div></div>`;
  });
  html += '</div>';

  // Recommendation
  if (weakTraps.length > 0) {
    html += '<div class="recommendation">';
    html += '<h3>💡 學習建議</h3>';
    html += `<p>你在 <strong>${weakTraps.map(t => trapLabels[t]).join('、')}</strong> 方面需要加強。霖楓學苑專注於陷阱教學，幫助學生精準避開常見失分位。建議針對以上弱點進行專題操練。</p>`;
    html += '</div>';
  } else if (pct >= 80) {
    html += '<div class="recommendation">';
    html += '<h3>🌟 表現優秀！</h3>';
    html += '<p>你在各陷阱類型都有出色表現！繼續保持，可以挑戰更高難度的題目。霖楓學苑提供進階操練，助你在呈分試中奪取高分。</p>';
    html += '</div>';
  }

  // CTA
  html += '<div class="cta-box">';
  html += '<h3>🎓 想全面提升呈分試成績？</h3>';
  html += '<p>霖楓學苑提供一對一及小組輔導<br>專業陷阱教學法，精準提升分數</p>';
  html += `<a class="btn-cta whatsapp" href="https://wa.me/?text=我想查詢霖楓學苑免費試堂" target="_blank">📱 WhatsApp 免費試堂</a>`;
  html += '</div>';

  // Action buttons
  html += '<div class="btn-row">';
  html += `<button class="btn-retry" onclick="retryQuiz()">🔄 再測一次</button>`;
  html += `<button class="btn-retry" onclick="newQuiz()">📝 新練習</button>`;
  html += `<button class="btn-cta whatsapp" style="font-size:0.85rem;" onclick="shareScore(${pct}, ${correct}, ${total})">📤 分享成績</button>`;
  html += '</div>';

  document.getElementById('resultsContent').innerHTML = html;
  showScreen('resultsScreen');

  // Confetti for good scores
  if (pct >= 80) spawnConfetti();
}

function retryQuiz() {
  currentIndex = 0;
  score = { correct: 0, incorrect: 0 };
  responses = [];
  quizStartTime = Date.now();
  quizEndTime = null;
  quizQuestions = shuffle([...quizQuestions]);
  showScreen('quizScreen');
  updateQuizHeader();
  renderQuestion();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
}

function newQuiz() {
  showScreen('setupScreen');
}

function shareScore(pct, correct, total) {
  const emoji = pct >= 80 ? '🌟' : pct >= 60 ? '💪' : '📚';
  const text = `${emoji} 我在霖楓學苑完成 P5 SSPA 數學練習！得分：${correct}/${total}（${pct}%）%0A%0A不教數學，教避開陷阱。%0A一齊挑戰下！`;
  window.open(`https://wa.me/?text=${text}`, '_blank');
}

// Confetti animation
function spawnConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E67E22','#2C3E50'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 1.5 + 's';
    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    piece.style.width = (6 + Math.random() * 10) + 'px';
    piece.style.height = (6 + Math.random() * 10) + 'px';
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 3500);
}
</script>
