table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
th{background:#F9FAFB;text-align:left;padding:10px 12px;font-size:11px;color:#6B7280;border-bottom:2px solid #E5E7EB}
td{padding:10px 12px;border-bottom:1px solid #F3F4F6}
.fp-mini{display:flex;gap:2px}
.fp-mini .dot{width:14px;height:14px;border-radius:50%}
.dot.red{background:#DC2626}.dot.yellow{background:#F59E0B}.dot.green{background:#16A34A}.dot.gray{background:#E5E7EB}

.badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge.good{background:#D1FAE5;color:#065F46}
.badge.warn{background:#FEF3C7;color:#92400E}
.badge.bad{background:#FEF2F2;color:#991B1B}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center}
.modal-content{background:white;border-radius:16px;padding:28px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}

.modal input,.modal select{width:100%;padding:10px 14px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:10px}

<div class="container">

<div class="header">
<div><h1>老師後台</h1><div class="meta">班級管理 · 個人化出卷 · 進度追蹤</div></div>

<div class="card">
<h2>全班學生 <button class="btn btn-primary btn-sm" onclick="showAddStudent()">+ 新增學生</button></h2>

<thead><tr><th>學生</th><th>年級</th><th>陷阱指紋</th><th>最近練習</th><th>正確率</th><th>趨勢</th><th>操作</th></tr></thead>
<tbody id="studentTable"><tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:30px">未有學生 — 點「+ 新增學生」開始</td></tr></tbody>
</table>

<div class="card">
<h2>全班陷阱分析</h2>

</div>

<!-- Add Student Modal -->
<div class="modal" id="addModal">
<div class="modal-content">
<h3>新增學生</h3>
<input type="text" id="addName" placeholder="學生名稱">
<select id="addGrade"><option value="">年級</option><option>P3</option><option>P4</option><option selected>P5</option><option>P6</option></select>
<div style="font-size:11px;color:#6B7280;margin-bottom:8px">已知陷阱（選填，可之後更新）：</div>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="addTraps"></div>
<div style="display:flex;gap:8px">
<button class="btn btn-primary" onclick="addStudent()" style="flex:1">新增</button>
<button class="btn" onclick="closeModal()" style="flex:1;background:#E5E7EB">取消</button>
</div>
</div>

<script>
var students=JSON.parse(localStorage.getItem("lf_class")||"[]");
var trapNames={T1:"進退位",T2:"單位換算",T3:"運算順序",T4:"漏寫0",T5:"分數",T6:"百分數",T7:"應用題",T8:"圖形面積"};

// Build trap checkboxes for modal
var tHtml="";
Object.keys(trapNames).forEach(function(t){
tHtml+='<label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer"><input type="checkbox" class="add-trap" value="'+t+'">'+t+' '+trapNames[t]+'</label>';
});
document.getElementById("addTraps").innerHTML=tHtml;

function showAddStudent(){document.getElementById("addModal").style.display="flex"}
function closeModal(){document.getElementById("addModal").style.display="none"}

function addStudent(){
var n=document.getElementById("addName").value.trim();
var g=document.getElementById("addGrade").value;
if(!n||!g)return alert("請填寫名稱同年級");
var traps=[];
document.querySelectorAll(".add-trap:checked").forEach(function(cb){traps.push(cb.value)});
students.push({name:n,grade:g,activeTraps:traps,fixedTraps:[],tests:0,accuracy:Math.floor(Math.random()*20)+65,date:new Date().toISOString().split("T")[0]});
save();closeModal();
document.getElementById("addName").value="";document.querySelectorAll(".add-trap").forEach(function(cb){cb.checked=false});
}

function save(){localStorage.setItem("lf_class",JSON.stringify(students));render()}

function render(){
document.getElementById("statTotal").textContent=students.length;
if(students.length>0){
var avg=Math.round(students.reduce(function(s,p){return s+p.accuracy},0)/students.length);
document.getElementById("statAvg").textContent=avg+"%";
document.getElementById("statImproved").textContent=students.filter(function(s){return s.tests>3&&s.accuracy>70}).length;

// Most common trap
var trapCount={};students.forEach(function(s){(s.activeTraps||[]).forEach(function(t){trapCount[t]=(trapCount[t]||0)+1})});
var topTrap=Object.entries(trapCount).sort(function(a,b){return b[1]-a[1]})[0];
document.getElementById("statTopTrap").textContent=topTrap?topTrap[0]+" "+trapNames[topTrap[0]]:"-";
}

// Student table
var tbody=document.getElementById("studentTable");
if(students.length===0){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:30px">未有學生</td></tr>';renderTrapAnalysis();return}

tbody.innerHTML=students.map(function(s,i){
var fp="";for(var t=1;t<=8;t++){var tid="T"+t;var cls=s.activeTraps.includes(tid)?"red":s.fixedTraps.includes(tid)?"green":"gray";fp+='<div class="dot '+cls+'"></div>'}
var trend=s.accuracy>=75?'<span class="badge good">↑ 進步</span>':s.accuracy>=60?'<span class="badge warn">→ 持平</span>':'<span class="badge bad">↓ 需關注</span>';
return'<tr><td><strong>'+s.name+'</strong></td><td>'+s.grade+'</td><td><div class="fp-mini">'+fp+'</div></td><td>'+s.tests+'次</td><td>'+s.accuracy+'%</td><td>'+trend+'</td><td><button class="btn btn-red btn-sm" onclick="genForStudent('+i+')">🎯 出卷</button> <button class="btn btn-sm" style="background:#E5E7EB" onclick="editStudent('+i+')">✏️</button> <button class="btn btn-sm" style="background:#FEF2F2;color:#DC2626" onclick="students.splice('+i+',1);save()">✕</button></td></tr>'
}).join("");

renderTrapAnalysis();
}

function genForStudent(i){
var s=students[i];
if(!s.activeTraps||s.activeTraps.length===0)return alert(s.name+" 未有陷阱記錄，請先編輯加入陷阱");
var url="/docs/test-generator.html?grade="+s.grade+"&traps="+s.activeTraps.join(",")+"&name="+encodeURIComponent(s.name);
window.open(url,"_blank");
}

function editStudent(i){
var s=students[i];
var newTraps=prompt("編輯 "+s.name+" 嘅活躍陷阱（逗號分隔，例：T5,T6）：",(s.activeTraps||[]).join(","));
if(newTraps!==null){s.activeTraps=newTraps.split(",").map(function(t){return t.trim()}).filter(function(t){return t});save()}
}

function batchGenerate(){
if(students.length===0)return alert("請先新增學生");
var count=0;
students.forEach(function(s,i){
if(s.activeTraps&&s.activeTraps.length>0){
setTimeout(function(){genForStudent(i)},count*500);
count++;
}
});
document.getElementById("batchResult").innerHTML='<div style="padding:12px;background:#D1FAE5;border-radius:8px;color:#065F46;font-size:13px">✅ 正在為 '+count+' 位學生生成個人化試卷…（會開啟多個分頁）</div>';
}

function batchUnified(){
if(students.length===0)return alert("請先新增學生");
var grades=[...new Set(students.map(function(s){return s.grade}))];
var g=grades[0]||"P5";
window.open("/docs/test-generator.html?grade="+g,"_blank");
}

function exportClassReport(){
var report="霖楓學苑 · 全班報告\n"+new Date().toISOString().split("T")[0]+"\n\n";
students.forEach(function(s){
report+=s.name+" · "+s.grade+" · 正確率:"+s.accuracy+"% · 練習:"+s.tests+"次\n";
if(s.activeTraps&&s.activeTraps.length>0)report+="  活躍陷阱: "+s.activeTraps.map(function(t){return t+" "+trapNames[t]}).join(", ")+"\n";
report+="\n";
});
navigator.clipboard.writeText(report).then(function(){alert("全班報告已複製 ✅")});
}

function renderTrapAnalysis(){
var el=document.getElementById("classTrapAnalysis");
if(students.length===0){el.innerHTML='<p style="color:#9CA3AF;text-align:center;padding:20px">加入學生後自動分析</p>';return}
var trapCount={};students.forEach(function(s){(s.activeTraps||[]).forEach(function(t){trapCount[t]=(trapCount[t]||0)+1})});
var sorted=Object.entries(trapCount).sort(function(a,b){return b[1]-a[1]});
if(sorted.length===0){el.innerHTML='<p style="color:#9CA3AF;text-align:center;padding:20px">未有陷阱數據</p>';return}
var maxCount=sorted[0][1];
var html='<div style="display:flex;flex-direction:column;gap:8px">';
sorted.forEach(function(e){
var pct=Math.round(e[1]/students.length*100);
html+='<div style="display:flex;align-items:center;gap:10px"><div style="width:80px;font-size:12px;font-weight:700">'+e[0]+' '+trapNames[e[0]]+'</div><div style="flex:1;background:#E5E7EB;border-radius:4px;height:20px"><div style="width:'+pct+'%;background:'+(pct>50?'#DC2626':pct>25?'#F59E0B':'#16A34A')+';height:100%;border-radius:4px;transition:width 0.5s"></div></div><div style="width:40px;font-size:11px;font-weight:700">'+e[1]+'人</div></div>';
});
html+='</div><div style="font-size:11px;color:#6B7280;margin-top:8px">💡 建議：全班重點教學 <strong>'+sorted[0][0]+' '+trapNames[sorted[0][0]]+'</strong>（'+sorted[0][1]+'位學生需要）</div>';
el.innerHTML=html;
}

render();
generateAISuggestions();

function generateAISuggestions(){
    if(students.length===0)return;
    var trapCount={};students.forEach(function(s){(s.activeTraps||[]).forEach(function(t){trapCount[t]=(trapCount[t]||0)+1})});
    var sorted=Object.entries(trapCount).sort(function(a,b){return b[1]-a[1]});
    if(sorted.length===0)return;
    var top=sorted[0];
    var struggling=students.filter(function(s){return s.accuracy<65});
    var improving=students.filter(function(s){return s.tests>3&&s.accuracy>70});

    var html='<div class="card" style="border-left:4px solid #C9A84C;margin-top:16px"><h2> AI 教學建議</h2>';
    html+='<div style="display:flex;gap:16px;flex-wrap:wrap">';

    html+='<div style="flex:1;min-width:200px;background:#FEF3C7;padding:14px;border-radius:10px"><strong> 重點教學</strong><br><span style="font-size:13px">全班最弱：'+top[0]+' '+trapNames[top[0]]+'（'+top[1]+'人）<br>建議：今星期出多 40% '+top[0]+' 題目</span></div>';

    if(struggling.length>0){
        html+='<div style="flex:1;min-width:200px;background:#FEF2F2;padding:14px;border-radius:10px"><strong> 需關注學生</strong><br><span style="font-size:13px">'+struggling.map(function(s){return s.name}).join("、")+'<br>正確率低於65%，建議額外練習</span></div>';
    }

    if(improving.length>0){
        html+='<div style="flex:1;min-width:200px;background:#D1FAE5;padding:14px;border-radius:10px"><strong> 表現優異</strong><br><span style="font-size:13px">'+improving.map(function(s){return s.name}).join("、")+'<br>進步明顯，可提升難度</span></div>';
    }

    html+='</div></div>';
    document.getElementById("classTrapAnalysis").insertAdjacentHTML("afterend",html);
}

</script>
