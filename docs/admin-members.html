<script>
var members=JSON.parse(localStorage.getItem('lf_members')||'[]');
var leads=JSON.parse(localStorage.getItem('lf_leads')||'[]');

// Merge leads into members if not already present
leads.forEach(function(lead){
var exists=members.find(function(m){return m.phone===lead.phone});
if(!exists){
members.push({
student:lead.student,grade:lead.grade,parent:lead.parent,phone:lead.phone,
plan:'free',activated:lead.time,expiry:null
});
}
});
// Also load from localStorage registrations
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(k.startsWith('lf_member_')){
try{
var m=JSON.parse(localStorage.getItem(k));
var phone=k.replace('lf_member_','');
var exists=members.find(function(x){return x.phone===phone});
if(!exists){
members.push({
student:m.student,grade:m.grade,parent:m.parent,phone:phone,
plan:m.plan||'free',activated:m.registered,expiry:m.expiry
});
}
}catch(e){}
}
}

function updateStats(){
var now=new Date();
var active=members.filter(function(m){return !m.expiry||new Date(m.expiry)>now});
var free=members.filter(function(m){return m.plan==='free'||!m.plan});
var pro=members.filter(function(m){return m.plan==='pro'||m.plan==='trial'});
var expiring=members.filter(function(m){
if(!m.expiry)return false;
var days=Math.ceil((new Date(m.expiry)-now)/86400000);
return days<=7&&days>0;
});
document.getElementById('statActive').textContent=active.length;
document.getElementById('statFree').textContent=free.length;
document.getElementById('statPro').textContent=pro.length;
document.getElementById('statExpiring').textContent=expiring.length;
}

// ========================================
// CSV IMPORT FUNCTIONS
// ========================================
var csvParsedData = [];
var csvImportStats = { new: 0, update: 0, skip: 0 };

function showCsvModal() {
    document.getElementById(\u0027csvModal\u0027).classList.add(\u0027show\u0027);
    resetCsvState();
}

function closeCsvModal() {
    document.getElementById(\u0027csvModal\u0027).classList.remove(\u0027show\u0027);
    resetCsvState();
}

function resetCsvState() {
    csvParsedData = [];
    csvImportStats = { new: 0, update: 0, skip: 0 };
    document.getElementById(\u0027csvUploadArea\u0027).style.display = \u0027\u0027;
    document.getElementById(\u0027csvFileInfo\u0027).style.display = \u0027none\u0027;
    document.getElementById(\u0027csvPreview\u0027).style.display = \u0027none\u0027;
    document.getElementById(\u0027csvMode\u0027).style.display = \u0027none\u0027;
    document.getElementById(\u0027csvImportBtn\u0027).style.display = \u0027none\u0027;
    document.getElementById(\u0027csvFileInput\u0027).value = \u0027\u0027;
}

function handleCsvDrop(e) {
    e.preventDefault();
    e.target.style.borderColor = \u0027#E5E7EB\u0027;
    e.target.style.background = \u0027transparent\u0027;
    var file = e.dataTransfer.files[0];
    if (file) parseCsvFile(file);
}

function handleCsvFile(e) {
    var file = e.target.files[0];
    if (file) parseCsvFile(file);
}

function parseCsvFile(file) {
    if (!file.name.endsWith(\u0027.csv\u0027)) {
        alert(\u0027и«ӢдёҠеӮі .csv ж јејҸжӘ”жЎҲ\u0027);
        return;
    }
    if (file.size > 2 * 1024 * 1024) {
        alert(\u0027жӘ”жЎҲдёҚиғҪи¶…йҒҺ 2MB\u0027);
        return;
    }

    var reader = new FileReader();
    reader.onload = function(e) {
        var text = e.target.result;
        var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });

        if (lines.length < 2) {
            alert(\u0027CSV жӘ”жЎҲжІ’жңүж•ёж“ҡпјҲиҮіе°‘йңҖиҰҒжЁҷйЎҢиЎҢе’Ң1иЎҢж•ёж“ҡпјү\u0027);
            return;
        }

        // Parse header to detect columns
        var header = parseCsvLine(lines[0]);
        var colMap = detectColumns(header);

        if (!colMap.name) {
            alert(\u0027жүҫдёҚеҲ°гҖҢе§“еҗҚгҖҚж¬„дҪҚгҖӮи«Ӣзўәдҝқ CSV з¬¬дёҖиЎҢеҢ…еҗ«пјҡе§“еҗҚ, е№ҙзҙҡ, е®¶й•·йӣ»и©ұ, зҸӯзҙҡ\u0027);
            return;
        }

        // Parse data rows
        csvParsedData = [];
        for (var i = 1; i < lines.length; i++) {
            var cols = parseCsvLine(lines[i]);
            if (cols.length < 2) continue;

            var row = {
                student: (cols[colMap.name] || \u0027\u0027).trim(),
                grade: colMap.grade >= 0 ? (cols[colMap.grade] || \u0027\u0027).trim() : \u0027\u0027,
                phone: colMap.phone >= 0 ? (cols[colMap.phone] || \u0027\u0027).trim() : \u0027\u0027,
                parent: colMap.parent >= 0 ? (cols[colMap.parent] || \u0027\u0027).trim() : \u0027\u0027,
                className: colMap.class >= 0 ? (cols[colMap.class] || \u0027\u0027).trim() : \u0027\u0027
            };
            if (row.student) csvParsedData.push(row);
        }

        // Check for duplicates within members
        csvImportStats = { new: 0, update: 0, skip: 0 };
        csvParsedData.forEach(function(row) {
            var exists = members.find(function(m) {
                return m.phone && row.phone && m.phone === row.phone;
            });
            if (exists) {
                csvImportStats.update++;
            } else if (row.phone && members.some(function(m) { return m.student === row.student && m.grade === row.grade; })) {
                csvImportStats.skip++;
            } else {
                csvImportStats.new++;
            }
        });

        // Show file info
        document.getElementById(\u0027csvFileName\u0027).textContent = \u0027рҹ“„ \u0027 + file.name;
        document.getElementById(\u0027csvRowCount\u0027).textContent = csvParsedData.length + \u0027 иЎҢж•ёж“ҡ\u0027;
        document.getElementById(\u0027csvFileInfo\u0027).style.display = \u0027flex\u0027;

        // Show preview
        renderCsvPreview();
        document.getElementById(\u0027csvPreview\u0027).style.display = \u0027block\u0027;
        document.getElementById(\u0027csvMode\u0027).style.display = \u0027block\u0027;
        document.getElementById(\u0027csvImportBtn\u0027).style.display = \u0027block\u0027;
    };
    reader.readAsText(file, \u0027UTF-8\u0027);
}

function parseCsvLine(line) {
    var result = [];
    var current = \u0027\u0027;
    var inQuotes = false;
    for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        if (ch === \u0027"\u0027) {
            inQuotes = !inQuotes;
        } else if (ch === \u0027,\u0027 && !inQuotes) {
            result.push(current);
            current = \u0027\u0027;
        } else {
            current += ch;
        }
    }
    result.push(current);
    return result;
}

function detectColumns(header) {
    var map = { name: -1, grade: -1, phone: -1, parent: -1, class: -1 };
    header.forEach(function(h, i) {
        var hLower = h.toLowerCase().trim();
        if (hLower.includes(\u0027е§“еҗҚ\u0027) || hLower.includes(\u0027name\u0027) || hLower.includes(\u0027еӯёз”ҹ\u0027) || hLower.includes(\u0027student\u0027)) map.name = i;
        if (hLower.includes(\u0027е№ҙзҙҡ\u0027) || hLower.includes(\u0027grade\u0027) || hLower.includes(\u0027p\u0027) && hLower.length <= 3) map.grade = i;
        if (hLower.includes(\u0027йӣ»и©ұ\u0027) || hLower.includes(\u0027phone\u0027) || hLower.includes(\u0027tel\u0027) || hLower.includes(\u0027жүӢж©ҹ\u0027) || hLower.includes(\u0027mobile\u0027)) map.phone = i;
        if (hLower.includes(\u0027е®¶й•·\u0027) || hLower.includes(\u0027parent\u0027) || hLower.includes(\u0027иҒҜзөЎдәә\u0027)) map.parent = i;
        if (hLower.includes(\u0027зҸӯзҙҡ\u0027) || hLower.includes(\u0027class\u0027) || hLower.includes(\u0027зө„еҲҘ\u0027) || hLower.includes(\u0027group\u0027)) map.class = i;
    });
    // Fallback: try positional mapping
    if (map.name < 0 && header.length >= 1) map.name = 0;
    if (map.grade < 0 && header.length >= 2 && (header[1] || \u0027\u0027).match(/^[PS]\d$/i)) map.grade = 1;
    if (map.phone < 0 && header.length >= 3 && (header[2] || \u0027\u0027).match(/^\d/)) map.phone = 2;
    return map;
}

function renderCsvPreview() {
    var html = \u0027\u0027;
    csvParsedData.forEach(function(row, i) {
        var status = \u0027\u0027;
        var statusColor = \u0027\u0027;
        var exists = members.find(function(m) {
            return m.phone && row.phone && m.phone === row.phone;
        });
        if (exists) {
            status = \u0027рҹ”„ жӣҙж–°\u0027;
            statusColor = \u0027#F59E0B\u0027;
        } else if (row.phone && members.some(function(m) { return m.student === row.student && m.grade === row.grade; })) {
            status = \u0027вҡ пёҸ еҗҢеҗҚи·ійҒҺ\u0027;
            statusColor = \u0027#9CA3AF\u0027;
        } else {
            status = \u0027вңЁ ж–°еўһ\u0027;
            statusColor = \u0027#16A34A\u0027;
        }
        html += \u0027<tr>\u0027 +
            \u0027<td>\u0027 + (i + 1) + \u0027</td>\u0027 +
            \u0027<td><b>\u0027 + escHtml(row.student) + \u0027</b></td>\u0027 +
            \u0027<td>\u0027 + escHtml(row.grade) + \u0027</td>\u0027 +
            \u0027<td>\u0027 + escHtml(row.parent) + \u0027</td>\u0027 +
            \u0027<td style="font-size:10px">\u0027 + escHtml(row.phone) + \u0027</td>\u0027 +
            \u0027<td>\u0027 + escHtml(row.className) + \u0027</td>\u0027 +
            \u0027<td style="color:\u0027 + statusColor + \u0027;font-weight:700">\u0027 + status + \u0027</td>\u0027 +
        \u0027</tr>\u0027;
    });
    document.getElementById(\u0027csvPreviewBody\u0027).innerHTML = html;
    document.getElementById(\u0027csvNewCount\u0027).textContent = \u0027рҹҹў ж–°еўһ \u0027 + csvImportStats.new + \u0027 дәә\u0027;
    document.getElementById(\u0027csvUpdateCount\u0027).textContent = \u0027рҹҹЎ жӣҙж–° \u0027 + csvImportStats.update + \u0027 дәә\u0027;
    document.getElementById(\u0027csvSkipCount\u0027).textContent = \u0027вҡӘ и·ійҒҺ \u0027 + csvImportStats.skip + \u0027 дәә\u0027;
}

function escHtml(str) {
    return (str || \u0027\u0027).replace(/&/g, \u0027&amp;\u0027).replace(/</g, \u0027&lt;\u0027).replace(/>/g, \u0027&gt;\u0027).replace(/"/g, \u0027&quot;\u0027);
}

function doCsvImport() {
    if (!csvParsedData.length) return;

    var updateMode = document.getElementById(\u0027csvUpdateMode\u0027).checked;
    var imported = 0;
    var updated = 0;

    csvParsedData.forEach(function(row) {
        if (!row.student) return;

        var exists = members.find(function(m) {
            return m.phone && row.phone && m.phone === row.phone;
        });

        if (exists && updateMode) {
            // Update existing
            exists.student = row.student;
            exists.grade = row.grade || exists.grade;
            exists.parent = row.parent || exists.parent;
            updated++;
        } else if (!exists && !(row.phone && members.some(function(m) { return m.student === row.student && m.grade === row.grade; }))) {
            // New member
            members.push({
                student: row.student,
                grade: row.grade || \u0027P5\u0027,
                parent: row.parent || \u0027е®¶й•·\u0027,
                phone: row.phone || \u0027\u0027,
                plan: \u0027free\u0027,
                activated: new Date().toISOString(),
                expiry: null
            });
            imported++;
        }
    });

    localStorage.setItem(\u0027lf_members\u0027, JSON.stringify(members));
    closeCsvModal();
    renderTable();
    alert(\u0027вң… е°Һе…Ҙе®ҢжҲҗпјҒ\nж–°еўһ \u0027 + imported + \u0027 дәә\nжӣҙж–° \u0027 + updated + \u0027 дәә\nзёҪиЁҲиҷ•зҗҶ \u0027 + (imported + updated) + \u0027 зӯҶиЁҳйҢ„\u0027);
}

function renderTable(){
var q=(document.getElementById('searchInput').value||'').toLowerCase();
var fp=document.getElementById('filterPlan').value;
var fs=document.getElementById('filterStatus').value;
var now=new Date();

var filtered=members.filter(function(m){
if(q&&!(m.student||'').toLowerCase().includes(q)&&!(m.parent||'').toLowerCase().includes(q)&&!(m.phone||'').includes(q))return false;
if(fp!=='all'&&(m.plan||'free')!==fp)return false;
if(fs==='active'&&m.expiry&&new Date(m.expiry)<=now)return false;
if(fs==='expiring'){
if(!m.expiry)return false;
var days=Math.ceil((new Date(m.expiry)-now)/86400000);
if(days>7||days<=0)return false;
}
if(fs==='expired'&&(!m.expiry||new Date(m.expiry)>now))return false;
return true;
});

var html='';
if(!filtered.length){
html='<tr><td colspan=8 style=text-align:center;color:#9CA3AF;padding:30px>жІ’жңүз¬ҰеҗҲзҡ„жңғе“Ў</td></tr>';
}else{
filtered.forEach(function(m){
var planName=m.plan==='pro'?'Pro':m.plan==='trial'?'и©Ұз”Ё':'е…ҚиІ»';
var planBadge=m.plan==='pro'?'badge-active':m.plan==='trial'?'badge-trial':'badge-free';
var expiryText=m.expiry?new Date(m.expiry).toLocaleDateString('zh-HK'):'ж°ёд№…';
var daysLeft='';
if(m.expiry){
var days=Math.ceil((new Date(m.expiry)-now)/86400000);
daysLeft=days>30?'вң…':days>7?'вҡ пёҸ '+days+'ж—Ҙ':days>0?'рҹ”ҙ '+days+'ж—Ҙ':'вқҢ е·ІйҒҺжңҹ';
}
// Get usage
var q=JSON.parse(localStorage.getItem('lf_quota_'+(m.student||'unknown'))||'{}');
var used=q.used||0;
var thisMonth=new Date().toISOString().slice(0,7);
if(q.month!==thisMonth)used=0;

html+='<tr>';
html+='<td><strong>'+(m.student||'-')+'</strong></td>';
html+='<td>'+(m.grade||'-')+'</td>';
html+='<td>'+(m.parent||'-')+'</td>';
html+='<td style=font-size:10px>'+(m.phone||'-')+'</td>';
html+='<td><span class=badge '+planBadge+'>'+planName+'</span></td>';
html+='<td style=font-size:10px>'+expiryText+'<br>'+daysLeft+'</td>';
html+='<td>'+used+'ж¬Ў</td>';
html+='<td><button class=btn btn-outline style=font-size:10px;padding:4px 10px onclick=renewMember(\''+(m.phone||'')+'\')>зәҢжңҹ</button> <button class=btn style=font-size:10px;padding:4px 10px;background:#DC2626;color:white onclick=deleteMember(\''+(m.phone||'')+'\')>еҲӘйҷӨ</button></td>';
html+='</tr>';
});
}
document.getElementById('memberTable').innerHTML=html;
updateStats();
renderExpiry();
}

function renderExpiry(){
var now=new Date();
var expiring=members.filter(function(m){
if(!m.expiry)return false;
var days=Math.ceil((new Date(m.expiry)-now)/86400000);
return days<=30&&days>0;
}).sort(function(a,b){return new Date(a.expiry)-new Date(b.expiry)});

if(!expiring.length){
document.getElementById('expiryList').innerHTML='<p style=color:#9CA3AF;font-size:12px;text-align:center;padding:16px>жІ’жңүеҚіе°ҮеҲ°жңҹзҡ„жңғе“Ў вң…</p>';
return;
}
document.getElementById('expiryList').innerHTML=expiring.map(function(m){
var days=Math.ceil((new Date(m.expiry)-now)/86400000);
return '<div style=display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #F3F4F6;font-size:12px><div><strong>'+(m.student||'-')+'</strong> В· '+(m.parent||'-')+' В· <span style=color:#6B7280>'+(m.phone||'-')+'</span></div><div style=text-align:right><span style=color:'+(days<=7?'#DC2626':'#D97706')+';font-weight:700>'+days+' ж—Ҙ</span><br><span style=font-size:10px;color:#6B7280>'+new Date(m.expiry).toLocaleDateString('zh-HK')+'</span></div><button class=btn btn-outline style=font-size:10px;padding:4px 10px;margin-left:8px onclick=renewMember(\''+(m.phone||'')+'\')>зәҢжңҹ</button></div>';
}).join('');
}

function showAddModal(){document.getElementById('addModal').classList.add('show')}
function closeModal(){document.getElementById('addModal').classList.remove('show')}

function addMember(){
var s=document.getElementById('addStudent').value.trim();
var p=document.getElementById('addPhone').value.trim();
if(!s||!p)return alert('и«Ӣијёе…Ҙеӯёз”ҹе§“еҗҚе’ҢжүӢж©ҹиҷҹзўј');
var plan=document.getElementById('addPlan').value;
var dur=parseInt(document.getElementById('addDuration').value);
var expiry=null;
if(plan!=='free'){var e=new Date();e.setMonth(e.getMonth()+dur);expiry=e.toISOString()}
members.push({
student:s,grade:document.getElementById('addGrade').value,
parent:document.getElementById('addParent').value||'е®¶й•·',
phone:p,plan:plan,activated:new Date().toISOString(),expiry:expiry
});
localStorage.setItem('lf_members',JSON.stringify(members));
closeModal();renderTable();
document.getElementById('addStudent').value='';document.getElementById('addPhone').value='';
}

function renewMember(phone){
var m=members.find(function(x){return x.phone===phone});
if(!m)return;
var months=prompt('зәҢжңҹе№ҫеҖӢжңҲпјҹ','12');
if(!months)return;
var expiry=new Date();
if(m.expiry&&new Date(m.expiry)>new Date()){expiry=new Date(m.expiry)}
expiry.setMonth(expiry.getMonth()+parseInt(months));
m.expiry=expiry.toISOString();m.plan='pro';
localStorage.setItem('lf_members',JSON.stringify(members));
renderTable();alert('е·ІзәҢжңҹ '+months+' еҖӢжңҲ вң…');
}

function deleteMember(phone){
if(!confirm('зўәе®ҡеҲӘйҷӨжӯӨжңғе“ЎпјҹжӯӨж“ҚдҪңз„Ўжі•йӮ„еҺҹгҖӮ'))return;
members=members.filter(function(x){return x.phone!==phone});
localStorage.setItem('lf_members',JSON.stringify(members));
renderTable();
}

function exportMembers(){
var csv='еӯёз”ҹ,е№ҙзҙҡ,е®¶й•·,йӣ»и©ұ,иЁҲеҠғ,еҲ°жңҹж—Ҙ\n';
members.forEach(function(m){
csv+=(m.student||'')+','+(m.grade||'')+','+(m.parent||'')+','+(m.phone||'')+','+(m.plan||'free')+','+(m.expiry||'ж°ёд№…')+'\n';
});
var blob=new Blob(['п»ҝ'+csv],{type:'text/csv;charset=utf-8'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');a.href=url;a.download='lamfung_members_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

renderTable();
