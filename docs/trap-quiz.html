// LF Live Question Generator — creates unlimited unique math questions on-the-fly
// Uses parameterized templates with random values

var LFGen = {
  _bankCache: {},

  // Load grade bank
  loadBank: function(grade) {
    var self = this;
    if (this._bankCache[grade]) {
      return Promise.resolve(this._bankCache[grade]);
    }
    return fetch('/docs/data/question_bank_' + grade + '.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        self._bankCache[grade] = data;
        return data;
      })
      .catch(function() { return []; });
  },

  // Get random questions from bank
  getQuestions: function(grade, count) {
    var pool = this._bankCache[grade] || [];
    if (pool.length < 5) {
      // Generate on-the-fly instead
      return this.generateQuestions(grade, count);
    }
    var shuffled = pool.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = t;
    }
    return shuffled.slice(0, Math.min(count, shuffled.length));
  },

  // Generate fresh questions on-the-fly (client side AI)
  generateQuestions: function(grade, count) {
    var qs = [];
    var trapTypes = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10'];
    for (var n = 0; n < count; n++) {
      var trap = trapTypes[Math.floor(Math.random() * trapTypes.length)];
      var q = this._generateOne(grade, trap);
      if (q) qs.push(q);
    }
    return qs;
  },

  _generateOne: function(grade, trap) {
    var a, b, c, name, item, correct, wrongs, opts, unit;
    var names = ['小明','小美','家豪','Chloe','婷婷','志偉','詠詩'];

    if (trap === 'T1' && grade === 'P3') {
      a = rand(20,200); b = rand(10,150);
      correct = a + b; wrongs = [correct+1, correct-1, correct+10];
      return makeQ(a + ' + ' + b + ' = ?', correct, wrongs, 'T1', grade);
    }
    if (trap === 'T1' && grade === 'P4') {
      a = rand(1000,8000); b = rand(500,3000);
      correct = a + b; wrongs = [correct+1, correct-10, correct+100];
      return makeQ(a + ' + ' + b + ' = ?', correct, wrongs, 'T1', grade);
    }
    if (trap === 'T1' && (grade === 'P5' || grade === 'P6')) {
      a = rand(10000,50000); b = rand(5000,20000);
      correct = a + b; wrongs = [correct+10, correct-100, correct+1000];
      return makeQ(a + ' + ' + b + ' = ?', correct, wrongs, 'T1', grade);
    }
    if (trap === 'T2') {
      var units = {P3:[['米','厘米',100]],P4:[['公里','米',1000]],P5:[['平方米','平方厘米',10000]],P6:[['公里','米',1000]]};
      var u = (units[grade]||units.P5)[0];
      a = rand(1,10); correct = a * u[2]; wrongs = [correct*10, correct/10, correct*2];
      return makeQ(a + ' ' + u[0] + ' = ? ' + u[1], correct, wrongs, 'T2', grade);
    }
    if (trap === 'T3') {
      a = rand(2,20); b = rand(2,10); c = rand(2,8);
      var patterns = [
        [a + ' + ' + b + ' × ' + c, a + b * c],
        ['(' + a + ' + ' + b + ') × ' + c, (a + b) * c]
      ];
      var p = patterns[Math.floor(Math.random() * 2)];
      correct = p[1]; wrongs = [correct+4, correct-3, correct*2];
      return makeQ(p[0] + ' = ?', correct, wrongs, 'T3', grade);
    }
    if (trap === 'T4') {
      if (grade === 'P3' || grade === 'P4') {
        var pairs = [[408,2],[306,3],[804,2],[1020,4],[1500,5]];
        var p2 = pairs[Math.floor(Math.random()*pairs.length)];
        correct = Math.floor(p2[0] / p2[1]); wrongs = [correct*10, correct/10, correct+1];
        return makeQ(p2[0] + ' ÷ ' + p2[1] + ' = ?', correct, wrongs, 'T4', grade);
      } else {
        a = round(rand(1,50)/10, 1); b = round(rand(2,9)/10, 1);
        correct = round(a / b, 2); wrongs = [round(correct*10,1), round(correct/10,2), round(correct+1,1)];
        return makeQ(a + ' ÷ ' + b + ' = ?', correct, wrongs, 'T4', grade);
      }
    }
    if (trap === 'T5') {
      var den = [2,3,4,5,6,8][Math.floor(Math.random()*6)];
      var n1 = rand(1,den-1); var n2 = rand(1,den-1);
      correct = n1 + n2; wrongs = [correct+1, correct-1, den];
      if (correct >= den) { n1 = rand(1,Math.floor(den/2)); correct = n1 + 1; }
      return makeQ(n1 + '/' + den + ' + 1/' + den + ' = ?', correct + '/' + den, wrongs.map(function(w){return w+'/'+den}), 'T5', grade);
    }
    if (trap === 'T6') {
      var pairs6 = [[200,15],[400,20],[500,25],[800,10],[300,30]];
      var p6 = pairs6[Math.floor(Math.random()*pairs6.length)];
      correct = Math.floor(p6[0] * p6[1] / 100);
      wrongs = [correct*2, correct + p6[0]/10, correct + 5];
      return makeQ('$' + p6[0] + ' 的 ' + p6[1] + '% 是多少？', correct, wrongs, 'T6', grade);
    }
    if (trap === 'T7') {
      name = names[Math.floor(Math.random()*names.length)];
      a = rand(10,50); b = rand(2,10);
      return makeQ(name + '有' + a + '粒糖，食咗' + b + '粒，仲有幾多？', a - b, [a, b, a+b], 'T7', grade);
    }
    if (trap === 'T8') {
      var w8 = rand(3,12); var h8 = rand(2,8);
      if (Math.random() > 0.5) {
        return makeQ('長方形長' + w8 + 'cm闊' + h8 + 'cm，面積？', w8*h8 + 'cm²', [2*(w8+h8)+'cm', w8+h8+'cm', w8*h8*2+'cm²'], 'T8', grade);
      } else {
        return makeQ('正方形邊長' + w8 + 'cm，面積？', w8*w8 + 'cm²', [w8*4+'cm', w8*2+'cm', w8*w8*2+'cm²'], 'T8', grade);
      }
    }
    if (trap === 'T9') {
      a = rand(1,4); b = rand(1,59);
      correct = a * 60 + b;
      wrongs = [a * 100 + b, a * 60, correct + 60];
      return makeQ(a + '小時' + b + '分鐘 = ? 分鐘', correct, wrongs, 'T9', grade);
    }
    if (trap === 'T10') {
      var div = rand(10,200); var div2 = [3,4,5,6][Math.floor(Math.random()*4)];
      var q10 = Math.floor(div / div2); var r10 = div % div2;
      if (r10 === 0) { div++; r10 = div % div2; }
      correct = q10 + '餘' + r10;
      wrongs = [(q10+1)+'餘'+Math.max(0,r10-1), q10+'餘'+(r10+1), (q10+Math.floor(Math.random()*2)+1)+'餘'+r10];
      return makeQ(div + ' ÷ ' + div2 + ' = ?', correct, wrongs, 'T10', grade);
    }
    return null;
  }
};

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function round(v, d) { var m = Math.pow(10, d); return Math.round(v * m) / m; }
function makeQ(text, answer, wrongs, trap, grade) {
  var correctStr = String(answer);
  var wrongStrs = wrongs.map(function(w) { return String(w).replace('NaN','0'); });
  var all = [correctStr].concat(wrongStrs.slice(0,3));
  // Deduplicate
  var clean = []; var seen = {};
  all.forEach(function(o) { if (!seen[o] && o && o.length > 0) { clean.push(o); seen[o] = true; } });
  if (clean.length < 3) {
    // Pad with fake options
    for (var i = 0; i < 10; i++) {
      var fake = String(rand(1, 99));
      if (!seen[fake]) { clean.push(fake); seen[fake] = true; if (clean.length >= 4) break; }
    }
  }
  // Shuffle
  for (var i = clean.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = clean[i]; clean[i] = clean[j]; clean[j] = t;
  }
  var ansIdx = clean.indexOf(correctStr);
  if (ansIdx < 0) { clean[0] = correctStr; clean = clean.slice(0,4); ansIdx = 0; }
  return { q: text, opts: clean.slice(0,4), ans: ansIdx, trap: trap, grade: grade, source: 'live_gen' };
}

var D=B[g]||B.P5;
var g="P3",i=0,A=[],sel=null;

function pickGrade(v,el){g=v;document.querySelectorAll('.grade-btn').forEach(function(b){b.classList.remove('on')});el.classList.add('on');D=B[g]||B.P5}

function start(){
// Load from question bank for maximum variety
var pool=B[g];
if(!pool||pool.length===0){
// Fallback: try loading from grade bank JSON
loadFromBank(g);
return
}
shuffleAndStart(pool);
}

function loadFromBank(grade){
document.getElementById('start').innerHTML='<h1>載入題庫中...</h1><div class=sub>正在為你準備 '+grade+' 嘅全新題目</div>';
fetch('/docs/data/question_bank_'+grade+'.json')
.then(function(r){return r.json()})
.then(function(data){
if(data&&data.length>10){
// Cache in B for future use
B[grade]=data.map(function(q){return {q:q.q,o:q.opts,c:q.ans,w:0,t:q.trap,n:(q.trap||'T7'),d:''}});
pool=B[grade];
shuffleAndStart(pool);
}else{
// Fallback to embedded pool
shuffleAndStart(B[grade]||B.P5);
}
})
.catch(function(){
shuffleAndStart(B[grade]||B.P5);
});
}

function shuffleAndStart(pool){
var shuffled=pool.slice();
for(var j=shuffled.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var t=shuffled[j];shuffled[j]=shuffled[k];shuffled[k]=t}
D=shuffled.slice(0,Math.min(10,shuffled.length));
totalQ=D.length;i=0;A=[];sel=null;
document.getElementById('start').style.display='none';
document.getElementById('quiz').style.display='block';
document.getElementById('result').style.display='none';
showQ();
}

function showQ(){
var q=D[i];
document.getElementById('qn').textContent='第 '+(i+1)+'/'+D.length+' 題';
document.getElementById('qt').textContent=q.q;
document.getElementById('bar').style.width=((i/D.length)*100)+'%';
document.getElementById('nx').disabled=true;sel=null;
var h='';
q.o.forEach(function(o,j){
h+='<button class=\"opt-btn\" onclick=\"pick('+j+',this)\">'+['A','B','C','D'][j]+'. '+o+'</button>';
});
document.getElementById('op').innerHTML=h;
}

function pick(j,el){
document.querySelectorAll('.opt-btn').forEach(function(b){b.classList.remove('pick')});
el.classList.add('pick');sel=j;
document.getElementById('nx').disabled=false;
}

function nextQ(){
var q=D[i];
document.querySelectorAll('.opt-btn').forEach(function(b,j){
if(j===q.c)b.classList.add('right');
if(j===sel&&sel!==q.c)b.classList.add('wrong');
});
A.push({t:q.t,ok:sel===q.c});
i++;
if(i<D.length){setTimeout(showQ,500)}
else{document.getElementById('bar').style.width='100%';setTimeout(showR,600)}
}

function showR(){
document.getElementById('quiz').style.display='none';
document.getElementById('result').style.display='block';

var ts={};A.forEach(function(a){if(!ts[a.t])ts[a.t]=0;if(!a.ok)ts[a.t]++});
var sorted=Object.entries(ts).sort(function(a,b){return b[1]-a[1]});
var ok=A.filter(function(a){return a.ok}).length;
var pct=Math.round(ok/D.length*100);

var gt,tt,st;
if(pct>=80){gt='優秀';tt='你數學根基好好！';st='答對 '+ok+'/'+D.length+' 題';}
else if(pct>=50){gt='中等';tt='你有固定陷阱位';st='答對 '+ok+'/'+D.length+' 題';}
else{gt='需要幫助';tt='陷阱盲點比較多';st='答對 '+ok+'/'+D.length+' 題。唔使擔心！';}
document.getElementById('rg').textContent=gt;
document.getElementById('rt').textContent=tt;
document.getElementById('rs').textContent=st;

var fp='',trapMap={};D.forEach(function(d){trapMap[d.t]={n:d.n}});
Object.entries(ts).sort(function(a,b){return parseInt(a[0].slice(1))-parseInt(b[0].slice(1))}).forEach(function(e){
var cls=e[1]>=2?'risk':e[1]>=1?'mid':'safe';
fp+='<div class=\"fp-dot '+cls+'\" title=\"'+trapMap[e[0]].n+'\">'+e[0].slice(1)+'</div>';
});
document.getElementById('fp').innerHTML=fp;

var tl='';
sorted.forEach(function(e){
var score=e[1];var cls=score>=2?'🔴':score>=1?'⚠️':'✅';
tl+='<div style=\"display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 14px;margin:6px 0;text-align:left\"><span style=\"font-size:20px\">'+cls+'</span><div style=\"flex:1\"><div style=\"font-weight:700;font-size:13px\">'+trapMap[e[0]].n+'</div></div><span style=\"font-weight:900\">'+e[1]+'次</span></div>';
});
document.getElementById('tl').innerHTML=tl;

// Save
try{localStorage.setItem('lf_diag',JSON.stringify({date:new Date().toISOString(),grade:g,ok:ok,total:D.length,pct:pct}))}catch(e){}
}
