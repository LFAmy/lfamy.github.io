<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1A3C6D">
<title>霖楓學苑 · 註冊 | LF Academy Sign Up</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700;900&family=Noto+Serif+HK:wght@600;700;900&display=swap');
:root{--blue:#1A3C6D;--blue-light:#1E4D8C;--gold:#C9A84C;--red:#DC2626;--green:#16A34A;--white:#FFF;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;--gray-600:#6B7280;--gray-800:#374151;--gray-900:#1A1A1A;--radius:14px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK',sans-serif;background:linear-gradient(135deg,#0F2440 0%,#1A3C6D 40%,#1E4D8C 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--gray-900)}
.container{background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:480px;width:100%;padding:40px 32px;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-family:'Noto Serif HK',serif;font-size:26px;color:var(--blue);letter-spacing:2px}
.logo .sub{font-size:13px;color:var(--gold);margin-top:4px;font-weight:500}
.tabs{display:flex;gap:0;margin-bottom:28px;background:var(--gray-100);border-radius:var(--radius-sm);padding:4px}
.tab{flex:1;padding:10px;text-align:center;border:none;background:transparent;font-size:14px;font-weight:700;cursor:pointer;border-radius:8px;transition:all 0.2s;font-family:'Noto Sans HK',sans-serif;color:var(--gray-600)}
.tab.active{background:white;color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--gray-800);margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;font-family:'Noto Sans HK',sans-serif;transition:all 0.2s;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,60,109,0.1)}
.form-group .hint{font-size:11px;color:var(--gray-400);margin-top:3px}
.role-select{display:flex;gap:8px;margin-bottom:16px}
.role-option{flex:1;padding:14px 10px;text-align:center;border:2px solid var(--gray-200);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s;background:white;font-family:'Noto Sans HK',sans-serif;font-size:13px;font-weight:600}
.role-option:hover{border-color:var(--gold)}
.role-option.active{border-color:var(--blue);background:#F0F4FF}
.role-option .emoji{font-size:24px;display:block;margin-bottom:4px}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),var(--blue-light));color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans HK',sans-serif;letter-spacing:1px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,60,109,0.3)}
.btn-google{width:100%;padding:11px;background:white;color:var(--gray-800);border:2px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Noto Sans HK',sans-serif;transition:all 0.2s}
.btn-google:hover{border-color:var(--gray-400)}
.divider{display:flex;align-items:center;margin:18px 0;color:var(--gray-400);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;border-top:1px solid var(--gray-200)}
.divider span{padding:0 12px}
.login-link{text-align:center;margin-top:20px;font-size:13px;color:var(--gray-600)}
.login-link a{color:var(--blue);font-weight:700;text-decoration:none}
.login-link a:hover{text-decoration:underline}
.error-msg{background:var(--red);color:white;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:none}
.success-msg{background:var(--green);color:white;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:none}
#parentFields,#teacherFields{display:none}
</style>
</head>
<body>
<div class="container">
<div class="logo">
<h1>霖楓學苑</h1>
<div class="sub">LF Academy · 註冊加入</div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('email')">📧 電郵註冊</button>
<button class="tab" onclick="switchTab('phone')">📱 電話註冊</button>
</div>

<div id="errorMsg" class="error-msg"></div>
<div id="successMsg" class="success-msg"></div>

<!-- Role Selection -->
<div class="role-select" id="roleSelect">
<button class="role-option active" onclick="selectRole('parent')" id="roleParent">
<span class="emoji">👨‍👩‍👧</span>家長
</button>
<button class="role-option" onclick="selectRole('teacher')" id="roleTeacher">
<span class="emoji">👩‍🏫</span>老師
</button>
<button class="role-option" onclick="selectRole('student')" id="roleStudent">
<span class="emoji">🎒</span>學生
</button>
</div>
<input type="hidden" id="role" value="parent">

<form id="signupForm" onsubmit="handleSignup(event)">
<!-- Common Fields -->
<div class="form-group">
<label>中文姓名</label>
<input type="text" id="displayName" placeholder="陳大文" required>
</div>

<div class="form-group" id="emailGroup">
<label>電郵地址</label>
<input type="email" id="email" placeholder="example@gmail.com" required>
</div>

<div class="form-group" id="phoneGroup" style="display:none">
<label>電話號碼 (WhatsApp)</label>
<input type="tel" id="phone" placeholder="98765432">
<div class="hint">用於接收上堂提醒及WhatsApp通知</div>
</div>

<div class="form-group">
<label>密碼</label>
<input type="password" id="password" placeholder="最少8位，包含英文及數字" minlength="8" required>
</div>

<div class="form-group">
<label>確認密碼</label>
<input type="password" id="confirmPassword" placeholder="再次輸入密碼" minlength="8" required>
</div>

<!-- Parent-specific fields -->
<div id="parentFields">
<div class="form-group">
<label>子女年級</label>
<select id="childGrade">
<option value="">請選擇</option>
<option value="P3">小學三年級 (P3)</option>
<option value="P4">小學四年級 (P4)</option>
<option value="P5">小學五年級 (P5)</option>
<option value="P6">小學六年級 (P6)</option>
</select>
</div>
<div class="form-group">
<label>子女學校 (選填)</label>
<input type="text" id="childSchool" placeholder="例如：聖保羅書院小學">
</div>
</div>

<!-- Teacher-specific fields -->
<div id="teacherFields">
<div class="form-group">
<label>教學經驗</label>
<select id="teachingExp">
<option value="">請選擇</option>
<option value="0-1">0-1年</option>
<option value="1-3">1-3年</option>
<option value="3-5">3-5年</option>
<option value="5+">5年以上</option>
</select>
</div>
<div class="form-group">
<label>最高學歷</label>
<select id="education">
<option value="">請選擇</option>
<option value="bachelor">學士學位</option>
<option value="master">碩士學位</option>
<option value="doctor">博士學位</option>
<option value="other">其他</option>
</select>
</div>
</div>

<button type="submit" class="btn-submit">✨ 立即註冊，免費陷阱診斷</button>
</form>

<div class="divider"><span>或</span></div>

<button class="btn-google" onclick="signInWithGoogle()">
<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
使用 Google 帳戶註冊
</button>

<div class="login-link">
已有帳戶？<a href="/docs/login.html">立即登入 →</a>
</div>
</div>

<script src="/docs/data/lf-core.js"></script>
<script src="/docs/demo-data.js"></script>
<script src="/docs/data/lf-event-bus.js"></script>
<script>
let currentRole = 'parent';
let currentTab = 'email';

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('emailGroup').style.display = tab === 'email' ? '' : 'none';
    document.getElementById('phoneGroup').style.display = tab === 'phone' ? '' : 'none';
    document.getElementById('email').required = tab === 'email';
    document.getElementById('phone').required = tab === 'phone';
}

function selectRole(role) {
    currentRole = role;
    document.getElementById('role').value = role;
    document.querySelectorAll('.role-option').forEach(r => r.classList.remove('active'));
    document.getElementById('role' + role.charAt(0).toUpperCase() + role.slice(1)).classList.add('active');
    document.getElementById('parentFields').style.display = role === 'parent' ? '' : 'none';
    document.getElementById('teacherFields').style.display = role === 'teacher' ? '' : 'none';
    // Update button text
    const btn = document.querySelector('.btn-submit');
    if (role === 'parent') btn.textContent = '✨ 立即註冊，免費陷阱診斷';
    else if (role === 'teacher') btn.textContent = '✨ 立即註冊，成為霖楓導師';
    else btn.textContent = '✨ 立即註冊，開始學習';
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
}

async function handleSignup(e) {
    e.preventDefault();
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirmPassword').value;
    
    if (pw !== cpw) { showError('密碼不一致，請重新輸入'); return; }
    if (pw.length < 8) { showError('密碼最少需要8位'); return; }

    const userData = {
        role: currentRole,
        displayName: document.getElementById('displayName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        childGrade: document.getElementById('childGrade')?.value || null,
        childSchool: document.getElementById('childSchool')?.value || null,
        teachingExp: document.getElementById('teachingExp')?.value || null,
        education: document.getElementById('education')?.value || null,
        createdAt: new Date().toISOString(),
        source: 'web_signup'
    };

    try {
        // Save to LFCore (local + Firebase sync)
        LFCore.setData('user_' + userData.email, userData);
        LFCore.setData('current_user', userData);
        LFCore.state.isLoggedIn = true;
        LFCore.state.userData = userData;
        LFCore.state.userRole = currentRole;
        
        showSuccess('🎉 註冊成功！即將跳轉...');
        
        // Track event
        if (typeof LFEventBus !== 'undefined') {
            LFEventBus.track('signup_complete', { role: currentRole, method: currentTab });
        }
        
        setTimeout(() => {
            window.location.href = currentRole === 'parent' ? '/docs/parent-center.html' 
                                 : currentRole === 'teacher' ? '/docs/teacher-dashboard.html'
                                 : '/docs/app.html';
        }, 1500);
    } catch (err) {
        showError('註冊失敗：' + err.message);
    }
}

function signInWithGoogle() {
    showError('Google 登入即將推出！請先用電郵註冊。');
}

// Init
document.addEventListener('DOMContentLoaded', () => {
    if (typeof LFEventBus !== 'undefined') {
        LFEventBus.track('page_view', { page: 'signup' });
    }
});
</script>
</body>
</html>
