<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>霖楓學苑 · AI 智能陷阱診斷 2.0</title>
<meta name="description" content="AI自適應數學診斷 — 10分鐘找出學生最弱陷阱類型，生成個人化學習路徑。P3-P6呈分試專家。">
<style>
:root{--b:#1A3C6D;--g:#C9A84C;--r:#DC2626;--gr:#16A34A;--w:#FFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#6B7280;--g800:#374151;--shadow:0 4px 24px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK','PingFang SC','Microsoft YaHei',sans-serif;background:var(--g100);color:var(--g800);min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:20px}

/* Header */
.header{background:linear-gradient(135deg,#0A1A35,#1A3C6D,#1E4D8C);color:white;border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;border:2px solid rgba(201,168,76,0.15);border-radius:50%}
.header h1{font-size:22px;margin-bottom:6px;position:relative}
.header .badge{display:inline-block;background:rgba(201,168,76,0.2);color:var(--g);padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px}
.header p{font-size:13px;opacity:0.75;margin-top:8px;position:relative}

/* Cards */
.card{background:white;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h2{font-size:17px;color:var(--b);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .icon{font-size:22px}

/* Grade Selector */
.grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grade-btn{padding:16px 8px;border:2px solid var(--g200);border-radius:14px;background:white;cursor:pointer;text-align:center;font-size:14px;font-weight:700;transition:all 0.2s;font-family:inherit}
.grade-btn:hover{border-color:var(--g);background:#FFFDF5}
.grade-btn.active{border-color:var(--b);background:var(--b);color:white}
.grade-btn .emoji{font-size:24px;display:block;margin-bottom:4px}

/* Quiz */
.question-card{background:white;border-radius:16px;padding:28px;margin-bottom:16px;box-shadow:var(--shadow);animation:fadeIn 0.3s ease}
.question-card .q-num{font-size:11px;color:var(--g400);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.question-card .q-text{font-size:18px;font-weight:700;margin-bottom:20px;line-height:1.6}
.options{display:grid;gap:10px}
.opt-btn{padding:16px 20px;border:2px solid var(--g200);border-radius:12px;background:white;cursor:pointer;font-size:16px;text-align:left;transition:all 0.15s;font-family:inherit;display:flex;align-items:center;gap:12px}
.opt-btn:hover{border-color:var(--b);background:#F0F5FF}
.opt-btn.correct{border-color:var(--gr);background:#F0FDF4;animation:pulse 0.4s}
.opt-btn.wrong{border-color:var(--r);background:#FEF2F2;animation:shake 0.4s}
.opt-btn .letter{width:32px;height:32px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.opt-btn.correct .letter{background:var(--gr);color:white}
.opt-btn.wrong .letter{background:var(--r);color:white}

/* Progress Bar */
.progress-wrap{background:var(--g200);border-radius:10px;height:6px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--b),var(--g));border-radius:10px;transition:width 0.4s}
.progress-text{font-size:11px;color:var(--g400);text-align:right}

/* Timer */
.timer{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--g100);border-radius:20px;font-size:13px;font-weight:700;color:var(--g600)}
.timer.warning{background:#FEF2F2;color:var(--r);animation:pulse 1s infinite}

/* AI Analysis */
.analysis-card{background:linear-gradient(135deg,#F0FDF4,#FFFDF5);border:1px solid #BBF7D0;border-radius:16px;padding:24px;margin-bottom:16px}
.analysis-card.warn{background:linear-gradient(135deg,#FEF2F2,#FFFDF5);border-color:#FECACA}
.trap-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;margin:2px}
.trap-tag.t1{background:#FFE5E5;color:#DC2626}.trap-tag.t2{background:#E0F2FE;color:#0284C7}
.trap-tag.t3{background:#FEF3C7;color:#D97706}.trap-tag.t4{background:#F3E8FF;color:#7C3AED}
.trap-tag.t5{background:#FCE7F3;color:#DB2777}.trap-tag.t6{background:#D1FAE5;color:#059669}

/* Radar Chart Container */
.radar-container{width:100%;max-width:280px;margin:16px auto}
.radar-label{font-size:10px;fill:var(--g600)}

/* Recommendation */
.rec-item{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--g200);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.rec-item:hover{border-color:var(--g);background:#FFFDF5}
.rec-item .rec-icon{font-size:28px}
.rec-item .rec-info{flex:1}
.rec-item .rec-info h4{font-size:14px;color:var(--b);margin-bottom:2px}
.rec-item .rec-info p{font-size:11px;color:var(--g600)}
.rec-item .rec-arrow{color:var(--g400);font-size:20px}

/* Buttons */
.btn{display:inline-block;padding:14px 36px;border-radius:25px;font-weight:900;font-size:15px;cursor:pointer;border:none;text-align:center;text-decoration:none;transition:all 0.2s;font-family:inherit}
.btn-primary{background:var(--b);color:white;width:100%}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,60,109,0.3)}
.btn-gold{background:linear-gradient(135deg,var(--g),#DFC06A);color:var(--b);width:100%}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.3)}
.btn-outline{background:white;border:2px solid var(--b);color:var(--b)}
.btn-sm{padding:8px 20px;font-size:13px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* AI Thinking Indicator */
.ai-thinking{display:flex;align-items:center;gap:8px;padding:16px;background:#F0F5FF;border-radius:12px;margin:16px 0}
.ai-thinking .dot{width:8px;height:8px;border-radius:50%;background:var(--b);animation:pulse 1.2s infinite}
.ai-thinking .dot:nth-child(2){animation-delay:0.2s}
.ai-thinking .dot:nth-child(3){animation-delay:0.4s}
.ai-thinking span{font-size:12px;color:var(--b);font-weight:500}

/* Score Circle */
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;position:relative}
.score-circle::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:4px solid transparent}
.score-circle.high{color:var(--gr);background:#F0FDF4;border:4px solid #BBF7D0}
.score-circle.mid{color:var(--g);background:#FFFDF5;border:4px solid #FDE68A}
.score-circle.low{color:var(--r);background:#FEF2F2;border:4px solid #FECACA}

@media(max-width:480px){
  .grade-grid{grid-template-columns:repeat(2,1fr)}
  .question-card .q-text{font-size:16px}
}
</style>

</head>

<!-- ═══ STEP 2: QUIZ ═══ -->

    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>AI 正在分析你嘅答題模式...</span>
  </div>
  
  <!-- Score -->
  <div id="analysisContent" style="display:none">
    <div class="card" style="text-align:center">
      <h2><span class="icon">📊</span>診斷結果</h2>
      <div id="scoreCircle" class="score-circle mid">--</div>
      <p style="font-size:13px;color:var(--g600)" id="scoreText"></p>
    </div>

    <!-- Trap Radar -->
    <div class="card">
      <h2><span class="icon">🎯</span>陷阱弱項分析</h2>
      <div class="radar-container">
        <svg id="radarChart" viewBox="0 0 250 250"></svg>
      </div>
      <div id="trapTags" style="text-align:center;margin-top:12px"></div>
    </div>

    <!-- AI Insights -->
    <div id="aiInsights" class="analysis-card"></div>

    <!-- Smart Recommendations -->
    <div class="card">
      <h2><span class="icon">💡</span>AI 個人化學習建議</h2>
      <div id="recommendations"></div>
    </div>

    <!-- CTA -->
    <a href="enroll.html" class="btn btn-gold" style="display:block;margin:16px 0">🎯 免費試堂 · 針對性改善弱項 →</a>
    <button onclick="restartQuiz()" class="btn btn-outline" style="width:100%">🔄 重新診斷</button>
  </div>
</div>

</div>

  // ── INIT ──
  init: function() {
    this.questions = [];
    this.answers = [];
    this.currentQ = 0;
    this.difficulty = 0.5;
    this.timerSec = 0;
    if(this.timerInterval) clearInterval(this.timerInterval);
  },
  
  // ── ADAPTIVE QUESTION SELECTION ──
  selectQuestions: function(grade) {
    var pool = (this.questionPool[grade] || this.questionPool.P5).slice();
    // Shuffle
    for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
    // Select 10 questions with difficulty spread based on adaptive level
    var selected = [];
    var easy = pool.filter(function(q){return q.diff<=0.3});
    var mid = pool.filter(function(q){return q.diff>0.3 && q.diff<=0.5});
    var hard = pool.filter(function(q){return q.diff>0.5});
    
    // Adaptive mix: start easy, increase difficulty
    for(var i=0;i<3;i++){if(easy.length>0)selected.push(easy.splice(Math.floor(Math.random()*easy.length),1)[0]);}
    for(var i=0;i<4;i++){if(mid.length>0)selected.push(mid.splice(Math.floor(Math.random()*mid.length),1)[0]);}
    for(var i=0;i<3;i++){if(hard.length>0)selected.push(hard.splice(Math.floor(Math.random()*hard.length),1)[0]);}
    
    // Fill remaining with random
    while(selected.length<10){
      var remaining = pool.filter(function(q){return !selected.includes(q);});
      if(remaining.length===0) break;
      selected.push(remaining.splice(Math.floor(Math.random()*remaining.length),1)[0]);
    }
    
    this.questions = selected.slice(0,10);
  },
  
  // ── AI ANALYSIS ENGINE ──
  analyze: function() {
    var self = this;
    var trapResults = {};
    var correctByTrap = {};
    var totalByTrap = {};
    
    // Initialize
    for(var t in this.traps){trapResults[t]=0;correctByTrap[t]=0;totalByTrap[t]=0;}
    
    // Analyze each answer
    for(var i=0;i<this.answers.length;i++){
      var a = this.answers[i];
      var q = a.question;
      totalByTrap[q.trap] = (totalByTrap[q.trap]||0) + 1;
      if(a.correct){
        correctByTrap[q.trap] = (correctByTrap[q.trap]||0) + 1;
      }
    }
    
    // Calculate accuracy per trap
    for(var t in totalByTrap){
      if(totalByTrap[t]>0){
        trapResults[t] = Math.round(correctByTrap[t]/totalByTrap[t]*100);
      }
    }
    
    // Find weakest traps
    var weakTraps = [];
    for(var t in trapResults){
      if(totalByTrap[t]>0 && trapResults[t]<70){
        weakTraps.push({trap:t, accuracy:trapResults[t], count:totalByTrap[t]});
      }
    }
    weakTraps.sort(function(a,b){return a.accuracy-b.accuracy;});
    
    // Overall score
    var totalCorrect = this.answers.filter(function(a){return a.correct;}).length;
    var avgTime = this.answers.reduce(function(s,a){return s+a.time;},0)/this.answers.length;
    
    return {
      totalCorrect: totalCorrect,
      totalQuestions: this.answers.length,
      score: Math.round(totalCorrect/this.answers.length*100),
      avgTime: Math.round(avgTime),
      trapResults: trapResults,
      weakTraps: weakTraps.slice(0,3),
      totalByTrap: totalByTrap,
      correctByTrap: correctByTrap
    };
  },
  
  // ── GENERATE AI INSIGHTS ──
  generateInsights: function(analysis) {
    var insights = [];
    var grade = this.grade;
    
    // Overall assessment
    if(analysis.score>=90){
      insights.push({type:'success', text:'🎉 好強！你嘅數學基礎好紮實，大部分陷阱都避開到。建議挑戰更高難度嘅題目或參加競賽班。'});
    } else if(analysis.score>=70){
      insights.push({type:'info', text:'👍 表現唔錯！但有幾個特定陷阱需要加強。專注改善弱項，成績可以再提升10-20分。'});
    } else if(analysis.score>=50){
      insights.push({type:'warn', text:'⚠️ 需要針對性補強。你喺幾個關鍵課題有明顯弱點，呢啲正係呈分試最常考嘅陷阱。'});
    } else {
      insights.push({type:'warn', text:'🔴 基礎需要重新建立。唔使擔心，好多學生一開始都係咁。霖楓嘅陷阱教學法可以幫你一步步改善。'});
    }
    
    // Trap-specific insights
    var weakTraps = analysis.weakTraps;
    for(var i=0;i<weakTraps.length;i++){
      var wt = weakTraps[i];
      var trapInfo = this.traps[wt.trap];
      if(trapInfo){
        insights.push({
          type: wt.accuracy<40?'warn':'info',
          text: trapInfo.icon+' <b>'+trapInfo.name+'</b>：正確率 '+wt.accuracy+'% — '+trapInfo.desc+'。'+
            (wt.accuracy<40?'呢個係你最需要改善嘅課題。':'需要多加練習。')
        });
      }
    }
    
    // Speed analysis
    if(analysis.avgTime<8){
      insights.push({type:'info', text:'⚡ 你答題好快（平均'+analysis.avgTime+'秒），但快唔代表準。建議放慢速度，每題檢查一次先確認。'});
    } else if(analysis.avgTime>20){
      insights.push({type:'info', text:'🐢 你答題較慢（平均'+analysis.avgTime+'秒），可能係概念未夠熟。多做練習可以提高速度。'});
    }
    
    // SSPA prediction (P5-P6 only)
    if((grade==='P5'||grade==='P6') && analysis.score>=85){
      insights.push({type:'success', text:'🎯 SSPA預測：以目前水平，呈分試數學有望取得A級，對升讀Band 1中學好有幫助！'});
    }
    
    return insights;
  },

  generateRecommendations: function(analysis) {
    var recs = [];
    var grade = this.grade;
    
    // Weak trap recommendations
    var weakTraps = analysis.weakTraps;
    for(var i=0;i<Math.min(weakTraps.length,2);i++){
      var wt = weakTraps[i];
      var trapInfo = this.traps[wt.trap];
      if(trapInfo){
        recs.push({
          icon: '🎯',
          title: '針對性練習：'+trapInfo.name,
          desc: '生成'+trapInfo.desc+'嘅專項練習，AI自動調整難度',
          link: 'trap-quiz.html?trap='+wt.trap+'&grade='+grade
        });
      }
    }
    
    // Grade-appropriate lecture recommendations
    var lectureMap = {
      P3: [{title:'多位數加減', link:'講義/P3/LF-P3-上-L01.html'},{title:'周界認識', link:'講義/P3/LF-P3-下-L41.html'}],
      P4: [{title:'大數估算', link:'講義/P4/LF-P4-上-L02.html'},{title:'分數初探', link:'講義/P4/LF-P4-上-L08.html'}],
      P5: [{title:'面積陷阱專項', link:'講義/P5/LF-P5-上-L05_面積陷阱專項.html'},{title:'方程應用題', link:'講義/P5/LF-P5-上-L15_方程應用題.html'}],
      P6: [{title:'速率應用', link:'講義/P6/LF-P6-上-L08.html'},{title:'百分數綜合', link:'講義/P6/LF-P6-上-L05.html'}]
    };
    
    var gradeLectures = lectureMap[grade] || lectureMap.P5;
    recs.push({
      icon: '📖',
      title: '推薦講義：'+gradeLectures[0].title,
      desc: '霖楓陷阱教學法 — 先睇陷阱後做題，效率提升3倍',
      link: gradeLectures[0].link
    });
    
    // SSPA simulation for P5-P6
    if(grade==='P5'||grade==='P6'){
      recs.push({
        icon: '🏆',
        title: 'SSPA呈分試模擬考試',
        desc: '全真模擬呈分試環境，AI批改+詳細報告',
        link: 'sspa-elite.html'
      });
    }
    
    // Boss battle
    recs.push({
      icon: '⚔️',
      title: 'Boss挑戰：打敗數學大魔王',
      desc: '遊戲化練習 — 邊玩邊學，每打敗一個Boss解鎖新技能',
      link: 'kids-boss-battle.html'
    });
    
    return recs;
  }
};

// ═══════════════════════════════════════
// UI CONTROLLER
// ═══════════════════════════════════════

function selectGrade(g){
  LF_AI.init();
  LF_AI.grade = g;
  LF_AI.selectQuestions(g);
  
  // Update UI
  document.querySelectorAll('.grade-btn').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  document.getElementById('stepGrade').style.display = 'none';
  document.getElementById('stepQuiz').style.display = 'block';
  document.getElementById('quizGrade').textContent = g+' · AI自適應診斷';
  
  // Start timer
  LF_AI.timerInterval = setInterval(function(){
    LF_AI.timerSec++;
    var m = Math.floor(LF_AI.timerSec/60);
    var s = LF_AI.timerSec%60;
    document.getElementById('timerVal').textContent = m+':'+(s<10?'0':'')+s;
    if(LF_AI.timerSec>120){
      document.getElementById('timerDisplay').classList.add('warning');
    }
  },1000);
  
  // Show first question
  showQuestion();
}

function showQuestion(){
  var q = LF_AI.questions[LF_AI.currentQ];
  var container = document.getElementById('questionContainer');
  var qStartTime = Date.now();
  
  var letters = ['A','B','C','D'];
  var optsHtml = '';
  for(var i=0;i<q.opts.length;i++){
    optsHtml += '<button class="opt-btn" onclick="submitAnswer('+i+',this,'+qStartTime+')"><span class="letter">'+letters[i]+'</span>'+q.opts[i]+'</button>';
  }
  
  container.innerHTML = 
    '<div class="question-card">'+
    '<div class="q-num">第 '+(LF_AI.currentQ+1)+' 題 · 難度：'+'⭐'.repeat(Math.ceil(q.diff*5))+'</div>'+
    '<div class="q-text">'+q.q+'</div>'+
    '<div class="options">'+optsHtml+'</div>'+
    '</div>';
  
  // Update progress
  var pct = Math.round(LF_AI.currentQ/LF_AI.questions.length*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressText').textContent = LF_AI.currentQ+'/'+LF_AI.questions.length;
}

function submitAnswer(idx, el, qStartTime){
  var q = LF_AI.questions[LF_AI.currentQ];
  var correct = (idx === q.ans);
  var timeTaken = Math.round((Date.now()-qStartTime)/1000);
  
  // Record answer
  LF_AI.answers.push({
    question: q,
    selectedIdx: idx,
    correct: correct,
    time: timeTaken
  });
  
  // Show correct/wrong
  var buttons = document.querySelectorAll('.opt-btn');
  buttons.forEach(function(b){b.style.pointerEvents='none';});
  el.classList.add(correct?'correct':'wrong');
  buttons[q.ans].classList.add('correct');
  
  // Adaptive difficulty adjustment
  if(correct) LF_AI.difficulty = Math.min(1, LF_AI.difficulty+0.05);
  else LF_AI.difficulty = Math.max(0.1, LF_AI.difficulty-0.1);
  
  // Show explanation
  setTimeout(function(){
    var explainDiv = document.createElement('div');
    explainDiv.style.cssText = 'margin-top:12px;padding:12px;background:#F0FDF4;border-radius:10px;font-size:12px;color:#065F46';
    explainDiv.innerHTML = (correct?'✅ 正確！':'❌ 唔緊要！')+' <b>AI解題：</b>'+q.explain;
    document.querySelector('.question-card').appendChild(explainDiv);
    
    // Next button
    var nextBtn = document.createElement('button');
    nextBtn.textContent = LF_AI.currentQ<LF_AI.questions.length-1?'下一題 →':'查看AI分析報告 →';
    nextBtn.className = 'btn btn-primary';
    nextBtn.style.cssText = 'margin-top:12px';
    nextBtn.onclick = function(){
      LF_AI.currentQ++;
      if(LF_AI.currentQ<LF_AI.questions.length){
        showQuestion();
      } else {
        finishQuiz();
      }
    };
    document.querySelector('.question-card').appendChild(nextBtn);
  },600);
}

function finishQuiz(){
  clearInterval(LF_AI.timerInterval);
  document.getElementById('stepQuiz').style.display = 'none';
  document.getElementById('stepAnalysis').style.display = 'block';
  document.getElementById('aiThinking').style.display = 'flex';
  document.getElementById('analysisContent').style.display = 'none';
  
  // Simulate AI analysis delay
  setTimeout(function(){
    var analysis = LF_AI.analyze();
    LFCloud.saveDiagnostic({grade:LF_AI.grade,score:analysis.score,trapResults:analysis.trapResults,weakTraps:analysis.weakTraps,answers:LF_AI.answers}); LFCloud.saveProgressSnapshot();
    
    document.getElementById('aiThinking').style.display = 'none';
    document.getElementById('analysisContent').style.display = 'block';
  },2000);
}

function renderAnalysis(analysis){
  // Score circle
  var circle = document.getElementById('scoreCircle');
  circle.textContent = analysis.score+'%';
  circle.className = 'score-circle '+(analysis.score>=80?'high':analysis.score>=55?'mid':'low');
  document.getElementById('scoreText').textContent = 
    '共'+analysis.totalQuestions+'題 · 答對'+analysis.totalCorrect+'題 · 平均用時'+analysis.avgTime+'秒/題';
  
  // Radar chart
  drawRadar(analysis.trapResults, analysis.totalByTrap);
  
  // Trap tags
  var tagsHtml = '';
  var weakTraps = analysis.weakTraps;
  for(var t in analysis.totalByTrap){
    if(analysis.totalByTrap[t]>0){
      var acc = analysis.trapResults[t]||0;
      var cls = 't'+(parseInt(t.replace('T',''))%6+1);
      var isWeak = weakTraps.some(function(w){return w.trap===t;});
      tagsHtml += '<span class="trap-tag '+cls+'" style="'+(isWeak?'border:2px solid #DC2626':'')+'">'+
        LF_AI.traps[t].icon+' '+LF_AI.traps[t].name+' '+acc+'%</span> ';
    }
  }
  document.getElementById('trapTags').innerHTML = tagsHtml;
  
  // AI Insights
  var insights = LF_AI.generateInsights(analysis);
  var insightsHtml = '<h2 style="font-size:16px;color:var(--b);margin-bottom:12px">🤖 AI 智能分析</h2>';
  for(var i=0;i<insights.length;i++){
    var cls = insights[i].type==='warn'?'analysis-card warn':'analysis-card';
    insightsHtml += '<div class="'+cls+'" style="padding:14px;margin-bottom:8px;font-size:13px">'+insights[i].text+'</div>';
  }
  document.getElementById('aiInsights').innerHTML = insightsHtml;
  
  // Recommendations
  var recs = LF_AI.generateRecommendations(analysis);
  var recsHtml = '';
  for(var i=0;i<recs.length;i++){
    recsHtml += '<a href="'+recs[i].link+'" class="rec-item" style="text-decoration:none;color:inherit">'+
      '<span class="rec-icon">'+recs[i].icon+'</span>'+
      '<div class="rec-info"><h4>'+recs[i].title+'</h4><p>'+recs[i].desc+'</p></div>'+
      '<span class="rec-arrow">→</span></a>';
  }
  document.getElementById('recommendations').innerHTML = recsHtml;
}

// ── SIMPLE SVG RADAR CHART ──
function drawRadar(trapResults, totalByTrap){
  var svg = document.getElementById('radarChart');
  var cx=125,cy=125,r=100;
  var traps = ['T1','T2','T3','T5','T6','T7','T8','T10'];
  var n = traps.length;
  var html = '';
  
  // Background grid
  for(var lvl=1;lvl<=3;lvl++){
    var pts = [];
    for(var i=0;i<n;i++){
      var angle = (Math.PI*2/n)*i - Math.PI/2;
      var rr = r*lvl/3;
      pts.push((cx+rr*Math.cos(angle))+','+(cy+rr*Math.sin(angle)));
    }
    html += '<polygon points="'+pts.join(' ')+'" fill="none" stroke="#E5E7EB" stroke-width="1"/>';
  }
  
  // Axes
  for(var i=0;i<n;i++){
    var angle = (Math.PI*2/n)*i - Math.PI/2;
    html += '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(angle))+'" y2="'+(cy+r*Math.sin(angle))+'" stroke="#E5E7EB" stroke-width="1"/>';
  }
  
  // Data polygon
  var dataPts = [];
  for(var i=0;i<n;i++){
    var t = traps[i];
    var val = totalByTrap[t]?((trapResults[t]||0)/100):0;
    var angle = (Math.PI*2/n)*i - Math.PI/2;
    var rr = r*val;
    dataPts.push((cx+rr*Math.cos(angle))+','+(cy+rr*Math.sin(angle)));
  }
  html += '<polygon points="'+dataPts.join(' ')+'" fill="rgba(26,60,109,0.2)" stroke="#1A3C6D" stroke-width="2"/>';
  
  // Labels
  var shortNames = {T1:'進退位',T2:'單位',T3:'運算序',T5:'分數',T6:'百分數',T7:'應用題',T8:'圖形',T10:'方程'};
  for(var i=0;i<n;i++){
    var t = traps[i];
    var angle = (Math.PI*2/n)*i - Math.PI/2;
    var lr = r+25;
    var lx = cx+lr*Math.cos(angle);
    var ly = cy+lr*Math.sin(angle);
    html += '<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#6B7280">'+(shortNames[t]||t)+'</text>';
  }
  
  svg.innerHTML = html;
}

function restartQuiz(){
  document.getElementById('stepQuiz').style.display = 'none';
  document.getElementById('stepAnalysis').style.display = 'none';
  document.getElementById('stepGrade').style.display = 'block';
  document.querySelectorAll('.grade-btn').forEach(function(b){b.classList.remove('active');});
  LF_AI.init();
}
