h1{font-size:22px;margin:8px 0}.sub{font-size:12px;opacity:0.5}
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:24px 18px;margin:12px 0;max-width:500px;margin-left:auto;margin-right:auto}
.monster{font-size:64px;display:block;margin:8px}
.q-num{font-size:12px;color:#C9A84C;margin-bottom:4px}.q-tag{font-size:10px;opacity:0.4}
.q-text{font-size:20px;font-weight:700;margin:12px 0;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.opt{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:14px;padding:14px 10px;font-size:16px;color:white;cursor:pointer;transition:all 0.15s}
.opt:hover{background:rgba(201,168,76,0.1);border-color:#C9A84C;transform:scale(1.03)}
.opt.right{background:rgba(22,163,74,0.2);border-color:#16A34A}.opt.wrong{background:rgba(220,38,38,0.2);border-color:#DC2626}
.opt.retry{border-color:#F59E0B;background:rgba(245,158,11,0.1)}
.progress-wrap{background:rgba(255,255,255,0.08);height:8px;border-radius:4px;margin:12px 0;overflow:hidden}
.progress-inner{background:#C9A84C;height:100%;width:0;transition:width 0.3s;border-radius:4px}
.hp-bar{background:rgba(255,255,255,0.08);border-radius:8px;height:14px;margin:8px 0;overflow:hidden}
.hp-inner{background:linear-gradient(90deg,#DC2626,#EF4444);height:100%;transition:width 0.3s}
.streak{display:inline-block;background:rgba(201,168,76,0.2);color:#C9A84C;padding:4px 12px;border-radius:15px;font-size:12px;font-weight:700;margin:8px 0}
.btn{display:inline-block;padding:14px 36px;border-radius:30px;font-weight:900;font-size:16px;cursor:pointer;border:none;margin:8px;transition:all 0.15s;font-family:inherit}
.btn-start{background:#C9A84C;color:#1A3C6D;font-size:20px;padding:18px 48px}
.btn-next{background:#C9A84C;color:#1A3C6D}.btn-next:disabled{opacity:0.3}
.btn-outline{background:transparent;border:2px solid rgba(255,255,255,0.2);color:white}
.menu-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:400px;margin:12px auto}
.menu-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 8px;text-decoration:none;color:white;font-size:11px;font-weight:700;transition:all 0.15s}

.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.confetti-piece{position:absolute;width:12px;height:12px;animation:fall 2s ease-out forwards}

.fox-msg{background:rgba(255,255,255,0.08);border-radius:15px;padding:10px 16px;display:inline-block;font-size:13px;margin:8px 0;animation:pop 0.3s}

.mode-switch{display:flex;gap:6px;justify-content:center;margin:8px 0}
.mode-btn{padding:8px 16px;border-radius:20px;border:2px solid rgba(255,255,255,0.15);background:transparent;color:white;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}

var LFGen = {
  _bankCache: {},

  // Load grade bank
  loadBank: function(grade) {
    var self = this;
    if (this._bankCache[grade]) {
      return Promise.resolve(this._bankCache[grade]);
    }
    return fetch('/docs/data/question_bank_' + grade + '.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        self._bankCache[grade] = data;
        return data;
      })
      .catch(function() { return []; });
  },

  // Get random questions from bank
  getQuestions: function(grade, count) {
    var pool = this._bankCache[grade] || [];
    if (pool.length < 5) {
      // Generate on-the-fly instead
      return this.generateQuestions(grade, count);
    }
    var shuffled = pool.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = t;
    }
    return shuffled.slice(0, Math.min(count, shuffled.length));
  },

  // Generate fresh questions on-the-fly (client side AI)
  generateQuestions: function(grade, count) {
    var qs = [];
    var trapTypes = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10'];
    for (var n = 0; n < count; n++) {
      var trap = trapTypes[Math.floor(Math.random() * trapTypes.length)];
      var q = this._generateOne(grade, trap);
      if (q) qs.push(q);
    }
    return qs;
  },

  _generateOne: function(grade, trap) {
    var a, b, c, name, item, correct, wrongs, opts, unit;
    var names = ['小明','小美','家豪','Chloe','婷婷','志偉','詠詩'];

    if (trap === 'T1' && grade === 'P3') {
      a = rand(20,200); b = rand(10,150);
      correct = a + b; wrongs = [correct+1, correct-1, correct+10];
      return makeQ(a + ' + ' + b + ' = ?', correct, wrongs, 'T1', grade);
    }
    if (trap === 'T1' && grade === 'P4') {
      a = rand(1000,8000); b = rand(500,3000);
      correct = a + b; wrongs = [correct+1, correct-10, correct+100];
      return makeQ(a + ' + ' + b + ' = ?', correct, wrongs, 'T1', grade);
    }
    if (trap === 'T1' && (grade === 'P5' || grade === 'P6')) {
      a = rand(10000,50000); b = rand(5000,20000);
      correct = a + b; wrongs = [correct+10, correct-100, correct+1000];
      return makeQ(a + ' + ' + b + ' = ?', correct, wrongs, 'T1', grade);
    }
    if (trap === 'T2') {
      var units = {P3:[['米','厘米',100]],P4:[['公里','米',1000]],P5:[['平方米','平方厘米',10000]],P6:[['公里','米',1000]]};
      var u = (units[grade]||units.P5)[0];
      a = rand(1,10); correct = a * u[2]; wrongs = [correct*10, correct/10, correct*2];
      return makeQ(a + ' ' + u[0] + ' = ? ' + u[1], correct, wrongs, 'T2', grade);
    }
    if (trap === 'T3') {
      a = rand(2,20); b = rand(2,10); c = rand(2,8);
      var patterns = [
        [a + ' + ' + b + ' × ' + c, a + b * c],
        ['(' + a + ' + ' + b + ') × ' + c, (a + b) * c]
      ];
      var p = patterns[Math.floor(Math.random() * 2)];
      correct = p[1]; wrongs = [correct+4, correct-3, correct*2];
      return makeQ(p[0] + ' = ?', correct, wrongs, 'T3', grade);
    }
    if (trap === 'T4') {
      if (grade === 'P3' || grade === 'P4') {
        var pairs = [[408,2],[306,3],[804,2],[1020,4],[1500,5]];
        var p2 = pairs[Math.floor(Math.random()*pairs.length)];
        correct = Math.floor(p2[0] / p2[1]); wrongs = [correct*10, correct/10, correct+1];
        return makeQ(p2[0] + ' ÷ ' + p2[1] + ' = ?', correct, wrongs, 'T4', grade);
      } else {
        a = round(rand(1,50)/10, 1); b = round(rand(2,9)/10, 1);
        correct = round(a / b, 2); wrongs = [round(correct*10,1), round(correct/10,2), round(correct+1,1)];
        return makeQ(a + ' ÷ ' + b + ' = ?', correct, wrongs, 'T4', grade);
      }
    }
    if (trap === 'T5') {
      var den = [2,3,4,5,6,8][Math.floor(Math.random()*6)];
      var n1 = rand(1,den-1); var n2 = rand(1,den-1);
      correct = n1 + n2; wrongs = [correct+1, correct-1, den];
      if (correct >= den) { n1 = rand(1,Math.floor(den/2)); correct = n1 + 1; }
      return makeQ(n1 + '/' + den + ' + 1/' + den + ' = ?', correct + '/' + den, wrongs.map(function(w){return w+'/'+den}), 'T5', grade);
    }
    if (trap === 'T6') {
      var pairs6 = [[200,15],[400,20],[500,25],[800,10],[300,30]];
      var p6 = pairs6[Math.floor(Math.random()*pairs6.length)];
      correct = Math.floor(p6[0] * p6[1] / 100);
      wrongs = [correct*2, correct + p6[0]/10, correct + 5];
      return makeQ('$' + p6[0] + ' 的 ' + p6[1] + '% 是多少？', correct, wrongs, 'T6', grade);
    }
    if (trap === 'T7') {
      name = names[Math.floor(Math.random()*names.length)];
      a = rand(10,50); b = rand(2,10);
      return makeQ(name + '有' + a + '粒糖，食咗' + b + '粒，仲有幾多？', a - b, [a, b, a+b], 'T7', grade);
    }
    if (trap === 'T8') {
      var w8 = rand(3,12); var h8 = rand(2,8);
      if (Math.random() > 0.5) {
        return makeQ('長方形長' + w8 + 'cm闊' + h8 + 'cm，面積？', w8*h8 + 'cm²', [2*(w8+h8)+'cm', w8+h8+'cm', w8*h8*2+'cm²'], 'T8', grade);
      } else {
        return makeQ('正方形邊長' + w8 + 'cm，面積？', w8*w8 + 'cm²', [w8*4+'cm', w8*2+'cm', w8*w8*2+'cm²'], 'T8', grade);
      }
    }
    if (trap === 'T9') {
      a = rand(1,4); b = rand(1,59);
      correct = a * 60 + b;
      wrongs = [a * 100 + b, a * 60, correct + 60];
      return makeQ(a + '小時' + b + '分鐘 = ? 分鐘', correct, wrongs, 'T9', grade);
    }
    if (trap === 'T10') {
      var div = rand(10,200); var div2 = [3,4,5,6][Math.floor(Math.random()*4)];
      var q10 = Math.floor(div / div2); var r10 = div % div2;
      if (r10 === 0) { div++; r10 = div % div2; }
      correct = q10 + '餘' + r10;
      wrongs = [(q10+1)+'餘'+Math.max(0,r10-1), q10+'餘'+(r10+1), (q10+Math.floor(Math.random()*2)+1)+'餘'+r10];
      return makeQ(div + ' ÷ ' + div2 + ' = ?', correct, wrongs, 'T10', grade);
    }
    return null;
  }
};

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function round(v, d) { var m = Math.pow(10, d); return Math.round(v * m) / m; }
function makeQ(text, answer, wrongs, trap, grade) {
  var correctStr = String(answer);
  var wrongStrs = wrongs.map(function(w) { return String(w).replace('NaN','0'); });
  var all = [correctStr].concat(wrongStrs.slice(0,3));
  // Deduplicate
  var clean = []; var seen = {};
  all.forEach(function(o) { if (!seen[o] && o && o.length > 0) { clean.push(o); seen[o] = true; } });
  if (clean.length < 3) {
    // Pad with fake options
    for (var i = 0; i < 10; i++) {
      var fake = String(rand(1, 99));
      if (!seen[fake]) { clean.push(fake); seen[fake] = true; if (clean.length >= 4) break; }
    }
  }
  // Shuffle
  for (var i = clean.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = clean[i]; clean[i] = clean[j]; clean[j] = t;
  }
  var ansIdx = clean.indexOf(correctStr);
  if (ansIdx < 0) { clean[0] = correctStr; clean = clean.slice(0,4); ansIdx = 0; }
  return { q: text, opts: clean.slice(0,4), ans: ansIdx, trap: trap, grade: grade, source: 'live_gen' };
}

buildPools();

function pickGrade(g,el){grade=g;document.querySelectorAll('#menu .opt').forEach(function(b){b.style.borderColor='rgba(255,255,255,0.12)';b.style.background='rgba(255,255,255,0.08)'});el.style.borderColor='#C9A84C';el.style.background='rgba(201,168,76,0.15)';updateReviewCount()}

function setMode(m,el){mode=m;document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('on')});if(el)el.classList.add('on')}

function updateReviewCount(){
var wrongs=JSON.parse(localStorage.getItem('lf_kids_wrong_'+grade)||'[]');
document.getElementById('reviewCount').textContent=wrongs.length;
}

function start(){
if(mode==='review'){
var wrongs=JSON.parse(localStorage.getItem('lf_kids_wrong_'+grade)||'[]');
if(wrongs.length===0){alert('冇錯題記錄！做一次普通模式先啦～');mode='normal'}
Q=wrongs.slice();
if(Q.length===0){mode='normal'}
}
if(mode==='normal'){
// Try loading from full bank first
var pool=POOL[grade];
if(pool&&pool.length>20){
// Already loaded from bank — use it
shuffleAndGo(pool);
}else{
// First time: try loading from grade bank JSON
document.getElementById('menu').style.display='none';
document.getElementById('game').style.display='block';
document.getElementById('foxMsg').textContent='Fox 正在準備全新題目...';
document.getElementById('qt').textContent='載入題庫中 🦊';
fetch('/docs/data/question_bank_'+grade+'.json')
.then(function(r){return r.json()})
.then(function(data){
if(data&&data.length>10){
POOL[grade]=data.map(function(q){return {q:q.q,o:q.opts,c:q.ans,w:0,t:q.trap||'T7'}});
shuffleAndGo(POOL[grade]);
}else{shuffleAndGo(POOL[grade])}
})
.catch(function(){shuffleAndGo(POOL[grade])});
return;
}
}
if(Q.length===0){mode='normal';return}
totalQ=Q.length;currentQ=0;streak=0;hp=5;sel=null;
document.getElementById('menu').style.display='none';document.getElementById('game').style.display='block';document.getElementById('win').style.display='none';
document.getElementById('streak').textContent='🔥 連續 0 題';document.getElementById('hpBar').style.width='100%';
document.getElementById('modeLabel').textContent=mode==='review'?'錯題重測模式':'';
document.getElementById('monster').textContent=monsters[Math.floor(Math.random()*monsters.length)];showQ();
}

function shuffleAndGo(pool){
var shuffled=pool.slice();
for(var i=shuffled.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=shuffled[i];shuffled[i]=shuffled[j];shuffled[j]=t}
Q=shuffled.slice(0,8);
totalQ=Q.length;currentQ=0;streak=0;hp=5;sel=null;
document.getElementById('menu').style.display='none';document.getElementById('game').style.display='block';document.getElementById('win').style.display='none';
document.getElementById('streak').textContent='🔥 連續 0 題';document.getElementById('hpBar').style.width='100%';
document.getElementById('modeLabel').textContent='';
document.getElementById('monster').textContent=monsters[Math.floor(Math.random()*monsters.length)];showQ();
}

function showQ(){
var q=Q[currentQ];
document.getElementById('qn').textContent='第 '+(currentQ+1)+'/'+totalQ+' 題';
document.getElementById('qt').textContent=q.q;
document.getElementById('qtg').textContent='陷阱: '+(trapNames[q.t]||q.t);
document.getElementById('bar').style.width=((currentQ/totalQ)*100)+'%';
document.getElementById('nx').disabled=true;sel=null;
var h='';q.o.forEach(function(o,j){h+='<button class=\"opt\" onclick=\"pick('+j+',this)\">'+['A','B','C','D'][j]+'. '+o+'</button>'});
document.getElementById('op').innerHTML=h;
document.getElementById('foxMsg').textContent=foxMsgs[Math.floor(Math.random()*foxMsgs.length)];
if(mode==='review'){document.getElementById('foxMsg').textContent='Fox：上次呢題錯咗，再試一次！💪'}
}

function pick(j,el){document.querySelectorAll('#game .opt').forEach(function(b){b.classList.remove('right','wrong')});el.style.borderColor='#C9A84C';el.style.background='rgba(201,168,76,0.18)';sel=j;document.getElementById('nx').disabled=false}

function nextQ(){
var q=Q[currentQ];
document.querySelectorAll('#game .opt').forEach(function(b,j){
if(j===q.c)b.classList.add('right');if(j===sel&&sel!==q.c)b.classList.add('wrong')
});
if(sel===q.c){
streak++;hp=Math.min(5,hp+1);
document.getElementById('foxMsg').textContent='答啱了！好叻呀！🎉';
document.getElementById('monster').textContent='💥';
setTimeout(function(){document.getElementById('monster').textContent=monsters[Math.floor(Math.random()*monsters.length)]},500);
// If this was a review question and answered correctly, remove from wrong list
if(mode==='review'){
var wrongs=JSON.parse(localStorage.getItem('lf_kids_wrong_'+grade)||'[]');
wrongs=wrongs.filter(function(w){return w.q!==q.q});
localStorage.setItem('lf_kids_wrong_'+grade,JSON.stringify(wrongs));
}
}else{
streak=0;hp--;
document.getElementById('foxMsg').textContent='唔緊要！再試下！💪';
// Save wrong answer for review
if(mode==='normal'){
var wrongs=JSON.parse(localStorage.getItem('lf_kids_wrong_'+grade)||'[]');
if(!wrongs.find(function(w){return w.q===q.q})){
wrongs.push(q);
localStorage.setItem('lf_kids_wrong_'+grade,JSON.stringify(wrongs));
}
}
}
document.getElementById('streak').textContent='🔥 連續 '+streak+' 題';
document.getElementById('hpBar').style.width=(hp/5*100)+'%';
currentQ++;
if(currentQ<totalQ&&hp>0){setTimeout(showQ,600)}else{showWin()}
}

function showWin(){
document.getElementById('game').style.display='none';document.getElementById('win').style.display='block';
var won=hp>0;
document.getElementById('winTitle').textContent=won?'🎉 做得好！':'💪 繼續努力！';
document.getElementById('winMsg').textContent=won?'你打敗晒啲怪獸喇！連續答對 '+streak+' 題！':'HP 用完喇！答對 '+streak+' 題。再試一次！';
if(won&&streak>=3)spawnConfetti();
updateReviewCount();
}

function spawnConfetti(){
var c=document.getElementById('confetti');var colors=['#DC2626','#C9A84C','#16A34A','#58A6FF','#F59E0B','#EC4899'];
for(var i=0;i<40;i++){var p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.top=-(Math.random()*50)+'px';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=Math.random()*1+'s';p.style.width=(8+Math.random()*12)+'px';p.style.height=(8+Math.random()*12)+'px';c.appendChild(p);setTimeout(function(){p.remove()},2500)}
}

updateReviewCount();
</script>
