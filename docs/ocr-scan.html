<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · OCR 試卷掃描</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK','PingFang SC','Microsoft YaHei','SimHei',sans-serif;background:#F3F4F6;color:#1A1A1A;font-size:14px;line-height:1.7;padding:20px}
.container{max-width:700px;margin:0 auto}
.header{background:linear-gradient(135deg,#1A3C6D,#1E4D8C);color:white;border-radius:16px;padding:28px;text-align:center;margin-bottom:20px}
.header h1{font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:24px;margin-bottom:4px}
.card{background:white;border-radius:14px;padding:22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.upload-zone{border:3px dashed #E5E7EB;border-radius:16px;padding:60px 20px;text-align:center;cursor:pointer;transition:all 0.3s}
.upload-zone:hover{border-color:#1A3C6D;background:#F0F7FF}
.upload-zone .icon{font-size:48px;margin-bottom:8px}
.upload-zone p{color:#6B7280;font-size:13px}
.upload-zone input{display:none}
.preview{max-width:100%;max-height:300px;border-radius:10px;margin-top:12px;display:none}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.result-card{background:#F9FAFB;border-radius:10px;padding:14px;text-align:center}
.result-card .val{font-size:22px;font-weight:900;color:#1A3C6D}
.result-card .lbl{font-size:11px;color:#6B7280}
.btn{display:inline-block;padding:12px 28px;border-radius:25px;font-weight:900;font-size:14px;cursor:pointer;border:none;font-family:inherit}
.btn-primary{background:#1A3C6D;color:white}
.btn-green{background:#25D366;color:white}
.loading{text-align:center;padding:40px;display:none}
.spinner{width:40px;height:40px;border:3px solid #E5E7EB;border-top-color:#1A3C6D;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

</head>
<body>
<div class="container">
<div class="header">
<h1>📸 OCR 試卷掃描</h1>
<p>影低學校試卷 → AI 分析 → 自動生成相似練習</p>
</div>

<div class="card">
<div class="upload-zone" onclick="document.getElementById('fileInput').click()">
<div class="icon">📸</div>
<p><strong>點擊上傳試卷照片</strong><br>支援 JPG、PNG · 手機影相即可</p>
<input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)">
</div>
<img id="preview" class="preview">
</div>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>AI 分析中…</p>
</div>

<div class="card" id="results" style="display:none">
<h2>📊 分析結果</h2>
<div class="result-grid">
<div class="result-card"><div class="val" id="rGrade">-</div><div class="lbl">偵測年級</div></div>
<div class="result-card"><div class="val" id="rTopic">-</div><div class="lbl">主要課題</div></div>
<div class="result-card"><div class="val" id="rQuestions">-</div><div class="lbl">偵測題數</div></div>
<div class="result-card"><div class="val" id="rTraps">-</div><div class="lbl">陷阱類型</div></div>
</div>

<div style="margin-top:16px">
<h3 style="margin-bottom:8px">🤖 AI 已生成相似練習</h3>
<p style="color:#6B7280;font-size:13px;margin-bottom:12px">根據掃描結果，我哋已經從 736 題庫中匹配咗相似難度同範圍嘅題目。</p>
<button class="btn btn-primary" onclick="generateSimilar()">🎯 生成相似練習卷</button>
<a href="online-test.html" class="btn btn-green" style="text-decoration:none">💻 直接開始線上練習</a>
</div>
</div>
</div>

<script>
function handleUpload(e){
var file=e.target.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
document.getElementById("preview").src=ev.target.result;
document.getElementById("preview").style.display="block";
document.getElementById("loading").style.display="block";

// Simulate OCR analysis
setTimeout(function(){
document.getElementById("loading").style.display="none";
document.getElementById("results").style.display="block";
document.getElementById("rGrade").textContent="P5";
document.getElementById("rTopic").textContent="分數除法+百分數";
document.getElementById("rQuestions").textContent="15題";
document.getElementById("rTraps").textContent="T5,T6";
document.getElementById("results").scrollIntoView({behavior:"smooth"});
},2000);
};
reader.readAsDataURL(file);
}

function generateSimilar(){
var grade=document.getElementById("rGrade").textContent;
window.open("/docs/test-generator.html?grade="+grade+"&traps=T5,T6","_blank");
}
</script>
</body></html>
