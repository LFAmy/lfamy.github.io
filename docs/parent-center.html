<script>
var avatarColors = ['#DC2626','#1A3C6D','#16A34A','#C9A84C','#8B5CF6','#EC4899','#F59E0B','#059669'];

function loadChildren() {
var children = [];
// Try multiple sources
try {
var user = JSON.parse(localStorage.getItem('lf_current_user'));
if (user) {
children.push({
name: user.student || '學生',
grade: user.grade || 'P5',
plan: user.plan || 'free',
phone: user.phone
});
}
} catch(e) {}

// Also check for multiple kids stored
try {
var kids = JSON.parse(localStorage.getItem('lf_children') || '[]');
kids.forEach(function(k) {
if (!children.find(function(c){ return c.name === k.name; })) {
children.push(k);
}
});
} catch(e) {}

// Also check member registrations
for (var i = 0; i < localStorage.length; i++) {
var key = localStorage.key(i);
if (key.startsWith('lf_member_')) {
try {
var m = JSON.parse(localStorage.getItem(key));
if (m && m.student) {
if (!children.find(function(c){ return c.name === m.student; })) {
children.push({
name: m.student, grade: m.grade, plan: m.plan,
phone: m.phone, parent: m.parent
});
}
}
} catch(e) {}
}
}

return children;
}

function loadGamification() {
try {
return JSON.parse(localStorage.getItem('lf_gamification'));
} catch(e) { return null; }
}

function renderChildren() {
var children = loadChildren();
var list = document.getElementById('childrenList');
var addBar = document.getElementById('addChildBar');

if (children.length === 0) {
list.innerHTML = '<div class=\"empty-state\"><div class=\"icon\">📝</div><h3>尚未添加子女</h3><p style=\"font-size:12px\">幫小朋友註冊帳戶後，就可以喺呢度睇到佢哋嘅學習進度</p><a href=\"login.html\" class=\"btn\">註冊 / 登入</a></div>';
addBar.style.display = 'none';
return;
}

addBar.style.display = 'block';
var g = loadGamification();
var html = '';

children.forEach(function(child, idx) {
var acc = 0, streak = 0, total = 0;
if (g) {
total = g.totalQuestions || 0;
acc = total > 0 ? Math.round((g.totalCorrect || 0) / total * 100) : 0;
streak = g.currentStreak || 0;
}

var planBadge = child.plan === 'pro' ? '<span class=\"plan-badge plan-pro\">Pro</span>' : '<span class=\"plan-badge plan-free\">免費版</span>';
var accClass = acc >= 80 ? 'good' : (acc >= 50 ? 'warn' : 'bad');
var color = avatarColors[idx % avatarColors.length];

html += '<div class=\"child-row\" onclick=\"viewChild(\'' + child.name + '\',\'' + (child.grade||'P5') + '\')\">';
html += '<div class=\"avatar\" style=\"background:' + color + '\">' + (child.name||'?')[0] + '</div>';
html += '<div class=\"info\">';
html += '<div class=\"name\">' + (child.name || '學生') + planBadge + '</div>';
html += '<div class=\"grade\">' + (child.grade || 'P5') + ' · 最近練習：' + (streak > 0 ? streak + '天前' : '未有') + '</div>';
html += '<div class=\"stat-row\">';
html += '<span class=\"stat-pill good\">正確率 ' + acc + '%</span>';
html += '<span class=\"stat-pill warn\">' + total + ' 題</span>';
html += '<span class=\"stat-pill good\">連續 ' + streak + ' 天</span>';
html += '</div></div>';
html += '<div class=\"arrow\">→</div></div>';
});

list.innerHTML = html;

// Update weekly summary
updateWeeklySummary(children, g);
updateAITips(g);
}

function updateWeeklySummary(children, g) {
var el = document.getElementById('weeklySummary');
if (!g || !g.totalQuestions) {
el.innerHTML = '<div class=\"empty-state\" style=\"padding:20px\"><p style=\"font-size:12px\">完成練習後，呢度會顯示每週摘要</p></div>';
return;
}

var traps = g.trapDefeats || {};
var topTrap = null, topCount = 0;
for (var t in traps) {
if (traps[t] > topCount) { topCount = traps[t]; topTrap = t; }
}

var trapNames = {T1:'進退位',T2:'單位換算',T3:'運算順序',T4:'漏寫0',T5:'分數',T6:'百分數',T7:'應用題',T8:'圖形',T9:'時間',T10:'餘數'};
var trapName = topTrap ? trapNames[topTrap] || topTrap : '未知';

el.innerHTML = 
'<div class=\"summary-item\"><span>📝 總練習題數</span><span class=\"val\">' + (g.totalQuestions||0) + ' 題</span></div>' +
'<div class=\"summary-item\"><span>✅ 總正確率</span><span class=\"val\">' + ((g.totalQuestions||0) > 0 ? Math.round((g.totalCorrect||0)/(g.totalQuestions||0)*100) : 0) + '%</span></div>' +
'<div class=\"summary-item\"><span>🔥 連續練習</span><span class=\"val\">' + (g.currentStreak||0) + ' 天</span></div>' +
'<div class=\"summary-item\"><span>🏆 已獲勳章</span><span class=\"val\">' + Object.keys(g.badges||{}).length + ' 個</span></div>' +
'<div class=\"summary-item\"><span>⚠️ 最弱陷阱</span><span class=\"val\">' + trapName + '</span></div>' +
'<div class=\"summary-item\"><span>🦊 已擊敗怪獸</span><span class=\"val\">' + Object.values(g.monsterStages||{}).filter(function(v){return v>=1}).length + '/10</span></div>';
}

function updateAITips(g) {
var el = document.getElementById('aiTips');
if (!g || !g.totalQuestions) {
el.innerHTML = '<div class=\"summary-item\"><span>完成陷阱診斷後</span><span class=\"val\">獲取個人化建議</span></div>';
return;
}

var tips = [];
if ((g.currentStreak||0) < 3) tips.push('🔥 建議每日練習至少 10 題，建立連續習慣');
if ((g.totalCorrect||0)/(g.totalQuestions||1) < 0.7) tips.push('🎯 正確率偏低，建議先做陷阱診斷找出弱點');
if ((g.currentStreak||0) >= 7) tips.push('🌟 已連續練習 7+ 日！保持下去，升級 Pro 解鎖更多題目');
if (Object.keys(g.badges||{}).length < 3) tips.push('🏅 嘗試解鎖更多勳章，例如「三日連擊」或「神射手」');

if (tips.length === 0) tips.push('👍 學習進度良好！繼續保持');

el.innerHTML = tips.map(function(t){ return '<div class=\"summary-item\"><span>' + t + '</span></div>'; }).join('');
}

function viewChild(name, grade) {
localStorage.setItem('lf_selected_child', JSON.stringify({name:name, grade:grade}));
window.location.href = 'student-platform.html';
}

// Load on page
renderChildren();

// Listen for storage changes from other tabs
window.addEventListener('storage', function(e) {
if (e.key && (e.key.startsWith('lf_') || e.key.startsWith('lf_gamification'))) {
renderChildren();
}
});
</script>
