<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · 新手引導</title>
<style>
:root{--b:#1A3C6D;--g:#C9A84C;--r:#DC2626;--gr:#16A34A;--w:#FFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#6B7280;--g800:#374151}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans HK","PingFang SC","Microsoft YaHei",sans-serif;background:var(--g100);color:var(--g800);font-size:15px;line-height:1.7;min-height:100vh}
.header{background:linear-gradient(135deg,#0A1A35,var(--b));color:white;padding:40px 24px;text-align:center}
.header h1{font-size:24px;margin-bottom:4px}
.header p{font-size:13px;opacity:0.6}
.container{max-width:600px;margin:0 auto;padding:20px}
.step-indicator{display:flex;justify-content:center;gap:8px;margin:20px 0}
.step-dot{width:14px;height:14px;border-radius:50%;background:var(--g200);transition:all 0.3s}
.step-dot.active{background:var(--b);transform:scale(1.3)}
.step-dot.done{background:var(--gr)}
.step-card{background:var(--w);border-radius:16px;padding:28px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);display:none}
.step-card.active{display:block;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-card h2{font-size:20px;color:var(--b);margin-bottom:12px}
.step-card .icon{font-size:48px;text-align:center;margin:16px 0}
.role-select{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.role-opt{background:var(--g50);border:2px solid var(--g200);border-radius:14px;padding:20px 10px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:13px}
.role-opt:hover{border-color:var(--b);background:#EEF2FF}
.role-opt.selected{border-color:var(--b);background:#EEF2FF;box-shadow:0 0 0 3px rgba(26,60,109,0.1)}
.role-opt .role-icon{font-size:32px;margin-bottom:8px;display:block}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:16px}
.btn-primary{background:var(--b);color:white}
.btn-primary:hover{background:#0F2440}
.btn-secondary{background:var(--g200);color:var(--g800)}
.btn-skip{background:none;color:var(--g400);font-size:13px;text-align:center;margin-top:8px;cursor:pointer;border:none;font-family:inherit}
.welcome-done{text-align:center;padding:40px 20px}
.welcome-done .big-icon{font-size:64px;margin-bottom:16px}
@media(max-width:480px){.role-select{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header"><h1>🚀 歡迎加入霖楓學苑</h1><p>3步快速上手，2分鐘完成設定</p></div>
<div class="container">
<div class="step-indicator" id="dots">
<span class="step-dot active" data-step="1"></span>
<span class="step-dot" data-step="2"></span>
<span class="step-dot" data-step="3"></span>
</div>

<!-- Step 1: Role Selection -->
<div class="step-card active" id="step1">
<div class="icon">👤</div>
<h2>第一步：你的身份是？</h2>
<p style="color:var(--g600);font-size:14px">根據你的身份，我們會為你度身訂造使用體驗。</p>
<div class="role-select" id="roleSelect">
<div class="role-opt" data-role="student" onclick="selectRole('student',this)">
<span class="role-icon">👦</span>學生
</div>
<div class="role-opt" data-role="teacher" onclick="selectRole('teacher',this)">
<span class="role-icon">👨‍🏫</span>老師
</div>
<div class="role-opt" data-role="parent" onclick="selectRole('parent',this)">
<span class="role-icon">👨‍👩‍👧</span>家長
</div>
</div>
<button class="btn btn-primary" id="step1Next" disabled onclick="goStep(2)">下一步 →</button>
</div>

<!-- Step 2: Quick Setup -->
<div class="step-card" id="step2">
<div class="icon" id="step2Icon">📋</div>
<h2 id="step2Title">第二步：快速設定</h2>
<div id="step2Content" style="font-size:14px;color:var(--g600)">
<p>根據你的角色完成基本設定。</p>
</div>
<button class="btn btn-primary" onclick="goStep(3)">完成設定 →</button>
<button class="btn-skip" onclick="goStep(3)">跳過，稍後設定</button>
</div>

<!-- Step 3: Done -->
<div class="step-card" id="step3">
<div class="welcome-done">
<div class="big-icon" id="doneIcon">🎉</div>
<h2 id="doneTitle">設定完成！</h2>
<p style="color:var(--g600);margin:8px 0" id="doneMsg">你已準備好開始使用霖楓學苑。</p>
<button class="btn btn-primary" onclick="finishOnboarding()">開始使用 →</button>
</div>
</div>
</div>

<script src="data/lf-core.js"></script>
<script>
let selectedRole = null;
let currentStep = 1;

function selectRole(role, el) {
    document.querySelectorAll("#roleSelect .role-opt").forEach(o => o.classList.remove("selected"));
    el.classList.add("selected");
    selectedRole = role;
    document.getElementById("step1Next").disabled = false;
}

function goStep(step) {
    if (step === 2 && !selectedRole) return;
    
    document.querySelectorAll(".step-card").forEach(c => c.classList.remove("active"));
    document.getElementById("step" + step).classList.add("active");
    
    document.querySelectorAll(".step-dot").forEach(d => {
        d.classList.remove("active", "done");
        const s = parseInt(d.dataset.step);
        if (s === step) d.classList.add("active");
        if (s < step) d.classList.add("done");
    });
    
    currentStep = step;
    
    // Customize step 2 based on role
    if (step === 2) {
        const icon = document.getElementById("step2Icon");
        const title = document.getElementById("step2Title");
        const content = document.getElementById("step2Content");
        
        if (selectedRole === "student") {
            icon.textContent = "📚"; title.textContent = "設定你的學習目標";
            content.innerHTML = '<p>✅ 年級：<select id="gradeSelect" style="padding:8px;border-radius:8px;border:2px solid var(--g200);font-size:14px"><option>P3</option><option>P4</option><option selected>P5</option><option>P6</option></select></p><p>✅ 目標分數：SSPA Band 1</p><p>✅ 最驚嘅陷阱類型：<select style="padding:8px;border-radius:8px;border:2px solid var(--g200);font-size:14px"><option>進退位 (T1)</option><option>小數點 (T2)</option><option>運算順序 (T3)</option><option>全部都要練！</option></select></p>';
        } else if (selectedRole === "teacher") {
            icon.textContent = "🏫"; title.textContent = "設定你的教學資料";
            content.innerHTML = '<p>✅ 教授年級：<select id="gradeSelect" style="padding:8px;border-radius:8px;border:2px solid var(--g200);font-size:14px"><option>P3</option><option>P4</option><option selected>P5</option><option>P6</option></select></p><p>✅ 可上堂時間：平日 16:00-19:00</p><p>✅ 每堂收費：HKD $280/堂（65分鐘）</p>';
        } else if (selectedRole === "parent") {
            icon.textContent = "👨‍👩‍👧"; title.textContent = "設定你小朋友嘅資料";
            content.innerHTML = '<p>✅ 小朋友名字：<input id="childName" style="padding:8px;border-radius:8px;border:2px solid var(--g200);font-size:14px;width:150px" placeholder="陳小明"></p><p>✅ 年級：<select style="padding:8px;border-radius:8px;border:2px solid var(--g200);font-size:14px"><option>P3</option><option>P4</option><option selected>P5</option><option>P6</option></select></p><p>✅ 目標：數學呈分試攞A</p>';
        }
    }
    
    // Customize step 3
    if (step === 3) {
        const doneIcon = document.getElementById("doneIcon");
        const doneTitle = document.getElementById("doneTitle");
        const doneMsg = document.getElementById("doneMsg");
        if (selectedRole === "student") {
            doneIcon.textContent = "🎮"; doneTitle.textContent = "準備好挑戰陷阱！";
            doneMsg.innerHTML = "你嘅學習旅程正式開始。<br>去<strong>學生平台</strong>做第一份練習啦！";
        } else if (selectedRole === "teacher") {
            doneIcon.textContent = "📖"; doneTitle.textContent = "準備好上堂！";
            doneMsg.innerHTML = "去<strong>老師後台</strong>睇吓你嘅課堂安排。";
        } else {
            doneIcon.textContent = "📊"; doneTitle.textContent = "準備好跟進學習！";
            doneMsg.innerHTML = "去<strong>家長中心</strong>睇吓小朋友嘅進度報告。";
        }
    }
}

function finishOnboarding() {
    if (window.LFCore && selectedRole) {
        LFCore.completeOnboarding(selectedRole);
    }
    // Redirect based on role
    const urls = {
        student: "student-platform.html",
        teacher: "teacher-dashboard.html",
        parent: "parent-center.html"
    };
    window.location.href = urls[selectedRole] || "app.html";
}
</script>
</body>
</html>
