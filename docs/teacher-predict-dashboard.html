<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · AI教師預測儀表板 2.0 | Predictive Dashboard</title>
<style>
:root{--b:#1A3C6D;--g:#C9A84C;--r:#DC2626;--gr:#16A34A;--w:#FFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g600:#6B7280;--g800:#374151}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK',sans-serif;background:var(--g100);color:var(--g800)}
.container{max-width:750px;margin:0 auto;padding:20px}
.hero{background:linear-gradient(135deg,#0A1A35,var(--b));color:white;border-radius:20px;padding:28px 24px;margin-bottom:20px}
.hero h1{font-size:18px}.hero .badge{font-size:10px;opacity:0.6}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card h2{font-size:15px;color:var(--b);margin-bottom:12px}

.alert-row{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;margin-bottom:6px;font-size:12px}
.alert-row.red{background:#FEF2F2;border-left:3px solid var(--r)}
.alert-row.yellow{background:#FFFDF5;border-left:3px solid var(--g)}
.alert-row.green{background:#F0FDF4;border-left:3px solid var(--gr)}
.alert-icon{font-size:22px}
.alert-text{flex:1}.alert-text strong{display:block;margin-bottom:2px}

.prediction-card{text-align:center;padding:16px;border-radius:14px;margin-bottom:8px}
.prediction-card.danger{background:#FEF2F2;border:1px solid #FECACA}
.prediction-card.warning{background:#FFFDF5;border:1px solid #FDE68A}
.prediction-card .pred-num{font-size:32px;font-weight:900}
.prediction-card .pred-label{font-size:11px;color:var(--g600)}

.student-row{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--g200);font-size:12px}
.student-row .s-name{font-weight:700;width:60px}
.student-row .s-progress{flex:1;height:16px;background:var(--g200);border-radius:8px;overflow:hidden}
.student-row .s-fill{height:100%;border-radius:8px}
.student-row .s-risk{width:60px;text-align:right;font-weight:700;font-size:11px}
</style>
</head>
<body>
<div class="container">
<div class="hero"><h1>📊 AI 教師預測儀表板 2.0</h1><div class="badge">數據驅動教學 · 退課預測 · 弱項建議 · 滿意度追蹤</div></div>

<div class="card"><h2>⚠️ AI 預警系統</h2>
<div class="alert-row red"><span class="alert-icon">🔴</span><div class="alert-text"><strong>小明 · P5</strong>連續2週冇練習 · 73%機會下月退課</div></div>
<div class="alert-row yellow"><span class="alert-icon">🟡</span><div class="alert-text"><strong>小美 · P5</strong>分數課題正確率跌至45% · 需重點跟進</div></div>
<div class="alert-row green"><span class="alert-icon">🟢</span><div class="alert-text"><strong>家豪 · P5</strong>連續7日練習 · 正確率上升12% · 表現優異</div></div>
</div>

<div class="card"><h2>📈 班級健康度預測</h2>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="prediction-card warning"><div class="pred-num" style="color:#D97706">73%</div><div class="pred-label">預測續報率</div></div>
<div class="prediction-card"><div class="pred-num" style="color:var(--gr)">82%</div><div class="pred-label">學生滿意度</div></div>
</div></div>

<div class="card"><h2>👥 學生風險評估</h2>
<div class="student-row"><span class="s-name">小明</span><div class="s-progress"><div class="s-fill" style="width:35%;background:var(--r)"></div></div><span class="s-risk" style="color:var(--r)">高風險</span></div>
<div class="student-row"><span class="s-name">小美</span><div class="s-progress"><div class="s-fill" style="width:55%;background:#D97706"></div></div><span class="s-risk" style="color:#D97706">中風險</span></div>
<div class="student-row"><span class="s-name">家豪</span><div class="s-progress"><div class="s-fill" style="width:88%;background:var(--gr)"></div></div><span class="s-risk" style="color:var(--gr)">健康</span></div>
</div>

<div class="card"><h2>💡 AI 教學建議</h2>
<div class="alert-row yellow"><span class="alert-icon">📐</span><div class="alert-text"><strong>下堂重點：圖形面積陷阱</strong>全班錯誤率最高課題，建議分配20分鐘專項訓練</div></div>
<div class="alert-row green"><span class="alert-icon">🎯</span><div class="alert-text"><strong>推薦活動：班級對戰模式</strong>提升課堂互動，上次使用後學生練習量+40%</div></div>
</div>
</div>

<script src="/docs/data/lf-event-bus.js"></script>
</body>
</html>
