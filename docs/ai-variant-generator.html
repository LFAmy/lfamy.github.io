<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>霖楓學苑 · AI 錯題變體生成器 | Smart Variant Generator</title>
<meta name="description" content="做錯一題→AI自動生成3題同類陷阱變體。唔係改數字，而係改情境+表述。真正個人化練習。">
<style>
:root{--b:#1A3C6D;--g:#C9A84C;--r:#DC2626;--gr:#16A34A;--w:#FFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#6B7280;--g800:#374151}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK','PingFang SC','Microsoft YaHei',sans-serif;background:var(--g100);color:var(--g800)}
.container{max-width:700px;margin:0 auto;padding:20px}

.header{background:linear-gradient(135deg,#0A1A35,var(--b));color:white;border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:20px}
.header h1{font-size:20px;margin-bottom:4px}
.header .badge{display:inline-block;background:rgba(201,168,76,0.2);color:var(--g);padding:3px 12px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:1px}

.card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card h2{font-size:16px;color:var(--b);margin-bottom:12px}

/* Original wrong question */
.wrong-q{background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:16px;margin-bottom:12px}
.wrong-q .w-label{font-size:10px;color:var(--r);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.wrong-q .w-text{font-size:16px;font-weight:700;margin-bottom:8px}
.wrong-q .w-answer{font-size:12px}
.wrong-q .w-answer .wrong-ans{color:var(--r);text-decoration:line-through}
.wrong-q .w-answer .right-ans{color:var(--gr);font-weight:700}

/* Variant cards */
.variant-card{background:var(--g50);border:2px solid var(--g200);border-radius:14px;padding:18px;margin-bottom:10px;transition:all 0.2s;position:relative;overflow:hidden}
.variant-card:hover{border-color:var(--g);transform:translateX(4px)}
.variant-card .v-badge{position:absolute;top:0;right:0;padding:4px 12px;font-size:9px;font-weight:900;border-radius:0 12px 0 12px}
.variant-card .v-badge.context1{background:#DBEAFE;color:#1E40AF}
.variant-card .v-badge.context2{background:#FEF3C7;color:#92400E}
.variant-card .v-badge.context3{background:#F3E8FF;color:#6B21A8}
.variant-card .v-num{font-size:10px;color:var(--g400);margin-bottom:4px}
.variant-card .v-q{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.5}
.variant-card .v-hint{font-size:11px;color:var(--b);background:#F0F5FF;padding:8px 12px;border-radius:8px;margin-top:8px}
.variant-card .v-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.variant-card .v-opt{padding:8px 12px;border:1px solid var(--g200);border-radius:8px;font-size:12px;text-align:center;background:white}

/* Selector */
.trap-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.trap-chip{padding:8px 16px;border:2px solid var(--g200);border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.15s;font-family:inherit;background:white}
.trap-chip:hover{border-color:var(--g)}
.trap-chip.active{background:var(--b);color:white;border-color:var(--b)}

.btn{display:block;width:100%;padding:14px;border-radius:25px;font-weight:900;font-size:14px;cursor:pointer;border:none;text-align:center;font-family:inherit;transition:all 0.2s}
.btn-primary{background:var(--b);color:white}
.btn-outline{background:white;border:2px solid var(--g200);color:var(--b);margin-top:8px}

@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.variant-card{animation:slideIn 0.3s ease}
.variant-card:nth-child(2){animation-delay:0.1s}
.variant-card:nth-child(3){animation-delay:0.2s}
</style>
<link rel="manifest" href="/manifest.json">
</head>
<body>

<div class="container">

<div class="header">
  <div class="badge">🤖 AI-Powered</div>
  <h1>AI 錯題變體生成器</h1>
  <p style="font-size:12px;opacity:0.7;margin-top:4px">做錯一題 → AI生成3題同類陷阱變體 → 情境變化，真正理解</p>
</div>

<!-- Trap Selector -->
<div class="card">
  <h2>🎯 選擇陷阱類型</h2>
  <div class="trap-selector" id="trapSelector">
    <button class="trap-chip active" onclick="selectTrap('T8',this)">📐 圖形公式陷阱</button>
    <button class="trap-chip" onclick="selectTrap('T5',this)">🍕 分數運算陷阱</button>
    <button class="trap-chip" onclick="selectTrap('T6',this)">💯 百分數陷阱</button>
    <button class="trap-chip" onclick="selectTrap('T10',this)">🔣 方程代數陷阱</button>
    <button class="trap-chip" onclick="selectTrap('T7',this)">📖 應用題陷阱</button>
    <button class="trap-chip" onclick="selectTrap('T4',this)">0️⃣ 小數點陷阱</button>
  </div>
  <button class="btn btn-primary" onclick="generateVariants()">🪄 AI生成變體題目</button>
</div>

<!-- Original Wrong Question -->
<div class="card" id="originalCard" style="display:none">
  <h2>❌ 原始錯題</h2>
  <div class="wrong-q" id="originalQ"></div>
</div>

<!-- Variants -->
<div class="card" id="variantsCard" style="display:none">
  <h2>🔄 AI生成變體（3種情境）</h2>
  <p style="font-size:11px;color:var(--g600);margin-bottom:12px">同樣嘅陷阱，唔同嘅包裝。做完3題你就真正明白呢個陷阱嘅本質。</p>
  <div id="variantList"></div>
  <button class="btn btn-outline" onclick="generateVariants()">🔄 再生成另一組</button>
</div>

</div>

<script>
// ═══════════════════════════════════════
// AI VARIANT GENERATOR ENGINE
// ═══════════════════════════════════════

var VariantGen = {
  currentTrap: 'T8',
  
  // Template database: for each trap type, we have template questions
  // that the AI "varies" with different contexts
  templates: {
    T8: { // 圖形公式陷阱
      name: '圖形公式陷阱',
      icon: '📐',
      original: {q:'梯形上底5cm，下底9cm，高4cm，面積=？', opts:['28cm²','56cm²','14cm²','36cm²'], ans:0, explain:'(5+9)×4÷2=56÷2=28，陷阱係唔記得÷2或唔記得加括號'},
      contexts: [
        {name:'🏊 游泳池情境', q:'泳池底部係梯形，淺水區闊5米，深水區闊9米，長度4米。池底面積係幾多平方米？', hint:'同梯形面積公式一樣：(上底+下底)×高÷2'},
        {name:'🌿 花園情境', q:'梯形花園，前邊闊5米，後邊闊9米，花園深度4米。花園面積係幾多平方米？', hint:'闊=底，深度=高，公式不變'},
        {name:'🏠 天台情境', q:'梯形天台，前面5米，後面9米，天台長度4米。天台面積係幾多平方米？', hint:'將「前面/後面」對應「上底/下底」'}
      ]
    },
    T5: { // 分數運算陷阱
      name: '分數運算陷阱',
      icon: '🍕',
      original: {q:'2/3 + 1/4 = ?', opts:['3/7','11/12','3/12','1/2'], ans:1, explain:'通分：8/12+3/12=11/12。陷阱係直接分子加分母加'},
      contexts: [
        {name:'🍕 Pizza情境', q:'小明食咗2/3個Pizza，小美食咗1/4個Pizza，總共食咗幾多個Pizza？', hint:'通分：將兩個Pizza分做相同份數'},
        {name:'📚 書本情境', q:'一本書，第一日睇咗2/3，第二日睇咗1/4，兩日共睇咗幾多？', hint:'唔係3/7！要通分先'},
        {name:'🧃 果汁情境', q:'一支果汁飲咗2/3，再飲1/4支，共飲咗幾多支？', hint:'分母唔同=杯大細唔同，要換成一樣大細先加'}
      ]
    },
    T6: { // 百分數陷阱
      name: '百分數陷阱',
      icon: '💯',
      original: {q:'$800先加10%再減10%=？', opts:['$800','$792','$808','$880'], ans:1, explain:'800×1.1=880，880×0.9=792。陷阱係以為加減互消'},
      contexts: [
        {name:'👟 波鞋情境', q:'一對波鞋$800，先加價10%，大減價再減10%。最後賣幾多錢？', hint:'加10%係×1.1，減10%係×0.9，唔係×1.0'},
        {name:'📱 手機情境', q:'手機原價$800，新年加價10%，之後優惠減10%。最終售價？', hint:'第二次係基於新價錢計，唔係原價'},
        {name:'🎒 書包情境', q:'書包$800，開學加價10%，過咗開學季減10%。而家幾錢？', hint:'加完再減永遠唔會返到原價'}
      ]
    },
    T10: { // 方程陷阱
      name: '方程代數陷阱',
      icon: '🔣',
      original: {q:'3x + 5 = 20, x = ?', opts:['3','4','5','15'], ans:2, explain:'3x=15,x=5。陷阱係移項唔記得變符號'},
      contexts: [
        {name:'🎈 氣球情境', q:'小明有啲氣球，數量嘅3倍加5等於20。小明有幾多個氣球？', hint:'設氣球數=x，3x+5=20'},
        {name:'🍬 糖果情境', q:'一包糖，3倍數量再加5粒=20粒。一包有幾粒？', hint:'逆向：20-5=15，15÷3=5'},
        {name:'📖 頁數情境', q:'一本書，3倍已睇頁數加5頁=20頁。已睇幾頁？', hint:'將文字翻譯成方程：3x+5=20'}
      ]
    },
    T7: { // 應用題陷阱
      name: '應用題理解陷阱',
      icon: '📖',
      original: {q:'學校男生245人，女生比男生多38人，共有？', opts:['283','490','528','273'], ans:2, explain:'女生=245+38=283，總=245+283=528。陷阱係只計女生'},
      contexts: [
        {name:'🏀 籃球情境', q:'籃球場有紅隊245個觀眾，藍隊觀眾比紅隊多38人。全場共有幾多觀眾？', hint:'先計藍隊，再加埋紅隊'},
        {name:'🌸 花卉情境', q:'公園有紅花245朵，黃花比紅花多38朵。共有幾多朵花？', hint:'唔係245+38就完！要加埋紅花'},
        {name:'📚 圖書情境', q:'圖書館有中文書245本，英文書比中文書多38本。共有幾多本書？', hint:'英文=245+38=283，總=245+283'}
      ]
    },
    T4: { // 小數點陷阱
      name: '小數點陷阱',
      icon: '0️⃣',
      original: {q:'1.2 × 0.5 = ?', opts:['0.6','6','0.06','60'], ans:0, explain:'12×5=60，1+1=2位小數→0.60=0.6。陷阱係小數點位置'},
      contexts: [
        {name:'💰 價錢情境', q:'一支筆$1.2，買半支（0.5支）要幾多錢？', hint:'半支=×0.5。12×5=60，兩個小數位→0.6'},
        {name:'📏 長度情境', q:'一條繩1.2米，用咗一半（0.5），用咗幾多米？', hint:'1.2米嘅一半=0.6米，唔係6米'},
        {name:'🧃 飲品情境', q:'一支果汁1.2升，飲咗一半（0.5），飲咗幾多升？', hint:'小數乘法：先唔理點計，最後加返'}
      ]
    }
  },
  
  generate: function(trapType) {
    var template = this.templates[trapType];
    if(!template) return null;
    
    var variants = [];
    // Shuffle contexts
    var ctxs = template.contexts.slice();
    for(var i=ctxs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=ctxs[i];ctxs[i]=ctxs[j];ctxs[j]=t;}
    
    // Generate 3 variants (reuse numbers from original, new contexts)
    for(var i=0;i<ctxs.length;i++){
      variants.push({
        context: ctxs[i].name,
        question: ctxs[i].q,
        hint: ctxs[i].hint,
        answer: template.original.opts[template.original.ans],
        explanation: template.original.explain
      });
    }
    
    return {
      trap: trapType,
      trapName: template.name,
      trapIcon: template.icon,
      original: template.original,
      variants: variants
    };
  }
};

function selectTrap(trap, el){
  VariantGen.currentTrap = trap;
  document.querySelectorAll('.trap-chip').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
}

function generateVariants(){
  var result = VariantGen.generate(VariantGen.currentTrap);
  if(!result) return;
  
  // Show original
  document.getElementById('originalCard').style.display = 'block';
  document.getElementById('originalQ').innerHTML = 
    '<div class="w-label">❌ 學生常見錯誤</div>'+
    '<div class="w-text">'+result.original.q+'</div>'+
    '<div class="w-answer">學生答：<span class="wrong-ans">'+result.original.opts[0]+'</span> → 正確：<span class="right-ans">'+result.original.opts[result.original.ans]+'</span></div>'+
    '<div style="font-size:11px;color:var(--g600);margin-top:6px">💡 '+result.original.explain+'</div>';
  
  // Show variants
  document.getElementById('variantsCard').style.display = 'block';
  var ctxClasses = ['context1','context2','context3'];
  var html = '';
  for(var i=0;i<result.variants.length;i++){
    var v = result.variants[i];
    var letters = ['A','B','C','D'];
    html += '<div class="variant-card">'+
      '<span class="v-badge '+ctxClasses[i]+'">'+v.context+'</span>'+
      '<div class="v-num">變體 #'+(i+1)+' · 相同陷阱·不同情境</div>'+
      '<div class="v-q">'+v.question+'</div>'+
      '<div class="v-opts">'+result.original.opts.map(function(o,j){return '<div class="v-opt'+(j===result.original.ans?'" style="border-color:var(--gr);background:#F0FDF4"':'')+'">'+letters[j]+'. '+o+'</div>';}).join('')+'</div>'+
      '<div class="v-hint">💡 '+v.hint+'</div>'+
      '</div>';
  }
  document.getElementById('variantList').innerHTML = html;
  
  // Scroll to variants
  document.getElementById('variantsCard').scrollIntoView({behavior:'smooth'});
}

// Auto-generate on load
generateVariants();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js")}</script>

<script src="/docs/data/lf-event-bus.js"></script>
</body>
</html>
