<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · AI影片腳本生成器 | Video Script Generator</title>
<style>
:root{--b:#1A3C6D;--g:#C9A84C;--r:#DC2626;--gr:#16A34A;--w:#FFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g600:#6B7280;--g800:#374151}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK',sans-serif;background:var(--g100);color:var(--g800)}
.container{max-width:700px;margin:0 auto;padding:20px}
.hero{background:linear-gradient(135deg,#0A1A35,var(--b));color:white;border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:20px}
.hero h1{font-size:20px}.hero p{font-size:12px;opacity:0.7}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card h2{font-size:15px;color:var(--b);margin-bottom:12px}
.script-preview{background:#1A1A2E;color:#E5E7EB;border-radius:12px;padding:20px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:500px;overflow-y:auto}
.scene{color:var(--g);font-weight:700}.narration{color:#93C5FD}.visual{color:#6EE7B7}.trap{color:#FCA5A5}
select{padding:10px 16px;border:2px solid var(--g200);border-radius:12px;font-size:14px;font-family:inherit;width:100%;margin-bottom:8px}
.btn{display:block;width:100%;padding:14px;border-radius:25px;font-weight:900;font-size:14px;border:none;cursor:pointer;font-family:inherit;background:var(--b);color:white}
.btn-outline{background:white;border:2px solid var(--g200);color:var(--b);margin-top:8px}
</style>
</head>
<body>
<div class="container">
<div class="hero"><h1>🎬 AI 解題影片腳本生成器</h1><p>725份講義 → 自動轉換為3分鐘動畫解題影片腳本 → YouTube/IG Reels就緒</p></div>

<div class="card"><h2>🎯 選擇課題</h2>
<select id="topicSelect" onchange="genScript()">
<option value="triangle">三角形面積陷阱</option>
<option value="trapezoid">梯形面積公式</option>
<option value="fraction">分數通分教學</option>
<option value="percent">百分數折扣陷阱</option>
<option value="equation">方程解題五步</option>
<option value="speed">速率相遇問題</option>
</select>
<button class="btn" onclick="genScript()">🪄 AI生成影片腳本</button></div>

<div class="card"><h2>📜 生成腳本</h2>
<div class="script-preview" id="scriptOutput">選擇課題後按「AI生成影片腳本」...</div>
<button class="btn-outline" onclick="copyScript()">📋 複製腳本</button></div>
</div>

<script>
var scripts={
triangle:`<span class=scene>【開場 · 0-15秒】</span>
<span class=visual>🎬 畫面：三角形旋轉入場，變成兩半</span>
<span class=narration>🗣 「香港最多小學生錯嘅數學題——三角形面積！」</span>

<span class=scene>【問題 · 15-30秒】</span>
<span class=visual>🎬 三角形標示底10cm高6cm</span>
<span class=narration>🗣 「底10厘米，高6厘米，面積係幾多？」</span>
<span class=trap>⚠️ 「大部份人會答60平方厘米...但係錯㗎！」</span>

<span class=scene>【正確解法 · 30-75秒】</span>
<span class=visual>🎬 兩個三角形拼成平行四邊形動畫</span>
<span class=narration>🗣 「記住口訣：底乘高，除以二！」</span>
<span class=visual>🎬 10×6=60，60÷2=30，綠色✓</span>
<span class=narration>🗣 「正確答案係30平方厘米！唔係60！」</span>

<span class=scene>【陷阱揭秘 · 75-105秒】</span>
<span class=visual>🎬 學生考試卷顯示❌60cm²被扣分</span>
<span class=narration>🗣 「呢個陷阱每年令幾千個學生扣分！」</span>
<span class=trap>⚠️ 「三角形面積=底×高÷2！唔除2就錯！」</span>

<span class=scene>【CTA · 105-120秒】</span>
<span class=visual>🎬 QR碼+網站連結</span>
<span class=narration>🗣 「想知更多陷阱？免費AI診斷→ lfamy.github.io」</span>`,

trapezoid:`<span class=scene>【開場 · 0-15秒】</span>
<span class=visual>🎬 梯形變形為長方形動畫</span>
<span class=narration>🗣 「梯形面積公式點解要(上底+下底)×高÷2？」</span>

<span class=scene>【視覺證明 · 15-60秒】</span>
<span class=visual>🎬 兩個相同梯形拼成平行四邊形</span>
<span class=narration>🗣 「兩個一樣嘅梯形拼埋，就係平行四邊形！」</span>
<span class=visual>🎬 平行四邊形底=(上底+下底)，面積÷2=梯形</span>
<span class=narration>🗣 「所以梯形面積就係: (上底+下底)×高÷2」</span>

<span class=scene>【陷阱 · 60-90秒】</span>
<span class=trap>⚠️ 「最常見錯誤：唔記得加括號！」</span>
<span class=visual>🎬 5+9×4÷2 vs (5+9)×4÷2 對比</span>
<span class=narration>🗣 「冇括號會計錯！一定要加咗上底同下底先！」</span>

<span class=scene>【CTA · 90-120秒】</span>
<span class=narration>🗣 「做AI診斷，睇下你識唔識避開呢個陷阱！」</span>`
};

function genScript(){
var t=document.getElementById('topicSelect').value;
document.getElementById('scriptOutput').innerHTML=scripts[t]||'選擇課題生成腳本';
}
function copyScript(){
var t=document.getElementById('scriptOutput').innerText;
navigator.clipboard.writeText(t).then(function(){alert('✅ 腳本已複製！');});
}
genScript();
</script>

<script src="/docs/data/lf-event-bus.js"></script>
</body>
</html>
