<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- 圓周教學圖：標註圓心O、半徑r、直徑d、圓周C -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- 圓 -->
  <circle cx="250" cy="240" r="150" fill="none" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- 圓心O -->
  <circle cx="250" cy="240" r="4" fill="#e74c3c"/>
  <text x="258" y="248" font-size="18" font-weight="bold" fill="#e74c3c" font-family="sans-serif">O</text>
  
  <!-- 半徑r (O到圓周的水平線) -->
  <line x1="250" y1="240" x2="400" y2="240" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="310" y="232" font-size="16" font-weight="bold" fill="#2980b9" font-family="sans-serif">半徑 r</text>
  
  <!-- 直徑d (穿過圓心的線) -->
  <line x1="100" y1="240" x2="400" y2="240" stroke="#27ae60" stroke-width="2.5"/>
  <line x1="100" y1="235" x2="100" y2="245" stroke="#27ae60" stroke-width="2"/>
  <line x1="400" y1="235" x2="400" y2="245" stroke="#27ae60" stroke-width="2"/>
  <text x="215" y="265" font-size="16" font-weight="bold" fill="#27ae60" font-family="sans-serif">直徑 d = 2r</text>
  
  <!-- 圓周箭頭 -->
  <path d="M 370 140 A 150 150 0 0 1 400 240" fill="none" stroke="#e67e22" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="380" y="120" font-size="16" font-weight="bold" fill="#e67e22" font-family="sans-serif">圓周 C = πd = 2πr</text>
  
  <!-- π 說明 -->
  <text x="250" y="400" font-size="14" fill="#7f8c8d" font-family="sans-serif" text-anchor="middle">π ≈ 3.14 或 22/7</text>
  <text x="250" y="425" font-size="14" fill="#7f8c8d" font-family="sans-serif" text-anchor="middle">圓周 ÷ 直徑 = π（任何圓都一樣！）</text>
</svg>
