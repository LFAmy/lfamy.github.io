<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="300" height="180">
  <!-- Parallelogram -->
  <polygon points="30,140 130,140 200,30 100,30" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <line x1="100" y1="30" x2="100" y2="140" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="45" y="155" fill="#333" font-size="13" font-family="Arial">底=100</text>
  <text x="105" y="90" fill="#dc2626" font-size="12" font-family="Arial">高</text>
  <text x="105" y="75" fill="#dc2626" font-size="12" font-family="Arial">(垂直!)</text>
  <text x="180" y="50" fill="#333" font-size="12" font-family="Arial">斜邊≠高!</text>
  <!-- Arrow pointing to rectangle -->
  <text x="205" y="90" fill="#333" font-size="18" font-family="Arial">→</text>
  <!-- Rectangle -->
  <rect x="230" y="30" width="60" height="110" fill="#fef3c7" stroke="#2563eb" stroke-width="2"/>
  <text x="235" y="155" fill="#333" font-size="12" font-family="Arial">長方形</text>
  <text x="235" y="90" fill="#333" font-size="11" font-family="Arial">底×高</text>
</svg>
