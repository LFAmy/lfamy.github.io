<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- 長方體 3D 透視圖 - L26 體積概念 -->

  <!-- 前面 -->
  <rect x="30" y="80" width="180" height="120" fill="#DBEAFE" stroke="#1A3C6D" stroke-width="2.5"/>

  <!-- 上面（透視） -->
  <polygon points="30,80 70,35 250,35 210,80" fill="#BFDBFE" stroke="#1A3C6D" stroke-width="2.5"/>

  <!-- 右面（透視） -->
  <polygon points="210,80 250,35 250,155 210,200" fill="#93C5FD" stroke="#1A3C6D" stroke-width="2.5"/>

  <!-- 長度標註 (l) - 底邊 -->
  <line x1="30" y1="215" x2="210" y2="215" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="30" y1="210" x2="30" y2="220" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="210" y1="210" x2="210" y2="220" stroke="#DC2626" stroke-width="1.5"/>
  <text x="120" y="235" text-anchor="middle" font-size="14" fill="#DC2626" font-weight="700">長 (l)</text>

  <!-- 闊度標註 (w) - 右邊底邊 -->
  <line x1="215" y1="200" x2="260" y2="155" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="210" y1="205" x2="215" y2="195" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="255" y1="160" x2="260" y2="150" stroke="#DC2626" stroke-width="1.5"/>
  <text x="265" y="170" text-anchor="start" font-size="14" fill="#DC2626" font-weight="700">闊 (w)</text>

  <!-- 高度標註 (h) - 左邊垂直 -->
  <line x1="15" y1="80" x2="15" y2="200" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="10" y1="80" x2="20" y2="80" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="10" y1="200" x2="20" y2="200" stroke="#DC2626" stroke-width="1.5"/>
  <text x="8" y="145" text-anchor="end" font-size="14" fill="#DC2626" font-weight="700">高 (h)</text>

  <!-- 頂點標記 -->
  <circle cx="30" cy="80" r="3" fill="#1A3C6D"/>
  <circle cx="70" cy="35" r="3" fill="#1A3C6D"/>
  <circle cx="250" cy="35" r="3" fill="#1A3C6D"/>
  <circle cx="210" cy="80" r="3" fill="#1A3C6D"/>
  <circle cx="30" cy="200" r="3" fill="#1A3C6D"/>
  <circle cx="210" cy="200" r="3" fill="#1A3C6D"/>
  <circle cx="250" cy="155" r="3" fill="#1A3C6D"/>

  <!-- 虛線（被遮擋的邊） -->
  <line x1="30" y1="200" x2="70" y2="155" stroke="#1A3C6D" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="70" y1="155" x2="70" y2="35" stroke="#1A3C6D" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="70" y1="155" x2="250" y2="155" stroke="#1A3C6D" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 公式 -->
  <text x="200" y="275" text-anchor="middle" font-size="13" fill="#16A34A" font-weight="700">體積 = l × w × h</text>
  <text x="200" y="293" text-anchor="middle" font-size="11" fill="#6B7280">表面面積 = 2(l×w + w×h + l×h)</text>
</svg>
