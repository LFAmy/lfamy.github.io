<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>霖楓學苑 · 班級對戰 | Class Battle</title>
<meta name="description" content="即時班級對戰系統 — 一對三PK模式，老師一鍵啟動，即時排行榜。提升課堂互動+學生投入度。">
<style>
:root{--b:#1A3C6D;--g:#C9A84C;--r:#DC2626;--gr:#16A34A;--w:#FFF;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#6B7280;--g800:#374151}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK','PingFang SC','Microsoft YaHei',sans-serif;background:#0A1A35;color:white;min-height:100vh;overflow-x:hidden}
.container{max-width:800px;margin:0 auto;padding:20px}

/* Battle Arena */
.arena-header{text-align:center;padding:20px 0}
.arena-header h1{font-size:24px;background:linear-gradient(135deg,var(--g),#DFC06A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.arena-header .room-code{font-size:13px;opacity:0.6}

/* Player Cards */
.players-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.player-card{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px 12px;text-align:center;transition:all 0.3s;position:relative}
.player-card.active{border-color:var(--g);box-shadow:0 0 30px rgba(201,168,76,0.2)}
.player-card.answered{border-color:var(--gr);background:rgba(22,163,74,0.1)}
.player-card .p-avatar{font-size:40px;margin-bottom:8px}
.player-card .p-name{font-size:14px;font-weight:700;margin-bottom:4px}
.player-card .p-score{font-size:28px;font-weight:900;color:var(--g)}
.player-card .p-streak{font-size:10px;opacity:0.5}
.player-card .p-answer{font-size:12px;margin-top:8px;min-height:20px;padding:4px 8px;border-radius:8px}
.player-card .p-answer.correct{background:rgba(22,163,74,0.2);color:#4ADE80}
.player-card .p-answer.wrong{background:rgba(220,38,38,0.2);color:#F87171}

/* Question Zone */
.question-zone{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;text-align:center;margin:20px 0}
.question-zone .q-round{font-size:11px;color:var(--g);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.question-zone .q-text{font-size:22px;font-weight:700;margin-bottom:20px;line-height:1.5}
.answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;margin:0 auto}
.answer-btn{padding:18px;border:2px solid rgba(255,255,255,0.2);border-radius:14px;background:rgba(255,255,255,0.05);color:white;font-size:18px;cursor:pointer;transition:all 0.15s;font-family:inherit;text-align:center}
.answer-btn:hover{border-color:var(--g);background:rgba(201,168,76,0.1)}
.answer-btn:disabled{opacity:0.3;cursor:not-allowed}
.answer-btn.chosen{border-color:var(--g);background:rgba(201,168,76,0.2)}
.answer-btn.reveal-correct{border-color:var(--gr)!important;background:rgba(22,163,74,0.3)!important}
.answer-btn.reveal-wrong{border-color:var(--r)!important;background:rgba(220,38,38,0.3)!important}

/* Leaderboard */
.leaderboard{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin:20px 0}
.leaderboard h3{font-size:14px;color:var(--g);margin-bottom:12px;text-align:center}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;margin-bottom:4px;transition:all 0.3s}
.lb-row:nth-child(1){background:rgba(201,168,76,0.1)}
.lb-rank{font-size:18px;font-weight:900;width:30px;text-align:center}
.lb-rank.gold{color:var(--g)}.lb-rank.silver{color:#9CA3AF}.lb-rank.bronze{color:#D97706}
.lb-name{flex:1;font-size:14px}
.lb-score{font-weight:900;font-size:16px}

/* Teacher Controls */
.teacher-panel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;background:rgba(0,0,0,0.8);padding:12px 20px;border-radius:30px;backdrop-filter:blur(10px);z-index:100}
.teacher-panel button{padding:10px 20px;border-radius:20px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s}
.btn-start{background:var(--gr);color:white}
.btn-next{background:var(--g);color:var(--b)}
.btn-reveal{background:var(--r);color:white}
.btn-reset{background:transparent;border:1px solid rgba(255,255,255,0.3)!important;color:white}

/* Timer */
.countdown{font-size:48px;font-weight:900;text-align:center;color:var(--g);margin:8px 0}
.countdown.urgent{color:var(--r);animation:pulse 0.5s infinite}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}

/* Setup Screen */
.setup-screen{text-align:center;padding:40px 20px}
.setup-screen h2{font-size:20px;margin-bottom:8px}
.setup-screen .room-input{padding:14px 20px;border-radius:25px;border:none;font-size:16px;text-align:center;width:200px;font-family:inherit;margin:12px 0}
.grade-pick{display:flex;gap:8px;justify-content:center;margin:16px 0}
.grade-pick button{padding:10px 20px;border-radius:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;cursor:pointer;font-family:inherit;font-weight:700;transition:all 0.2s}
.grade-pick button.active{background:var(--b);border-color:var(--g)}
</style>
<link rel="manifest" href="/manifest.json">
</head>
<body>

body{padding-top:48px!important}
@media(max-width:500px){body{padding-top:44px!important}#lf-navbar{padding:6px 12px!important}#lf-navbar a{font-size:12px!important}#lf-navbar img{height:24px!important}}
</style>

<div class="container">

<!-- SETUP -->
<div id="screenSetup" class="setup-screen">
  <div style="font-size:60px;margin-bottom:16px">⚔️</div>
  <h2>班級對戰系統</h2>
  <p style="opacity:0.5;font-size:13px;margin:8px 0 16px">一對三即時PK · 老師控制台 · 排行榜</p>
  
  <p style="font-size:12px;opacity:0.5">選擇年級：</p>
  <div class="grade-pick" id="gradePick">
    <button onclick="pickGrade('P3',this)">P3</button>
    <button onclick="pickGrade('P4',this)">P4</button>
    <button onclick="pickGrade('P5',this)" class="active">P5</button>
    <button onclick="pickGrade('P6',this)">P6</button>
  </div>
  
  <p style="font-size:12px;opacity:0.5;margin-top:16px">回合數：</p>
  <div class="grade-pick" id="roundPick">
    <button onclick="pickRounds(5,this)">5回合</button>
    <button onclick="pickRounds(10,this)" class="active">10回合</button>
    <button onclick="pickRounds(15,this)">15回合</button>
  </div>
  
  <button class="btn-start" style="margin-top:20px;padding:16px 40px;font-size:16px" onclick="startBattle()">🚀 開始對戰</button>
</div>

<!-- BATTLE -->
<div id="screenBattle" style="display:none">
  <div class="arena-header">
    <h1>⚔️ 班級對戰</h1>
    <div class="room-code">P5 · 第 <span id="roundNum">1</span>/<span id="totalRounds">10</span> 回合</div>
  </div>

  <!-- Players -->
  <div class="players-row" id="playersRow">
    <div class="player-card active" id="p1card">
      <div class="p-avatar">🧑</div><div class="p-name">小明</div>
      <div class="p-score" id="p1score">0</div><div class="p-streak" id="p1streak"></div>
      <div class="p-answer" id="p1ans"></div>
    </div>
    <div class="player-card" id="p2card">
      <div class="p-avatar">👧</div><div class="p-name">小美</div>
      <div class="p-score" id="p2score">0</div><div class="p-streak" id="p2streak"></div>
      <div class="p-answer" id="p2ans"></div>
    </div>
    <div class="player-card" id="p3card">
      <div class="p-avatar">🧒</div><div class="p-name">家豪</div>
      <div class="p-score" id="p3score">0</div><div class="p-streak" id="p3streak"></div>
      <div class="p-answer" id="p3ans"></div>
    </div>
  </div>

  <!-- Question -->
  <div class="question-zone" id="questionZone">
    <div class="q-round">回合 <span id="qRoundNum">1</span></div>
    <div class="q-text" id="qText">準備開始...</div>
    <div class="countdown" id="countdown"></div>
    <div class="answer-grid" id="answerGrid"></div>
  </div>

  <!-- Leaderboard -->
  <div class="leaderboard">
    <h3>🏆 即時排行榜</h3>
    <div id="leaderboard"></div>
  </div>
</div>

<!-- Teacher Panel -->
<div class="teacher-panel" id="teacherPanel" style="display:none">
  <button class="btn-reset" onclick="resetBattle()">🔄</button>
  <button class="btn-reveal" id="btnReveal" onclick="revealAnswer()" disabled>👁 揭曉</button>
  <button class="btn-next" id="btnNext" onclick="nextRound()" disabled>下一回合 →</button>
</div>

<script src="/docs/data/lf-cloud-sync.js"></script>
<script>
// ═══════════════════════════════════════
// CLASS BATTLE SYSTEM
// ═══════════════════════════════════════

var Battle = {
  grade: 'P5', rounds: 10, currentRound: 0,
  players: [
    {name:'小明',score:0,streak:0,bestStreak:0,lastAnswer:null,emoji:'🧑'},
    {name:'小美',score:0,streak:0,bestStreak:0,lastAnswer:null,emoji:'👧'},
    {name:'家豪',score:0,streak:0,bestStreak:0,lastAnswer:null,emoji:'🧒'}
  ],
  questions: [],
  currentQ: null,
  answered: [false,false,false],
  
  pool: {
    P5: [
      {q:'三角形底10cm高6cm面積=？', opts:['60cm²','30cm²','16cm²','40cm²'], ans:1},
      {q:'梯形上底5下底9高4面積=？', opts:['28cm²','56cm²','14cm²','36cm²'], ans:0},
      {q:'2/3 + 1/4 = ?', opts:['3/7','11/12','3/12','8/12'], ans:1},
      {q:'八折後$240原價=？', opts:['$192','$300','$288','$200'], ans:1},
      {q:'3x+5=20, x=?', opts:['3','4','5','15'], ans:2},
      {q:'2.5小時行150km速率=？', opts:['60km/h','75km/h','375km/h','50km/h'], ans:0},
      {q:'1.2×0.5=?', opts:['0.6','6','0.06','60'], ans:0},
      {q:'2小時15分-45分=?', opts:['1h30min','1h15min','2h','1h45min'], ans:0},
      {q:'平行四邊形底8高5面積=?', opts:['13cm²','20cm²','40cm²','80cm²'], ans:2},
      {q:'5x-3=17, x=?', opts:['4','2.8','14','20'], ans:0},
      {q:'正方體邊長4cm體積=?', opts:['16cm³','64cm³','12cm³','48cm³'], ans:1},
      {q:'1/2÷1/4=?', opts:['1/8','2','1/2','4'], ans:1},
      {q:'$800加10%再減10%=?', opts:['$800','$792','$808','$880'], ans:1},
      {q:'長方體6×4×3體積=?', opts:['72cm³','18cm³','24cm³','13cm³'], ans:0},
      {q:'組合圖正方形6+三角形高4面積=?', opts:['48cm²','60cm²','36cm²','72cm²'], ans:0}
    ]
  },
  
  shuffle: function(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}
};

function pickGrade(g,el){
  document.querySelectorAll('#gradePick button').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  Battle.grade = g;
}

function pickRounds(r,el){
  document.querySelectorAll('#roundPick button').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  Battle.rounds = r;
}

function startBattle(){
  var pool = Battle.pool[Battle.grade] || Battle.pool.P5;
  Battle.questions = Battle.shuffle(pool.slice()).slice(0,Battle.rounds);
  Battle.currentRound = 0;
  Battle.players.forEach(function(p){p.score=0;p.streak=0;p.bestStreak=0;});
  
  document.getElementById('screenSetup').style.display='none';
  document.getElementById('screenBattle').style.display='block';
  document.getElementById('teacherPanel').style.display='flex';
  document.getElementById('totalRounds').textContent = Battle.rounds;
  updateLeaderboard();
  nextRound();
}

function nextRound(){
  if(Battle.currentRound >= Battle.rounds){ endBattle(); return; }
  
  Battle.currentQ = Battle.questions[Battle.currentRound];
  Battle.answered = [false,false,false];
  Battle.currentRound++;
  
  document.getElementById('roundNum').textContent = Battle.currentRound;
  document.getElementById('qRoundNum').textContent = Battle.currentRound;
  document.getElementById('qText').textContent = Battle.currentQ.q;
  document.getElementById('countdown').textContent = '15';
  document.getElementById('countdown').classList.remove('urgent');
  
  // Answer buttons
  var grid = document.getElementById('answerGrid');
  var letters = ['A','B','C','D'];
  grid.innerHTML = '';
  for(var i=0;i<Battle.currentQ.opts.length;i++){
    (function(idx){
      var btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = letters[idx]+'. '+Battle.currentQ.opts[idx];
      btn.onclick = function(){ playerAnswer(idx); };
      grid.appendChild(btn);
    })(i);
  }
  
  // Reset player cards
  [1,2,3].forEach(function(n){
    document.getElementById('p'+n+'card').classList.remove('answered');
    document.getElementById('p'+n+'ans').textContent = '';
    document.getElementById('p'+n+'ans').className = 'p-answer';
    document.getElementById('p'+n+'streak').textContent = '';
  });
  document.getElementById('p1card').classList.add('active');
  
  document.getElementById('btnReveal').disabled = true;
  document.getElementById('btnNext').disabled = true;
  
  // Countdown
  var sec = 15;
  Battle._timer = setInterval(function(){
    sec--;
    document.getElementById('countdown').textContent = sec;
    if(sec<=5) document.getElementById('countdown').classList.add('urgent');
    if(sec<=0){ clearInterval(Battle._timer); timeUp(); }
  },1000);
}

function playerAnswer(idx){
  if(Battle.answered[0]) return; // Only P1 (teacher mode simulation)
  
  clearInterval(Battle._timer);
  var correct = (idx === Battle.currentQ.ans);
  Battle.answered = [true,true,true]; // Simulate all answered
  
  // Update player scores (simulated - in real mode each student answers independently)
  var results = simulatePlayerAnswers();
  
  // Show answers on cards
  results.forEach(function(r,i){
    var p = Battle.players[i];
    p.lastAnswer = r.chosen;
    if(r.correct){ p.score+=10+(p.streak*2); p.streak++; if(p.streak>p.bestStreak)p.bestStreak=p.streak; }
    else { p.streak=0; }
    
    var ansEl = document.getElementById('p'+(i+1)+'ans');
    ansEl.textContent = r.correct?'✅ '+Battle.currentQ.opts[r.chosen]:'❌ '+Battle.currentQ.opts[r.chosen];
    ansEl.className = 'p-answer '+(r.correct?'correct':'wrong');
    document.getElementById('p'+(i+1)+'score').textContent = p.score;
    document.getElementById('p'+(i+1)+'streak').textContent = p.streak>=2?'🔥'+p.streak:'';
    document.getElementById('p'+(i+1)+'card').classList.add('answered');
  });
  
  document.getElementById('btnReveal').disabled = false;
  updateLeaderboard();
}

function simulatePlayerAnswers(){
  // Simulate 3 students answering with varying accuracy
  return [
    {chosen:Battle.currentQ.ans, correct:true},  // P1 always correct (teacher demo)
    {chosen:Math.random()>0.4?Battle.currentQ.ans:(Battle.currentQ.ans+1+Math.floor(Math.random()*2))%4, correct:false},
    {chosen:Math.random()>0.5?Battle.currentQ.ans:(Battle.currentQ.ans+1+Math.floor(Math.random()*2))%4, correct:false}
  ].map(function(r){ r.correct=(r.chosen===Battle.currentQ.ans); return r; });
}

function timeUp(){
  Battle.answered = [true,true,true];
  var results = simulatePlayerAnswers().map(function(r){ r.correct=false; return r; }); // All wrong on timeout
  results.forEach(function(r,i){
    var p = Battle.players[i]; p.streak=0;
    document.getElementById('p'+(i+1)+'ans').textContent = '⏰ 超時';
    document.getElementById('p'+(i+1)+'ans').className = 'p-answer wrong';
  });
  document.getElementById('btnReveal').disabled = false;
}

function revealAnswer(){
  var btns = document.querySelectorAll('.answer-btn');
  btns.forEach(function(b,i){
    b.classList.add(i===Battle.currentQ.ans?'reveal-correct':'reveal-wrong');
    b.disabled = true;
  });
  document.getElementById('btnNext').disabled = false;
  document.getElementById('countdown').textContent = '';
}

function updateLeaderboard(){
  var sorted = Battle.players.slice().sort(function(a,b){return b.score-a.score;});
  var ranks = ['🥇','🥈','🥉'];
  var html = '';
  sorted.forEach(function(p,i){
    html += '<div class="lb-row"><span class="lb-rank '+(i===0?'gold':i===1?'silver':'bronze')+'">'+ranks[i]+'</span><span class="lb-name">'+p.emoji+' '+p.name+'</span><span class="lb-score">'+p.score+'分</span></div>';
  });
  document.getElementById('leaderboard').innerHTML = html;
}

function endBattle(){
  clearInterval(Battle._timer);
  var sorted = Battle.players.slice().sort(function(a,b){return b.score-a.score;});
  document.getElementById('questionZone').innerHTML = 
    '<div style="font-size:60px;margin:20px 0">🏆</div>'+
    '<h2>對戰結束！</h2>'+
    '<p style="font-size:20px;margin:12px 0;color:var(--g)">🥇 '+sorted[0].emoji+' '+sorted[0].name+' - '+sorted[0].score+'分</p>'+
    '<p style="opacity:0.7">🥈 '+sorted[1].name+' - '+sorted[1].score+'分 | 🥉 '+sorted[2].name+' - '+sorted[2].score+'分</p>'+
    '<button onclick="resetBattle()" style="margin-top:20px;padding:12px 30px;border-radius:25px;background:var(--g);color:var(--b);border:none;font-weight:900;font-size:14px;cursor:pointer">🔄 再來一局</button>';
  document.getElementById('teacherPanel').style.display = 'none';
}

function resetBattle(){
  clearInterval(Battle._timer);
  document.getElementById('screenBattle').style.display = 'none';
  document.getElementById('screenSetup').style.display = 'block';
  document.getElementById('teacherPanel').style.display = 'none';
}
</script>
