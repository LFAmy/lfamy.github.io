<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · IG Story 廣告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.story{width:1080px;height:1920px;background:linear-gradient(180deg,#0A1A35 0%,#1A3C6D 30%,#1E4D8C 60%,#0F2440 100%);color:white;font-family:"Noto Sans HK","PingFang SC","Microsoft YaHei",sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.story::before{content:"";position:absolute;top:-300px;left:-300px;width:800px;height:800px;border:2px solid rgba(201,168,76,0.12);border-radius:50%}
.story::after{content:"";position:absolute;bottom:-200px;right:-200px;width:500px;height:500px;border:2px solid rgba(201,168,76,0.08);border-radius:50%}

.top{text-align:center;padding:80px 60px 30px;z-index:1}
.logo{font-family:"Noto Serif HK",serif;font-size:60px;font-weight:900;color:#C9A84C;margin-bottom:30px;letter-spacing:8px}
.pain{font-size:32px;color:#F59E0B;font-weight:700;margin-bottom:16px}
.big-line{font-size:64px;font-weight:900;line-height:1.15;margin-bottom:20px}
.big-line .hl{color:#C9A84C}
.sub{font-size:28px;opacity:0.8;line-height:1.5;margin-bottom:40px;max-width:800px;margin-left:auto;margin-right:auto}

.trap-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:50px;z-index:1;padding:0 60px}
.trap{background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.25);padding:14px 28px;border-radius:24px;font-size:22px;font-weight:700}

.big-stats{display:flex;justify-content:center;gap:30px;margin-bottom:50px;z-index:1}
.bstat{text-align:center}
.bstat .n{font-size:72px;font-weight:900;color:#C9A84C;line-height:1}
.bstat .l{font-size:20px;opacity:0.6;margin-top:8px}

.cta-area{text-align:center;z-index:1;padding:0 60px}
.cta-btn{display:inline-block;background:linear-gradient(135deg,#DC2626,#B91C1C);color:white;padding:28px 60px;border-radius:20px;font-size:32px;font-weight:900;box-shadow:0 12px 36px rgba(220,38,38,0.35);cursor:pointer;border:none;font-family:inherit}
.swipe{font-size:20px;opacity:0.4;margin-top:30px}

.bottom{text-align:center;padding:50px 60px 80px;margin-top:auto;z-index:1;font-size:20px;opacity:0.4}
</style>
</head>
<body>
<div class="story">
<div class="top">
<div class="logo"><img src="logo.png" alt="霖楓學苑" style="height:44px"></div>
<div class="pain">你小朋友數學成日錯同一樣嘢？</div>
<div class="big-line">唔係佢蠢，係踩咗<span class="hl">陷阱</span>！</div>
<div class="sub">香港首創陷阱教學法<br>P3-P6 呈分試專家</div>
</div>

<div class="trap-row">
<span class="trap">🔴 進退位</span>
<span class="trap">🔴 小數點</span>
<span class="trap">🔴 運算順序</span>
<span class="trap">🔴 面積公式</span>
</div>

<div class="big-stats">
<div class="bstat"><div class="n">10</div><div class="l">陷阱類型</div></div>
<div class="bstat"><div class="n">14K+</div><div class="l">精選題目</div></div>
<div class="bstat"><div class="n">1:3</div><div class="l">師生比</div></div>
</div>

<div class="cta-area">
<button class="cta-btn" onclick="alert('📱 WhatsApp 查詢免費試堂')">🎯 免費試堂 →</button>
<div class="swipe">⬆️ 回覆「試堂」獲取診斷報告</div>
</div>

<div class="bottom">www.lfacademyhk.com · 霖楓學苑 LF Academy</div>
</div>
</body>
</html>
