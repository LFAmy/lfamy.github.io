<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>霖楓學苑 · 進步分享卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans HK','PingFang SC','Microsoft YaHei','SimHei',sans-serif;background:#F3F4F6;color:#1A1A1A;font-size:14px;padding:20px}
.container{max-width:700px;margin:0 auto}
.header{background:linear-gradient(135deg,#1A3C6D,#1E4D8C);color:white;border-radius:16px;padding:24px;text-align:center;margin-bottom:20px}
.card-preview{background:linear-gradient(135deg,#1A3C6D,#1E4D8C);color:white;border-radius:20px;padding:32px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.card-preview::before{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;border:2px solid rgba(201,168,76,0.2);border-radius:50%}
.card-preview .badge{display:inline-block;background:rgba(201,168,76,0.2);color:#C9A84C;padding:6px 18px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px}
.card-preview .name{font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:22px;margin-bottom:4px}
.card-preview .grade{font-size:13px;opacity:0.7;margin-bottom:16px}
.card-preview .big-num{font-size:56px;font-weight:900;color:#C9A84C;margin:8px 0}
.card-preview .subtitle{font-size:14px;opacity:0.8;margin-bottom:12px}
.card-preview .stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.card-preview .stat-item{text-align:center}
.card-preview .stat-val{font-size:20px;font-weight:900;color:#C9A84C}
.card-preview .stat-lbl{font-size:10px;opacity:0.5}
.card-preview .brand{font-family:'Noto Serif HK','PingFang SC','SimSun','STSong','KaiTi',serif;font-size:11px;opacity:0.4;margin-top:12px}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
input,select{padding:10px 14px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit;flex:1;min-width:120px}
.btn{display:inline-block;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:inherit;background:#1A3C6D;color:white;margin:4px}
.btn-green{background:#25D366}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🎴 進步分享卡生成器</h1><p>一鍵生成精美進度卡片 · 分享到 WhatsApp/小紅書</p></div>

<div class="card-preview" id="shareCard">
<div class="badge">霖楓學苑 · 學習報告</div>
<div class="name" id="scName">陳小明</div>
<div class="grade" id="scGrade">P5 · 過去4堂</div>
<div class="big-num" id="scAccuracy">78%</div>
<div class="subtitle">正確率 · 上升 16%</div>
<div class="stats">
<div class="stat-item"><div class="stat-val" id="scTraps">3</div><div class="stat-lbl">已避開陷阱</div></div>
<div class="stat-item"><div class="stat-val" id="scStreak">7</div><div class="stat-lbl">連續練習天</div></div>
<div class="stat-item"><div class="stat-val" id="scTests">12</div><div class="stat-lbl">完成練習</div></div>
</div>
<div class="brand">lamfungacademy.com</div>
</div>

<div class="form-row">
<input type="text" id="scInputName" placeholder="學生名稱" value="陳小明">
<select id="scInputGrade"><option>P3</option><option>P4</option><option selected>P5</option><option>P6</option></select>
<input type="text" id="scInputAcc" placeholder="正確率%" value="78">
<input type="text" id="scInputTraps" placeholder="已避開陷阱數" value="3">
</div>
<button class="btn" onclick="updateCard()">🔄 更新卡片</button>
<button class="btn btn-green" onclick="shareCard()">📱 分享到 WhatsApp</button>
<button class="btn" onclick="downloadCard()">📥 下載圖片</button>
</div>

<script>
function updateCard(){
document.getElementById("scName").textContent=document.getElementById("scInputName").value||"同學";
document.getElementById("scGrade").textContent=(document.getElementById("scInputGrade").value||"P5")+" · 過去4堂";
document.getElementById("scAccuracy").textContent=(document.getElementById("scInputAcc").value||"78")+"%";
document.getElementById("scTraps").textContent=document.getElementById("scInputTraps").value||"3";
}
function shareCard(){
var t="我小朋友嘅數學進步報告！\n正確率："+document.getElementById("scAccuracy").textContent+"\n已避開 "+document.getElementById("scTraps").textContent+" 個陷阱\n霖楓學苑 · 陷阱診斷教學法";
window.open("https://wa.me/?text="+encodeURIComponent(t),"_blank");
}
function downloadCard(){alert("卡片已準備好！可以截圖分享 📸")}
</script>
</body></html>
