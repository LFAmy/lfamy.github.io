<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教研題庫瀏覽器 | 霖楓學苑 · LF Academy</title><style>
<style>
:root {
  --primary: #1B3A5C; --primary-light: #2A5A8C;
  --gold: #C8922A; --gold-light: #E8B84B;
  --accent: #2D7D46; --accent-light: #3DA85E;
  --bg: #F7F4ED; --card: #FFFFFF;
  --text: #2C3E50; --text-light: #5D6D7E;
  --border: #E2DCCE; --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 12px; --radius-sm: 8px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; scroll-behavior:smooth; }
body {
  font-family: 'Noto Sans HK', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text); background: var(--bg);
  line-height: 1.6; min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, #0F2A45 100%);
  color: #fff; padding: 24px 0; text-align: center; position: relative;
}
.header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px; background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.header h1 { font-size: 1.6rem; font-weight: 900; }
.header .tagline { font-size: 0.9rem; color: var(--gold-light); margin-top: 4px; }

/* Layout */
.app-layout { display: flex; gap: 24px; max-width: 1300px; margin: 24px auto; padding: 0 20px; align-items: flex-start; }
.main-content { flex: 1; min-width: 0; }
.sidebar { width: 340px; flex-shrink: 0; position: sticky; top: 20px; }

/* Stats Bar */
.stats-bar {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card); border-radius: var(--radius-sm);
  padding: 14px 12px; text-align: center; box-shadow: var(--shadow);
  border-top: 3px solid var(--primary);
}
.stat-card .stat-num { font-size: 1.5rem; font-weight: 900; color: var(--primary); }
.stat-card .stat-label { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }

/* Filter Panel */
.filter-panel {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 20px 24px; margin-bottom: 20px;
}
.filter-panel h3 { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 16px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.filter-row:last-child { margin-bottom: 0; }
.filter-chip {
  padding: 6px 14px; border: 2px solid var(--border); border-radius: 20px;
  font-size: 0.8rem; font-weight: 500; cursor: pointer; user-select: none;
  transition: all 0.2s; background: var(--bg); color: var(--text);
}
.filter-chip:hover { border-color: var(--primary-light); }
.filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.filter-chip.trap-T1.active { background: #E74C3C; border-color: #E74C3C; }
.filter-chip.trap-T2.active { background: #E67E22; border-color: #E67E22; }
.filter-chip.trap-T3.active { background: #2980B9; border-color: #2980B9; }
.filter-chip.trap-T4.active { background: #27AE60; border-color: #27AE60; }
.filter-chip.trap-T5.active { background: #8E44AD; border-color: #8E44AD; }
.filter-chip.trap-T6.active { background: #16A085; border-color: #16A085; }
.filter-chip.trap-T7.active { background: #D35400; border-color: #D35400; }
.filter-chip.trap-T8.active { background: #2C3E50; border-color: #2C3E50; }
.filter-chip.trap-T9.active { background: #C0392B; border-color: #C0392B; }
.filter-chip.trap-T10.active { background: #7F8C8D; border-color: #7F8C8D; }
.chip-diff { border-color: var(--gold); }
.chip-diff.active { background: var(--gold); border-color: var(--gold); color: #fff; }
.chip-type { border-color: var(--accent); }
.chip-type.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.search-box {
  width: 100%; padding: 10px 16px; border: 2px solid var(--border);
  border-radius: 25px; font-size: 0.9rem; font-family: inherit;
  outline: none; transition: border-color 0.2s; background: var(--bg);
}
.search-box:focus { border-color: var(--primary); }

/* Question List */
.results-info {
  font-size: 0.85rem; color: var(--text-light); margin-bottom: 12px;
  font-weight: 500;
}
.question-card {
  background: var(--card); border-radius: var(--radius-sm);
  box-shadow: var(--shadow); padding: 16px 20px; margin-bottom: 10px;
  cursor: pointer; transition: all 0.2s; border-left: 4px solid transparent;
  position: relative;
}
.question-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.question-card.selected { border-left-color: var(--accent); background: #F7FAF8; }
.question-card .q-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.question-card .q-id { font-weight: 700; color: var(--primary); font-size: 0.85rem; min-width: 32px; }
.question-card .q-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  padding: 2px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600;
  white-space: nowrap;
}
.badge-trap { background: #EDF2F8; color: var(--primary); }
.badge-trap.T1 { background: #FDEDEC; color: #E74C3C; }
.badge-trap.T2 { background: #FEF5E7; color: #E67E22; }
.badge-trap.T3 { background: #EBF5FB; color: #2980B9; }
.badge-trap.T4 { background: #E8F8F5; color: #27AE60; }
.badge-trap.T5 { background: #F4ECF7; color: #8E44AD; }
.badge-trap.T6 { background: #E8F8F5; color: #16A085; }
.badge-trap.T7 { background: #FEF5E7; color: #D35400; }
.badge-trap.T8 { background: #EAECEE; color: #2C3E50; }
.badge-trap.T9 { background: #FDEDEC; color: #C0392B; }
.badge-trap.T10 { background: #F2F3F4; color: #7F8C8D; }
.badge-diff { background: #FEF9E7; color: #B7950B; }
.badge-type { background: #E8F8F5; color: var(--accent); }
.question-card .q-text { font-size: 0.9rem; margin-bottom: 4px; }
.question-card .q-detail {
  display: none; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border); font-size: 0.85rem;
}
.question-card.expanded .q-detail { display: block; }
.q-detail .answer-block {
  background: #F0F8F0; padding: 8px 12px; border-radius: 6px;
  font-weight: 600; color: var(--accent);
}
.q-detail .options-block { margin-bottom: 8px; }
.q-detail .options-block span { display: inline-block; margin-right: 12px; font-size: 0.88rem; }
.q-checkbox {
  position: absolute; top: 16px; right: 16px;
  width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent);
  transform: scale(1.5);
}

/* Sidebar / Worksheet Builder */
.worksheet-sidebar {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 20px 24px;
}
.worksheet-sidebar h3 {
  font-size: 1rem; font-weight: 700; color: var(--primary);
  margin-bottom: 4px;
}
.worksheet-sidebar .ws-count {
  font-size: 0.82rem; color: var(--text-light); margin-bottom: 16px;
}
.ws-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
}
.ws-item .ws-remove {
  color: #E74C3C; cursor: pointer; font-weight: 700; font-size: 1.1rem;
  padding: 2px 8px;
}
.ws-item .ws-remove:hover { background: #FDEDEC; border-radius: 4px; }
.ws-empty { text-align: center; color: var(--text-light); padding: 24px 0; font-size: 0.88rem; }
.ws-actions { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.btn-ws {
  padding: 10px; border: none; border-radius: var(--radius-sm);
  font-size: 0.88rem; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.btn-ws-print { background: var(--primary); color: #fff; }
.btn-ws-print:hover { background: var(--primary-light); }
.btn-ws-clear { background: var(--bg); color: var(--text); border: 2px solid var(--border); }
.btn-ws-clear:hover { border-color: #E74C3C; color: #E74C3C; }
.btn-ws-whatsapp { background: #25D366; color: #fff; }
.btn-ws-whatsapp:hover { background: #1EA84F; }

/* Footer */
.footer {
  text-align: center; padding: 24px; color: var(--text-light);
  font-size: 0.82rem; margin-top: 40px; border-top: 1px solid var(--border);
}
.footer strong { color: var(--primary); }

/* Print styles */
@media print {
  body { background: #fff; }
  .header, .filter-panel, .stats-bar, .sidebar, .footer, .results-info, .q-checkbox { display: none !important; }
  .app-layout { display: block; max-width: 100%; }
  .question-card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  .question-card.expanded .q-detail { display: block; }
}

@media (max-width: 1024px) {
  .app-layout { flex-direction: column; }
  .sidebar { width: 100%; position: static; }
  .stats-bar { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 600px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .filter-panel { padding: 14px 12px; }
  .question-card { padding: 12px 14px; }
}
</style>
</head>

// ---- State ----
let activeFilters = { traps: [], diffs: [], types: [], search: '' };
let selectedQuestions = new Set();
let expandedCards = new Set();

// ---- Init ----
function init() {
  buildFilterChips();
  updateStats();
  applyFilters();
}
function buildFilterChips() {
  // Trap filters
  const traps = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10'];
  const trapLabels = {
    T1:'近似值·位值', T2:'小數轉換', T3:'分數運算', T4:'面積計算',
    T5:'方向·對稱·體積', T6:'公因數·公倍數', T7:'倍數應用',
    T8:'平均數·應用', T9:'餘數·除法', T10:'代數·數據'
  };
  const trapDiv = document.getElementById('trapFilters');
  trapDiv.innerHTML = traps.map(t =>
    `<span class="filter-chip trap-${t}" data-group="traps" data-val="${t}" onclick="toggleFilter(this)">${t} ${trapLabels[t]}</span>`
  ).join('');

  // Diff filters
  const diffs = [
    {val:'🌱', label:'🌱 基礎'},
    {val:'🌿', label:'🌿 標準'},
    {val:'🌳', label:'🌳 挑戰'}
  ];
  const diffDiv = document.getElementById('diffFilters');
  diffDiv.innerHTML = diffs.map(d =>
    `<span class="filter-chip chip-diff" data-group="diffs" data-val="${d.val}" onclick="toggleFilter(this)">${d.label}</span>`
  ).join('');

  // Type filters
  const types = [
    {val:'mc', label:'多項選擇'},
    {val:'short', label:'短答題'},
    {val:'long', label:'應用題'}
  ];
  const typeDiv = document.getElementById('typeFilters');
  typeDiv.innerHTML = types.map(t =>
    `<span class="filter-chip chip-type" data-group="types" data-val="${t.val}" onclick="toggleFilter(this)">${t.label}</span>`
  ).join('');
}

function toggleFilter(chip) {
  const group = chip.dataset.group;
  const val = chip.dataset.val;
  const arr = activeFilters[group];
  const idx = arr.indexOf(val);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(val);
  chip.classList.toggle('active');
  applyFilters();
}

function clearFilters() {
  activeFilters = { traps: [], diffs: [], types: [], search: '' };
  document.getElementById('searchBox').value = '';
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  applyFilters();
}

function applyFilters() {
  activeFilters.search = document.getElementById('searchBox').value.toLowerCase().trim();
  let pool = [...Q];

  if (activeFilters.traps.length > 0) {
    pool = pool.filter(q => activeFilters.traps.includes(q.trap));
  }
  if (activeFilters.diffs.length > 0) {
    pool = pool.filter(q => activeFilters.diffs.includes(q.diff));
  }
  if (activeFilters.types.length > 0) {
    pool = pool.filter(q => activeFilters.types.includes(q.type));
  }
  if (activeFilters.search) {
    pool = pool.filter(q =>
      q.q.toLowerCase().includes(activeFilters.search) ||
      q.topic.includes(activeFilters.search) ||
      q.trap.includes(activeFilters.search) ||
      q.id.toLowerCase().includes(activeFilters.search)
    );
  }

  document.getElementById('resultsInfo').textContent = `顯示 ${pool.length} / ${Q.length} 題`;
  renderQuestionList(pool);
  updateStats();
}

function updateStats() {
  let pool = [...Q];
  if (activeFilters.traps.length) pool = pool.filter(q => activeFilters.traps.includes(q.trap));
  if (activeFilters.diffs.length) pool = pool.filter(q => activeFilters.diffs.includes(q.diff));
  if (activeFilters.types.length) pool = pool.filter(q => activeFilters.types.includes(q.type));

  const total = Q.length;
  const mcCount = Q.filter(q => q.type === 'mc').length;
  const shortCount = Q.filter(q => q.type === 'short').length;
  const longCount = Q.filter(q => q.type === 'long').length;
  const basicCount = Q.filter(q => q.diff === '🌱').length;
  const stdCount = Q.filter(q => q.diff === '🌿').length;
  const chalCount = Q.filter(q => q.diff === '🌳').length;
  const trapCounts = {};
  ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10'].forEach(t => {
    trapCounts[t] = Q.filter(q => q.trap === t).length;
  });

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">總題數</div></div>
    <div class="stat-card"><div class="stat-num">${mcCount}</div><div class="stat-label">MC 選擇題</div></div>
    <div class="stat-card"><div class="stat-num">${shortCount}</div><div class="stat-label">短答題</div></div>
    <div class="stat-card"><div class="stat-num">${longCount}</div><div class="stat-label">應用題</div></div>
    <div class="stat-card"><div class="stat-num">10</div><div class="stat-label">陷阱類型</div></div>
  `;
}

function renderQuestionList(pool) {
  const container = document.getElementById('questionList');
  const typeLabels = { mc: 'MC', short: '短答', long: '應用' };
  container.innerHTML = pool.map(q => {
    const isSel = selectedQuestions.has(q.id);
    const isExp = expandedCards.has(q.id);
    const ansText = q.type === 'mc'
      ? `${String.fromCharCode(65 + q.ans)}. ${q.opts[q.ans]}`
      : q.ans;
    const optsHtml = q.type === 'mc'
      ? `<div class="options-block">${q.opts.map((o,i) => `<span>${String.fromCharCode(65+i)}. ${o}</span>`).join('')}</div>`
      : '';

    return `
    <div class="question-card ${isSel ? 'selected' : ''} ${isExp ? 'expanded' : ''}" id="card-${q.id}" onclick="toggleExpand(event, '${q.id}')">
      <input type="checkbox" class="q-checkbox" ${isSel ? 'checked' : ''} onclick="event.stopPropagation(); toggleSelect('${q.id}')" title="加入工作紙">
      <div class="q-header">
        <span class="q-id">${q.id}</span>
        <div class="q-badges">
          <span class="badge badge-trap ${q.trap}">${q.trap}</span>
          <span class="badge badge-diff">${q.diff}</span>
          <span class="badge badge-type">${typeLabels[q.type] || q.type}</span>
          <span class="badge">${q.topic}</span>
        </div>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="q-detail">
        ${optsHtml}
        <div class="answer-block">✅ 答案：${ansText}</div>
      </div>
    </div>`;
  }).join('');

  updateWorksheetUI();
}

function toggleExpand(event, id) {
  // Don't expand if clicking checkbox
  if (event.target.type === 'checkbox') return;
  const card = document.getElementById('card-' + id);
  if (!card) return;
  if (expandedCards.has(id)) {
    expandedCards.delete(id);
    card.classList.remove('expanded');
  } else {
    expandedCards.add(id);
    card.classList.add('expanded');
  }
}

function toggleSelect(id) {
  if (selectedQuestions.has(id)) {
    selectedQuestions.delete(id);
  } else {
    selectedQuestions.add(id);
  }
  // Re-render to update visual states
  applyFilters();
}

function updateWorksheetUI() {
  const wsList = document.getElementById('wsList');
  const wsCount = document.getElementById('wsCount');
  const btnPrint = document.getElementById('btnPrintWs');

  wsCount.textContent = `已選 ${selectedQuestions.size} 題`;
  btnPrint.disabled = selectedQuestions.size === 0;

  if (selectedQuestions.size === 0) {
    wsList.innerHTML = '<div class="ws-empty">點擊題目旁的 ☐ 選擇題目<br>建立自訂工作紙</div>';
    return;
  }

  const selectedQs = Q.filter(q => selectedQuestions.has(q.id));
  const typeLabels = { mc: 'MC', short: '短答', long: '應用' };
  wsList.innerHTML = selectedQs.map(q => `
    <div class="ws-item">
      <span>${q.id} <span style="font-size:0.75rem;color:var(--text-light)">[${typeLabels[q.type]}] ${q.trap}</span></span>
      <span class="ws-remove" onclick="removeFromWorksheet('${q.id}')" title="移除">×</span>
    </div>
  `).join('');

  // Add marks summary
  const totalMarks = selectedQs.reduce((sum, q) => {
    return sum + (q.type === 'mc' ? 3 : q.type === 'short' ? 5 : 10);
  }, 0);
  wsList.innerHTML += `<div style="margin-top:12px;font-weight:700;font-size:0.9rem;color:var(--primary);">總分：${totalMarks} 分 · ${selectedQs.size} 題</div>`;
}

function removeFromWorksheet(id) {
  selectedQuestions.delete(id);
  applyFilters();
}

function clearWorksheet() {
  selectedQuestions.clear();
  applyFilters();
}

function printWorksheet() {
  if (selectedQuestions.size === 0) return;
  const selectedQs = Q.filter(q => selectedQuestions.has(q.id));
  const typeLabels = { mc: 'MC', short: '短答', long: '應用' };

  let html = '<html><head>
<meta charset="UTF-8"><title>工作紙</title><style>';
  html += '';
  html += '<style>body{font-family:"Noto Sans HK","PingFang SC","Microsoft YaHei","SimHei",sans-serif;padding:30px;max-width:800px;margin:0 auto;color:#2C3E50;}';
  html += 'h2{text-align:center;color:#1B3A5C;margin-bottom:4px;}';
  html += '.subtitle{text-align:center;font-size:0.85rem;color:#5D6D7E;margin-bottom:20px;}';
  html += '.q{margin-bottom:16px;padding:10px;border-bottom:1px solid #ddd;page-break-inside:avoid;}';
  html += '.q-num{font-weight:700;} .q-text{display:inline;}';
  html += '.answer-line{display:inline-block;min-width:200px;border-bottom:1px dashed #ccc;margin-left:10px;}';
  html += '.opts{margin-left:30px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;}';
  html += '.footer{margin-top:30px;text-align:center;font-size:0.8rem;color:#999;}';
  html += '@media print{body{padding:10px;}}';
  html += '</style></head><body>';
  html += '<h2>霖楓學苑 · 自訂工作紙</h2>';
  html += '<p class="subtitle">姓名：________  日期：________  分數：________</p>';

  selectedQs.forEach((q, i) => {
    html += `<div class="q"><span class="q-num">${i+1}.</span>`;
    html += `<span class="q-text">${q.q}</span>`;
    if (q.type === 'mc') {
      html += '<div class="opts">';
      q.opts.forEach((o, j) => {
        html += `<span>${String.fromCharCode(65+j)}. ${o}</span>`;
      });
      html += '</div>';
    }
    html += '<div style="margin-top:6px;"><span class="answer-line"></span></div>';
    html += '</div>';
  });

  html += '<div class="footer">Powered by 霖楓學苑 · LF Academy</div>';
  html += '</body></html>';

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

function shareWhatsApp() {
  const count = selectedQuestions.size;
  const text = `霖楓學苑教研平台 — 我已選擇 ${count} 題 P5 SSPA 題目，一齊睇下！%0A%0A🔗 www.lfacademyhk.com`;
  window.open(`https://wa.me/?text=${text}`, '_blank');
}
