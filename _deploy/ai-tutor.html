<style>
:root{--blue:#1A3C6D;--gold:#C9A84C;--red:#DC2626;--green:#16A34A;--purple:#1A3C6D;--gray:#6B7280;--bg:#F8FAFC}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(170deg,#0A1A35,#1A3C6D,#1E4D8C);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:100%;max-width:760px;height:96vh;background:#fff;border-radius:20px;box-shadow:0 25px 80px rgba(0,0,0,.35);display:flex;flex-direction:column;overflow:hidden}
.header{background:linear-gradient(135deg,#1A3C6D,#1E4D8C);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header h1{font-size:1.1em;font-weight:700}
.header .status{font-size:.7em;opacity:.7;margin-left:auto;display:flex;align-items:center;gap:4px}
.header .status .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.online{background:#4ade80}.dot.offline{background:#fbbf24}
.mode-tabs{display:flex;gap:0;background:#f1f5f9;padding:4px;margin:8px 14px;border-radius:12px;flex-shrink:0}
.mode-tab{flex:1;padding:8px;text-align:center;border-radius:10px;cursor:pointer;font-size:.8em;font-weight:600;color:var(--gray);transition:all .2s}
.mode-tab.active{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.mode-tab .icon{font-size:1.2em;display:block;margin-bottom:2px}
#topicView{flex:1;overflow-y:auto;padding:14px;display:none}
#topicView h2{font-size:.95em;color:var(--blue);margin:12px 0 8px;padding-left:8px;border-left:3px solid var(--purple)}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.topic-card{background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;padding:12px;cursor:pointer;transition:all .2s}
.topic-card:hover{border-color:var(--blue);background:#EFF6FF;transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,58,237,.15)}
.topic-card .tname{font-weight:600;color:#1e293b;font-size:.9em;margin-bottom:4px}
.topic-card .tmeta{font-size:.75em;color:var(--gray);display:flex;gap:10px}
#qArea{background:linear-gradient(135deg,#eff6ff,#dbeafe);padding:18px;border-bottom:2px solid #bfdbfe;flex-shrink:0;display:none}
#qArea .topic-tag{display:inline-block;background:var(--blue);color:#fff;padding:2px 10px;border-radius:12px;font-size:.72em;margin-bottom:8px}
#qArea .qtext{font-size:1.1em;line-height:1.7;color:#1e293b}
#qArea .meta{color:var(--gray);font-size:.75em;margin-top:6px}
.chat-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.msg{max-width:88%;padding:10px 14px;border-radius:14px;line-height:1.6;font-size:.92em;animation:fadeIn .3s;word-wrap:break-word}
.msg.ai{align-self:flex-start;background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:4px}
.msg.user{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.msg.system{align-self:center;background:#f1f5f9;color:var(--gray);font-size:.78em;padding:6px 14px;border-radius:8px}
.msg.correct{align-self:center;background:#dcfce7;color:#166534;font-weight:600;padding:10px 18px;border-radius:20px}
.msg.wrong{align-self:center;background:#fef2f2;color:#991b1b;padding:10px 18px;border-radius:20px}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#94a3b8;animation:bounce 1.4s infinite;margin:0 2px}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.actions{padding:8px 14px;display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.actions button{flex:1;min-width:70px;padding:9px 6px;border-radius:18px;border:none;font-size:.8em;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-hint{background:#fef3c7;color:#92400e}.btn-hint:hover{background:#fde68a}
.btn-skip{background:#f1f5f9;color:#475569}.btn-skip:hover{background:#e2e8f0}
.btn-topic{background:#dcfce7;color:#166534}.btn-topic:hover{background:#bbf7d0}
.btn-back{background:#fee2e2;color:#991b1b}.btn-back:hover{background:#fecaca}
.btn-solve{background:#ede9fe;color:#1A3C6D}.btn-solve:hover{background:#DBEAFE}
.input-area{padding:10px 14px;border-top:1px solid #e2e8f0;display:flex;gap:8px;background:#fff;flex-shrink:0}
.input-area input{flex:1;padding:12px 16px;border:2px solid #e2e8f0;border-radius:22px;font-size:.95em;outline:none;transition:border .2s}
.input-area input:focus{border-color:var(--blue)}
.input-area button{background:var(--blue);color:#fff;border:none;border-radius:50%;min-width:42px;height:42px;cursor:pointer;font-size:1.1em;flex-shrink:0;transition:all .2s}
.input-area button:hover{background:#6d28d9;transform:scale(1.05)}
.input-area button:disabled{background:#cbd5e1;transform:none}
.stats{display:flex;gap:16px;padding:8px 18px;font-size:.75em;color:var(--gray);background:#fafafa;border-top:1px solid #f1f5f9;flex-shrink:0}
.stats span{display:flex;align-items:center;gap:4px}
.quick-actions{display:flex;gap:6px;padding:6px 14px;flex-wrap:wrap;flex-shrink:0}
.quick-btn{padding:6px 14px;border-radius:16px;border:1.5px solid #e2e8f0;background:#fff;font-size:.75em;cursor:pointer;transition:all .2s;color:var(--gray)}
.quick-btn:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.loading{text-align:center;padding:30px;color:var(--gray)}
.nav-top{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.95);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.1);backdrop-filter:blur(8px)}
.nav-top a{color:var(--blue);text-decoration:none;font-weight:600;font-size:.85em}
.nav-top .brand{font-size:1em;color:#1e293b}
body{padding-top:44px}
.welcome{padding:40px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1}
.welcome .icon{font-size:64px;margin-bottom:16px}
.welcome h2{color:var(--blue);margin-bottom:8px}
.welcome p{color:var(--gray);max-width:400px;line-height:1.6;font-size:.9em}
@media(max-width:500px){

  .topic-grid{grid-template-columns:1fr}
  .actions button{font-size:.72em;padding:8px 4px}
}

<script>
// ═══════════════════════════════════════
// FRELLMAPI AI BACKEND (dev only - localhost)
// ═══════════════════════════════════════
async function frellmapiAsk(question) {
  try {
    const resp = await fetch("http://localhost:3001/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "auto",
        messages: [
          { role: "system", content: "你係霖楓學苑 AI 數學導師（ClassIn網課平台）。用繁體中文+廣東話回答。針對香港小學 P3-P6 數學。每次回答包含：1)解題思路 2)逐步運算 3)陷阱提醒 4)練習建議。語氣親切幽默、鼓勵性。如果問題唔清楚，用蘇格拉底式提問引導。" },
          { role: "user", content: question }
        ],
        max_tokens: 800, temperature: 0.7
      })
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    return data.choices?.[0]?.message?.content || null;
  } catch(e) { return null; }
}

// ═══════════════ GLOBAL STATE ═══════════════
const API = "https://lf-api-f80h.onrender.com";
let currentMode = "practice";
let currentQ = null, currentTopic = null, currentForm = null;
let hintLevel = 0, apiOnline = true;
let stats = { correct: 0, hints: 0, total: 0 };

(function init() {
  checkAPIStatus();
  showTopics();
  const saved = localStorage.getItem("lf_tutor_session");
  if (saved) { try { const s = JSON.parse(saved); stats = s.stats || stats; updateStats(); } catch(e) {} }
})();

async function checkAPIStatus() {
  try {
    const resp = await fetch(API + "/api/topics", { signal: AbortSignal.timeout(4000) });
    apiOnline = resp.ok;
  } catch(e) { apiOnline = false; }
  document.getElementById("onlineStatus").innerHTML = apiOnline
    ? '<span class="dot online"></span> AI 在線'
    : '<span class="dot offline"></span> 離線模式';
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-tab").forEach((t,i) => {
    t.classList.toggle("active", (i===0 && mode==="practice") || (i===1 && mode==="free"));
  });
  document.getElementById("welcomeScreen").style.display = "none";
  document.getElementById("chat").innerHTML = "";
  if (mode === "practice") {
    document.getElementById("quickActions").style.display = "none";
    showTopics();
  } else {
    document.getElementById("topicView").style.display = "none";
    document.getElementById("qArea").style.display = "none";
    document.getElementById("actionsArea").style.display = "none";
    document.getElementById("statsBar").style.display = "none";
    document.getElementById("quickActions").style.display = "flex";
    document.getElementById("inputArea").style.display = "flex";
    document.getElementById("userInput").placeholder = "問我任何數學問題...";
    addMsg("👋 你好！我係霖楓 AI 數學導師。你可以：\n\n📐 問數學概念（例如：咩係 LCM？）\n🧮 俾條題目我幫你分析\n📝 問功課題（貼上題目我逐步教你）\n\n有咩數學問題都可以問我！", "ai");
    try { const hist = JSON.parse(localStorage.getItem("lf_free_chat") || "[]"); hist.slice(-10).forEach(h => addMsg(h.text, h.role)); } catch(e) {}
  }
}

// ═══════════════ TOPICS ═══════════════
const TOPICS = {
  P3: [
    {id:"p3_addition",name:"加法",icon:"➕",q:"p3_addition"},
    {id:"p3_subtraction",name:"減法",icon:"➖",q:"p3_subtraction"},

    {id:"p3_measurement",name:"度量",icon:"📏",q:"p3_measurement"}

    {id:"p4_factors_multiples",name:"因數與倍數",icon:"🔗",q:"p4_factors_multiples"},

    {id:"p4_division_2",name:"兩位除數",icon:"➗",q:"p4_division_2"}
  ],
  P5: [
    {id:"p5_fractions_multi_div",name:"分數乘除",icon:"✖️",q:"p5_fractions_multi_div"},
    {id:"p5_percentage",name:"百分數",icon:"%",q:"p5_percentage"},
    {id:"p5_volume",name:"體積",icon:"📦",q:"p5_volume"},
    {id:"p5_equations",name:"簡易方程",icon:"🔤",q:"p5_equations"},
    {id:"p5_avg_speed",name:"平均數與速率",icon:"🚀",q:"p5_avg_speed"}
  ],
  P6: [
    {id:"p6_percentage_app",name:"百分數應用",icon:"📊",q:"p6_percentage_app"},
    {id:"p6_ratio",name:"比和比例",icon:"⚖️",q:"p6_ratio"},
    {id:"p6_circle",name:"圓形",icon:"⭕",q:"p6_circle"},
    {id:"p6_speed",name:"速率進階",icon:"🏃",q:"p6_speed"},
    {id:"p6_revision",name:"呈分試總複習",icon:"🎯",q:"p6_revision"}
  ]
};

function showTopics() {
  currentQ = null;
  ["qArea","actionsArea","inputArea","statsBar","quickActions"].forEach(id => document.getElementById(id).style.display="none");
  const tv = document.getElementById("topicView");
  tv.style.display = "block";
  let html = "";
  for (const [grade, topics] of Object.entries(TOPICS)) {
    html += '<h2>📚 ' + grade + '</h2><div class="topic-grid">';
    for (const t of topics) {
      html += '<div class="topic-card" onclick="selectTopic(\'' + t.q + "','" + grade + '\')"><div class="tname">' + t.icon + ' ' + t.name + '</div><div class="tmeta"><span>📝 練習</span><span>' + grade + '</span></div></div>';
    }
    html += "</div>";
  }
  tv.innerHTML = html;
}

function selectTopic(topic, form) {
  currentTopic = topic; currentForm = form; hintLevel = 0;
  document.getElementById("topicView").style.display = "none";
  ["actionsArea","inputArea","statsBar"].forEach(id => document.getElementById(id).style.display="flex");
  document.getElementById("chat").innerHTML = "";
  addMsg("📚 主題：" + topic.replace(/_/g," ") + " (" + form + ") · 準備開始！", "system");
  // P3-P6 topics use local question bank directly (no DB for primary levels)
  generateLocalQuestion(topic, form);
}

async function loadQuestionFromAPI() {
  showTyping();
  try {
    const resp = await fetch(API + "/api/questions/random", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({topic:currentTopic, form:currentForm}) });
    const data = await resp.json();
    hideTyping();
    if (!data.error) showQuestion(data);
    else addMsg("⚠️ " + data.error + " · 改用離線題目", "system"), generateLocalQuestion(currentTopic, currentForm);
  } catch(e) {
    hideTyping(); apiOnline = false;
    document.getElementById("onlineStatus").innerHTML = '<span class="dot offline"></span> 離線模式';
    addMsg("⚠️ API 離線 · 使用本地題庫", "system");
    generateLocalQuestion(currentTopic, currentForm);
  }
}

// ═══════════════ LOCAL QUESTIONS ═══════════════
const LOCAL_Q = {
  p3_addition: [{q:"235 + 478 = ?", a:"713", hint:["先加個位：5+8=13，寫3進1","再加十位：3+7+1=11，寫1進1","最後百位：2+4+1=7"], diff:"★", marks:3},{q:"189 + 367 = ?", a:"556", hint:["個位：9+7=16，寫6進1","十位：8+6+1=15，寫5進1","百位：1+3+1=5"], diff:"★", marks:3}],
  p3_subtraction: [{q:"523 - 287 = ?", a:"236", hint:["個位：3-7 唔夠，借位→13-7=6","十位：1-8 唔夠，借位→11-8=3","百位：4-2=2"], diff:"★★", marks:3},{q:"800 - 456 = ?", a:"344", hint:["個位：0-6 唔夠，借位→10-6=4","十位：9-5=4（借咗位）","百位：7-4=3"], diff:"★★", marks:3}],
  p4_fractions: [{q:"2/3 + 1/4 = ? (分數形式)", a:"11/12", hint:["通分：分母 LCM=12","2/3 = 8/12, 1/4 = 3/12","8/12 + 3/12 = 11/12"], diff:"★★", marks:4},{q:"3/5 - 1/3 = ? (分數形式)", a:"4/15", hint:["通分：分母 LCM=15","3/5 = 9/15, 1/3 = 5/15","9/15 - 5/15 = 4/15"], diff:"★★", marks:4}],
  p4_area_perimeter: [{q:"長方形長 8cm，闊 5cm，面積係幾多？(cm²)", a:"40", hint:["面積 = 長 × 闊","8 × 5 = 40 cm²","單位係 cm²，唔係 cm"], diff:"★", marks:3},{q:"長方形長 12m，闊 3m，周界係幾多？(m)", a:"30", hint:["周界 = (長+闊) × 2","(12+3) × 2 = 30m","周界用長度單位 (m)"], diff:"★", marks:3}],
  p5_percentage: [{q:"$100 加 20% 後再減 20%，等於幾多？", a:"96", hint:["加20%：100 × 1.2 = 120","減20%係減120嘅20%：120×0.8=96","T8陷阱：連續百分比唔係加減抵消！"], diff:"★★★", marks:5},{q:"衫原價250，八折後再九折，最後幾錢？", a:"180", hint:["八折：250 × 0.8 = 200","再九折：200 × 0.9 = 180","唔係 250 × 0.7！"], diff:"★★", marks:4}],
  p5_fractions_multi_div: [{q:"2/3 ÷ 4/5 = ? (分數形式)", a:"5/6", hint:["除以分數 = 乘倒數","2/3 ÷ 4/5 = 2/3 × 5/4","= 10/12 = 5/6"], diff:"★★★", marks:4}],
  p5_volume: [{q:"長方體長5cm、闊4cm、高3cm，體積？(cm³)", a:"60", hint:["體積 = 長×闊×高","5×4×3 = 60 cm³","單位係 cm³"], diff:"★", marks:3}],

function checkAnswerLocally(answer) {
  if (!currentQ || !currentQ.answer) return {correct:false};
  const ua = answer.replace(/\s+/g,"").toLowerCase();
  const ca = String(currentQ.answer).replace(/\s+/g,"").toLowerCase();
  if (ua === ca) return {correct:true, score:currentQ.marks||5};
  const un = parseFloat(ua), cn = parseFloat(ca);
  if (!isNaN(un) && !isNaN(cn)) {
    if (Math.abs(un-cn) < 0.001) return {correct:true, score:currentQ.marks||5};
  }
  const fm = ua.match(/^(\d+)\/(\d+)$/);
  if (fm && !isNaN(cn)) { const v = parseInt(fm[1])/parseInt(fm[2]); if (Math.abs(v-cn) < 0.001) return {correct:true, score:currentQ.marks||5}; }
  return {correct:false};
}

function isMathQuestion(q) {
  const ql = q.toLowerCase().replace(/\s+/g,'');
  
  // Math keywords (Chinese + English)
  const mathKeywords = [
    '加','減','乘','除','分數','小數','百分','面積','體積','周界','周長',
    '速率','方程','代數','圖形','圓形','三角','長方','正方','梯形',
    '因數','倍數','lcm','hcf','gcd','質數','質因數','prime',
    '單位','換算','cm','m','km','mm','ml','g','kg',
    '÷','×','+','-','=','%','π','²','³',
    'plus','minus','times','divide','fraction','decimal','percent',
    'area','volume','perimeter','speed','algebra','equation','geometry',
    '數學','題目','計算','答案','幾多','等於','點計','點樣計',
    '口訣','陷阱','trap','診斷','test','練習','考試','測驗',
    '除數','餘數','進位','退位','約簡','通分','擴分',
    'probability','ratio','average','mean','median','mode',
  ];
  
  // Check for math keywords
  for (const kw of mathKeywords) {
    if (ql.includes(kw)) return true;
  }
  
  // Check for number patterns (calculations)
  if (/[\d.]+\s*[+\-×x*÷\/]\s*[\d.]+/.test(q)) return true;
  if (/\d+%/.test(q)) return true;
  
  // Check for common math question patterns
  if (/[=＝]/.test(q) && /\d/.test(q)) return true;
  if (/幾多|等於|點計|答案|計出/.test(q)) return true;
  
  return false;
}

function generateLocalMathAnswer(q) {
  const ql = q.toLowerCase();
  const calcMatch = ql.match(/([\d.]+)\s*([+\-×x*÷\/])\s*([\d.]+)/);
  if (calcMatch) {
    const a = parseFloat(calcMatch[1]), b = parseFloat(calcMatch[3]);
    let result, op = calcMatch[2];
    if (op === "+") result = a + b;
    else if (op === "-") result = a - b;
    else if (op === "×" || op === "x" || op === "*") result = a * b;
    else if (op === "÷" || op === "/") result = b !== 0 ? a / b : "除數不能為0";
    return "🧮 " + a + " " + op + " " + b + " = **" + result + "**";
  }
  const pctMatch = ql.match(/([\d.]+)\s*%\s*(?:of|嘅|的)?\s*([\d.]+)/);
  if (pctMatch) { const pct=parseFloat(pctMatch[1]), val=parseFloat(pctMatch[2]); return "💯 "+val+" 的 "+pct+"% = **"+val*pct/100+"**"; }
  if (ql.includes("lcm") || ql.includes("最小公倍數")) {
    const nums = ql.match(/\d+/g);
    if (nums && nums.length>=2) { const a=parseInt(nums[0]), b=parseInt(nums[1]); const lcm=(a*b)/gcd(a,b); return "🔗 "+a+" 和 "+b+" 的 LCM = **"+lcm+"**\n\nLCM(a,b) = a×b÷GCD(a,b)"+"\n= "+a+"×"+b+"÷"+gcd(a,b)+" = "+lcm; }
  }
  if (ql.includes("hcf") || ql.includes("gcd") || ql.includes("最大公因數")) {
    const nums = ql.match(/\d+/g);
    if (nums && nums.length>=2) { const a=parseInt(nums[0]), b=parseInt(nums[1]); return "🔗 "+a+" 和 "+b+" 的 HCF = **"+gcd(a,b)+"**"; }
  }
  if (ql.includes("質因數") || ql.includes("prime factor")) {
    const numMatch = ql.match(/\b(\d+)\b/);
    if (numMatch) { const n=parseInt(numMatch[1]); const factors=primeFactors(n); return "🔢 "+n+" = **"+factors.join(" × ")+"**"; }
  }
  if ((ql.includes("面積")||ql.includes("area")) && ql.match(/\d+/g)) {
    const nums = ql.match(/\d+/g).map(Number);
    if (nums.length>=2 && (ql.includes("長方")||ql.includes("rectangle"))) return "📐 長方形面積 = 長×闊 = "+nums[0]+"×"+nums[1]+" = **"+(nums[0]*nums[1])+"**\n\n單位係平方（cm²/m²）";

  }
  return null;
}

function gcd(a,b) { a=Math.abs(a); b=Math.abs(b); while(b){[a,b]=[b,a%b];} return a; }
function primeFactors(n) { const f=[]; let d=2; while(d*d<=n){while(n%d===0){f.push(d);n/=d;}d++;} if(n>1)f.push(n); return f; }
