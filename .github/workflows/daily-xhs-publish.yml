name: Daily XHS Publisher

on:
  schedule:
    # 9:00 AM HKT = 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave empty for today'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install playwright && playwright install chromium

      - name: Generate daily post
        run: |
          python scripts/daily_publisher.py ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }}

      - name: Commit and push
        run: |
          git config user.name "LF Bot"
          git config user.email "bot@lfamy.github.io"
          git add docs/social/publish/ docs/social/images/xhs/publish_*.png
          git diff --staged --quiet || git commit -m "auto: daily XHS publish $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
