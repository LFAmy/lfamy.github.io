services:
  - type: web
    name: lf-api
    env: python
    region: singapore
    buildCommand: pip install -r requirements_render.txt
    startCommand: gunicorn lf_server_render:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRELLMAPI_KEY
        sync: false
      - key: FRELLMAPI_URL
        value: http://localhost:3001/v1
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
